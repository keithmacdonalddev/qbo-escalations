<!doctype html>
<!--
  designer-linear — V4 strip-mode
  FORCED ANGLE: Terminal / CLI-like. Text-first, monospace, command-driven.
                The whole workflow looks like a terminal session — agents log
                in plain text, triage is a printed verdict, the analyst is a
                streaming text response, INV matches are text rows. The
                operator advances with hotkeys.
  2 FEATURES:
    1) Hotkey command-line — single input bar at bottom drives everything
       (advance, accept, doubt, copy, ask). Real keystroke loop. No buttons.
    2) Single-pane log — one scrolling stream where parser, triage, INV, and
       the analyst all write into the same surface. No competing panels.
  REGIONS — each justified against a user goal:
    Header strip ......... case ID + status. Goal 1 (see what's wrong) at a glance.
    Log pane ............. parser, triage verdict, INV rows, analyst stream.
                           Goals 1, 2, 3 — the entire workflow lives here.
    Command bar .......... single input. Hotkeys + free-text questions.
                           Goals 2, 3, 4 — confirm/doubt, ask, copy answer.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>esc — linear/term</title>
<style>
  :root {
    --bg: #0b0d0c;
    --fg: #c8d0c8;
    --dim: #6a7268;
    --dimmer: #3e433d;
    --accent: #7dd87d;       /* one accent, semantic only */
    --warn: #e3b341;
    --bad: #e08c7d;
    --hl: #11221a;
    --rule: #1c211c;
    --who: #b8d4e8;          /* analyst voice */
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--fg);
    font: 13px/1.5 "SF Mono", "JetBrains Mono", Menlo, Consolas, ui-monospace, monospace;
    overflow: hidden;
  }
  body {
    display: grid;
    grid-template-rows: 28px 1fr 36px;
    height: 100vh;
  }

  /* ---------- header ---------- */
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 0 14px;
    border-bottom: 1px solid var(--rule);
    color: var(--dim);
    font-size: 12px;
    user-select: none;
  }
  header .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }
  header .case { color: var(--fg); }
  header .sep { color: var(--dimmer); }
  header .right { margin-left: auto; color: var(--dim); font-size: 11px; }

  /* ---------- log pane ---------- */
  main {
    overflow-y: auto;
    padding: 16px 18px 24px 18px;
    scrollbar-color: var(--dimmer) transparent;
    scrollbar-width: thin;
  }
  main::-webkit-scrollbar { width: 6px; }
  main::-webkit-scrollbar-thumb { background: var(--dimmer); }
  main::-webkit-scrollbar-track { background: transparent; }

  .line { white-space: pre-wrap; padding: 1px 0; }
  .line.gap { height: 8px; }
  .ts { color: var(--dimmer); }
  .src { color: var(--dim); }
  .src.parser  { color: #8aa890; }
  .src.triage  { color: var(--accent); }
  .src.inv     { color: #c2b89a; }
  .src.analyst { color: var(--who); }
  .src.sys     { color: var(--dimmer); }
  .src.you     { color: #d8d6c2; }

  .arrow { color: var(--dimmer); }
  .accent { color: var(--accent); }
  .warn   { color: var(--warn); }
  .bad    { color: var(--bad); }
  .dim    { color: var(--dim); }

  /* triage verdict block */
  .verdict {
    border-left: 2px solid var(--accent);
    margin: 4px 0 4px 0;
    padding: 6px 0 6px 12px;
    background: var(--hl);
  }
  .verdict .v-head { color: var(--accent); letter-spacing: .04em; }
  .verdict .v-line { color: var(--fg); }
  .verdict .v-meta { color: var(--dim); }

  /* INV table rows */
  .inv-row { color: var(--fg); }
  .inv-row .hit { color: var(--accent); }
  .inv-row .miss { color: var(--dim); }

  /* analyst stream */
  .analyst-block {
    margin: 4px 0 6px 0;
    padding: 4px 0 4px 12px;
    border-left: 2px solid #2a3f4d;
    color: #e6ecef;
  }
  .analyst-block .who-tag { color: var(--who); font-weight: 600; }
  .analyst-block .body { color: #dde4e6; }
  .cursor {
    display: inline-block;
    width: 7px; height: 14px;
    background: var(--who);
    vertical-align: -2px;
    animation: blink 1s steps(2,start) infinite;
    margin-left: 2px;
  }
  @keyframes blink { to { visibility: hidden; } }

  /* copy-flash */
  .copied {
    color: var(--accent);
    animation: fade 1.4s ease forwards;
  }
  @keyframes fade { 0%{opacity:1} 100%{opacity:.35} }

  /* ---------- command bar ---------- */
  footer {
    display: flex; align-items: center;
    border-top: 1px solid var(--rule);
    padding: 0 14px;
    gap: 10px;
    background: #0a0c0b;
  }
  .prompt { color: var(--accent); user-select: none; }
  .cmdline {
    flex: 1;
    background: transparent;
    border: 0; outline: 0;
    color: var(--fg);
    font: inherit;
    padding: 6px 0;
    caret-color: var(--accent);
  }
  .hints {
    color: var(--dimmer);
    font-size: 11px;
    user-select: none;
    white-space: nowrap;
  }
  .hints kbd {
    color: var(--dim);
    border: 1px solid var(--dimmer);
    border-radius: 3px;
    padding: 0 4px;
    margin: 0 2px;
    font: inherit;
    font-size: 10px;
  }
</style>
</head>
<body>

<header>
  <span class="dot" id="statusDot"></span>
  <span class="case" id="caseId">case#48211</span>
  <span class="sep">·</span>
  <span id="caseState">awaiting upload</span>
  <span class="right" id="clock">--:--:--</span>
</header>

<main id="log" tabindex="0"></main>

<footer>
  <span class="prompt">esc&gt;</span>
  <input id="cmd" class="cmdline" autocomplete="off" spellcheck="false"
         placeholder="type a question, or press a hotkey  (try: u)" autofocus>
  <span class="hints" id="hints">
    <kbd>u</kbd>upload <kbd>a</kbd>accept <kbd>d</kbd>doubt <kbd>c</kbd>copy <kbd>?</kbd>help
  </span>
</footer>

<script>
(() => {
  const log = document.getElementById('log');
  const cmd = document.getElementById('cmd');
  const hints = document.getElementById('hints');
  const caseState = document.getElementById('caseState');
  const statusDot = document.getElementById('statusDot');
  const clockEl = document.getElementById('clock');

  // ---- clock ----
  function tick() {
    const d = new Date();
    const pad = n => String(n).padStart(2,'0');
    clockEl.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }
  setInterval(tick, 1000); tick();

  // ---- log helpers ----
  let lastTs = null;
  function ts() {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  }
  function line(html, cls='') {
    const el = document.createElement('div');
    el.className = 'line ' + cls;
    el.innerHTML = html;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }
  function gap() { line('', 'gap'); }
  function src(name) {
    const cls = name.toLowerCase();
    return `<span class="ts">${ts()}</span>  <span class="src ${cls}">${name.padEnd(8)}</span><span class="arrow">›</span> `;
  }

  // ---- state machine ----
  const STATE = { IDLE:'idle', UPLOADED:'uploaded', TRIAGED:'triaged', READY:'ready', CHATTING:'chatting', DONE:'done' };
  let state = STATE.IDLE;
  let lastAnswer = '';
  let analystEl = null;
  let typingTimer = null;

  function setState(s, label, color) {
    state = s;
    caseState.textContent = label;
    statusDot.style.background = color || 'var(--accent)';
    statusDot.style.boxShadow = `0 0 6px ${color || 'var(--accent)'}`;
  }

  function setHints(s) { hints.innerHTML = s; }

  // ---- boot ----
  line(`<span class="dim">esc/term v0.4 · type </span><span class="accent">?</span><span class="dim"> for hotkeys · </span><span class="accent">u</span><span class="dim"> to upload a case ticket image</span>`);
  gap();

  // ---- workflow steps ----
  function stepUpload() {
    if (state !== STATE.IDLE) return;
    line(src('sys') + `image received  <span class="dim">ticket_48211.png  · 1.2MB</span>`);
    setState(STATE.UPLOADED, 'parsing…', '#e3b341');
    setHints(`<span class="dim">working…</span>`);
    setTimeout(stepParse, 600);
  }

  function stepParse() {
    line(src('parser') + `extracting fields <span class="dim">…</span>`);
    setTimeout(() => {
      line(src('parser') + `customer  <span class="dim">=</span> Acme Bookkeeping LLC`);
      line(src('parser') + `realm_id  <span class="dim">=</span> 4620816365211994772`);
      line(src('parser') + `product   <span class="dim">=</span> QBO Payroll Elite`);
      line(src('parser') + `issue     <span class="dim">=</span> "direct deposit rejected — R03 code, 2nd occurrence"`);
      line(src('parser') + `inv_ref   <span class="dim">=</span> INV-77ax-4421`);
      gap();
      stepTriageAndInv();
    }, 450);
  }

  function stepTriageAndInv() {
    // triage and INV run in parallel — triage prints first, INV streams next
    line(src('triage') + `analysing…`);
    setTimeout(() => {
      const v = document.createElement('div');
      v.className = 'line verdict';
      v.innerHTML =
        `<div class="v-head">VERDICT  ·  payroll / direct-deposit / NSF-return</div>` +
        `<div class="v-line">customer's bank returned the DD with code <span class="warn">R03</span> (no account / unable to locate). second occurrence this month — bank info likely stale.</div>` +
        `<div class="v-meta">severity <span class="warn">medium</span> · sla 4h · next: verify routing/account on file, then re-attempt or switch to paper check</div>`;
      log.appendChild(v);
      log.scrollTop = log.scrollHeight;
      setState(STATE.TRIAGED, 'triaged · awaiting confirm', 'var(--accent)');
      setHints(`<kbd>a</kbd>accept  <kbd>d</kbd>doubt  <span class="dim">or type a question</span>`);
      // INV stream begins right after
      setTimeout(stepInv, 300);
    }, 700);
  }

  function stepInv() {
    line(src('inv') + `searching prior cases for INV-77ax-4421 …`);
    const rows = [
      { id: 'CASE-44910', when: '2026-04-22', who: 'k.macdonald', sum: 'same realm, R03, resolved by routing-number correction', hit: true },
      { id: 'CASE-44188', when: '2026-04-09', who: 't.nguyen',    sum: 'same realm, R01 (insufficient funds), unrelated', hit: false },
      { id: 'CASE-43002', when: '2026-03-30', who: 'a.patel',     sum: 'same realm, employee onboarding — no payroll run', hit: false },
    ];
    let i = 0;
    const step = () => {
      if (i >= rows.length) {
        line(src('inv') + `<span class="dim">3 matches · 1 strong</span>`);
        gap();
        stepAnalystArrives();
        return;
      }
      const r = rows[i++];
      const mark = r.hit ? `<span class="hit">●</span>` : `<span class="miss">○</span>`;
      line(`<span class="ts">${ts()}</span>  <span class="src inv">inv     </span><span class="arrow">›</span> ${mark}  <span class="${r.hit?'hit':'dim'}">${r.id}</span>  <span class="dim">${r.when}  ${r.who.padEnd(14)}</span>  ${r.sum}`, 'inv-row');
      setTimeout(step, 220);
    };
    step();
  }

  function stepAnalystArrives() {
    line(src('analyst') + `<span class="who-tag">Mara</span> <span class="dim">joined · senior payroll analyst · 6yr</span>`);
    setState(STATE.READY, 'analyst ready', 'var(--accent)');
    setHints(`<span class="dim">type a question  ·  </span><kbd>c</kbd>copy last answer  <kbd>a</kbd>accept`);
    setTimeout(() => {
      analystSay(
        `Hey — I read the ticket. R03 on a second attempt almost always means a digit's off in the account number, not a closed account. ` +
        `Pull up the employee's bank record in QBO, compare against what the bank's portal shows the employee has on file. ` +
        `If they match, push a one-time paper check and have the employee re-enter the account themselves next pay cycle. ` +
        `I'd avoid another DD attempt until they confirm — three R03s in a month gets the realm flagged.`
      );
    }, 400);
  }

  // ---- analyst streaming ----
  function analystSay(text) {
    state = STATE.CHATTING;
    const block = document.createElement('div');
    block.className = 'line analyst-block';
    block.innerHTML = `<span class="who-tag">Mara</span>  <span class="body"></span><span class="cursor"></span>`;
    log.appendChild(block);
    log.scrollTop = log.scrollHeight;
    const bodyEl = block.querySelector('.body');
    const cursor = block.querySelector('.cursor');
    analystEl = block;
    let i = 0;
    clearInterval(typingTimer);
    typingTimer = setInterval(() => {
      if (i >= text.length) {
        clearInterval(typingTimer);
        cursor.remove();
        lastAnswer = text;
        setHints(`<kbd>c</kbd>copy answer  <span class="dim">·</span>  <span class="dim">type a follow-up  ·</span>  <kbd>a</kbd>close case`);
        return;
      }
      // type in small chunks for a calm speed
      const chunk = text.slice(i, i + 3);
      bodyEl.append(document.createTextNode(chunk));
      i += 3;
      log.scrollTop = log.scrollHeight;
    }, 22);
  }

  // ---- you say ----
  function youSay(text) {
    line(`<span class="ts">${ts()}</span>  <span class="src you">you     </span><span class="arrow">›</span> ${escapeHtml(text)}`);
  }
  function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

  // ---- doubt / accept / copy ----
  function doDoubt() {
    if (state !== STATE.TRIAGED && state !== STATE.READY && state !== STATE.CHATTING) return;
    youSay('/doubt triage');
    setTimeout(() => {
      line(src('triage') + `<span class="warn">flagged for revision</span> · re-checking with looser priors…`);
      setTimeout(() => {
        line(src('triage') + `revised: same root cause (R03/bank-info) but consider <span class="warn">employee changed banks</span> — ask before paper check.`);
        setHints(`<span class="dim">type a question  ·  </span><kbd>c</kbd>copy last answer  <kbd>a</kbd>accept`);
      }, 700);
    }, 200);
  }

  function doAccept() {
    if (state === STATE.IDLE || state === STATE.UPLOADED) return;
    youSay('/accept');
    line(src('sys') + `case marked <span class="accent">resolved</span> · logged to case#48211 · ready for next`);
    setState(STATE.DONE, 'closed', 'var(--accent)');
    setHints(`<kbd>u</kbd>next case  <kbd>?</kbd>help`);
    state = STATE.DONE;
  }

  function doCopy() {
    if (!lastAnswer) {
      line(src('sys') + `nothing to copy yet`);
      return;
    }
    navigator.clipboard?.writeText(lastAnswer).catch(()=>{});
    const el = line(src('sys') + `<span class="copied">copied answer to clipboard · paste to phone-agent</span>`);
  }

  function doHelp() {
    line(src('sys') + `hotkeys:  <span class="accent">u</span> upload   <span class="accent">a</span> accept   <span class="accent">d</span> doubt triage   <span class="accent">c</span> copy last answer   <span class="accent">?</span> this help`);
    line(src('sys') + `or just type a question to the analyst and press <kbd style="color:var(--dim);border:1px solid var(--dimmer);border-radius:3px;padding:0 4px;font-size:10px">enter</kbd>`);
  }

  function reset() {
    log.innerHTML = '';
    state = STATE.IDLE;
    lastAnswer = '';
    setState(STATE.IDLE, 'awaiting upload', 'var(--accent)');
    setHints(`<kbd>u</kbd>upload <kbd>a</kbd>accept <kbd>d</kbd>doubt <kbd>c</kbd>copy <kbd>?</kbd>help`);
    line(`<span class="dim">esc/term v0.4 · </span><span class="accent">u</span><span class="dim"> to start a new case</span>`);
    gap();
  }

  // ---- analyst follow-up response ----
  const followupReplies = [
    `Good question. Check the audit log on the employee record — QBO timestamps every bank-info edit. If the last edit is older than 30 days, it's not an employee change.`,
    `Yeah, you can. Run a single off-cycle paper check from the same payroll, mark reason "DD-return". It won't trigger a tax recalculation.`,
    `If they push back: the R03 came from their bank, not us. We can show them the ACH return file. That usually ends it.`,
    `Don't re-attempt today. ACH windows are closed past 5pm ET. Tomorrow morning, after they confirm the account number, schedule a same-day DD.`,
  ];
  let followupIdx = 0;
  function analystFollowup(question) {
    const reply = followupReplies[followupIdx % followupReplies.length];
    followupIdx++;
    setTimeout(() => analystSay(reply), 350);
  }

  // ---- command bar ----
  cmd.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const v = cmd.value.trim();
      cmd.value = '';
      if (!v) return;
      // hotkey shortcuts when alone
      if (v === 'u' || v === '/upload') return stepUpload();
      if (v === 'a' || v === '/accept') return doAccept();
      if (v === 'd' || v === '/doubt')  return doDoubt();
      if (v === 'c' || v === '/copy')   return doCopy();
      if (v === '?' || v === '/help')   return doHelp();
      if (v === '/reset' || v === 'r')  return reset();
      // free text → analyst
      if (state === STATE.IDLE) {
        line(src('sys') + `no case loaded · press <span class="accent">u</span> to upload`);
        return;
      }
      youSay(v);
      analystFollowup(v);
      return;
    }
    // raw single-key hotkeys when input is empty
    if (cmd.value === '') {
      if (e.key === 'u') { e.preventDefault(); stepUpload(); }
      else if (e.key === 'a') { e.preventDefault(); doAccept(); }
      else if (e.key === 'd') { e.preventDefault(); doDoubt(); }
      else if (e.key === 'c') { e.preventDefault(); doCopy(); }
      else if (e.key === '?') { e.preventDefault(); doHelp(); }
    }
  });

  // refocus on click anywhere
  document.addEventListener('click', () => cmd.focus());
  cmd.focus();
})();
</script>
</body>
</html>

<script>
// ============================================================
//  QBO ESCALATION ASSISTANT — V2 MOTION ENGINE
//  Every interaction is alive. Every surface breathes.
// ============================================================

// === STATE ===
const S = {
  view: 'chat', prev: null, sbCol: false, sbMob: false, cpOpen: false, cmdOpen: false,
  selEsc: null, selEmail: null, calM: 2, calY: 2026,
  settings: {theme:'dark',notif:true,sound:false,autoTriage:true,parallel:false,streaming:true,provider:'claude-sonnet',effort:'high'},
  audioCtx: null, audioEnabled: false
};

// =============================================================
//  1. AURORA CANVAS — Generative Fluid Background
// =============================================================
(function initAurora() {
  const c = document.getElementById('auroraCanvas');
  const ctx = c.getContext('2d');
  let w, h, t = 0;
  function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  // Simplex-like noise approximation
  function noise(x, y, z) {
    const p = (Math.sin(x * 1.2 + z * 0.7) * Math.cos(y * 0.9 + z * 0.5) +
               Math.sin(y * 1.4 + z * 0.3) * Math.cos(x * 0.8 + z * 0.6) +
               Math.sin((x + y) * 0.7 + z * 0.4)) / 3;
    return (p + 1) / 2;
  }

  const blobs = [
    { x: 0.2, y: 0.3, r: 350, color: [99, 102, 241], speed: 0.0008, phase: 0 },
    { x: 0.7, y: 0.6, r: 300, color: [168, 85, 247], speed: 0.0006, phase: 2 },
    { x: 0.5, y: 0.8, r: 280, color: [59, 130, 246], speed: 0.0009, phase: 4 },
    { x: 0.3, y: 0.5, r: 250, color: [34, 197, 94], speed: 0.0005, phase: 1 },
    { x: 0.8, y: 0.2, r: 220, color: [236, 72, 153], speed: 0.0007, phase: 3 },
  ];

  function drawAurora() {
    ctx.clearRect(0, 0, w, h);
    t += 1;

    for (const b of blobs) {
      const nx = b.x + Math.sin(t * b.speed + b.phase) * 0.15;
      const ny = b.y + Math.cos(t * b.speed * 1.3 + b.phase) * 0.1;
      const nr = b.r + Math.sin(t * b.speed * 2 + b.phase) * 40;
      const cx = nx * w;
      const cy = ny * h;

      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, nr);
      grad.addColorStop(0, `rgba(${b.color[0]},${b.color[1]},${b.color[2]},0.03)`);
      grad.addColorStop(0.5, `rgba(${b.color[0]},${b.color[1]},${b.color[2]},0.015)`);
      grad.addColorStop(1, 'transparent');

      ctx.fillStyle = grad;
      ctx.beginPath();
      // Morphing blob shape
      const segments = 64;
      for (let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        const distort = 1 + noise(Math.cos(angle) * 2, Math.sin(angle) * 2, t * 0.005 + b.phase) * 0.3;
        const px = cx + Math.cos(angle) * nr * distort;
        const py = cy + Math.sin(angle) * nr * distort;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
    }

    requestAnimationFrame(drawAurora);
  }
  drawAurora();
})();

// =============================================================
//  2. ENHANCED PARTICLE SYSTEM — with mouse interaction
// =============================================================
(function initParticles() {
  const c = document.getElementById('particles');
  const ctx = c.getContext('2d');
  let w, h, particles = [], mouseX = -999, mouseY = -999;
  function resize() { w = c.width = window.innerWidth; h = c.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * w, y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 2 + 0.5, a: Math.random() * 0.15 + 0.03,
      baseA: Math.random() * 0.15 + 0.03,
      pulseSpeed: Math.random() * 0.02 + 0.01,
      pulsePhase: Math.random() * Math.PI * 2,
      hue: Math.random() * 30 - 15 // slight color variation
    });
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, w, h);
    frame++;

    for (const p of particles) {
      // Mouse repulsion
      const dx = p.x - mouseX, dy = p.y - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 200 && dist > 0) {
        const force = (200 - dist) / 200 * 0.5;
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;
      }

      // Damping
      p.vx *= 0.98; p.vy *= 0.98;

      // Base drift
      p.vx += (Math.random() - 0.5) * 0.02;
      p.vy += (Math.random() - 0.5) * 0.02;

      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;

      // Pulsing opacity
      p.a = p.baseA + Math.sin(frame * p.pulseSpeed + p.pulsePhase) * 0.03;

      // Draw with glow
      const hue = 240 + p.hue;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${hue},70%,65%,${p.a})`; ctx.fill();

      // Glow ring on particles near mouse
      if (dist < 150) {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r + 3, 0, Math.PI * 2);
        ctx.strokeStyle = `hsla(${hue},70%,65%,${(150 - dist) / 150 * 0.15})`;
        ctx.lineWidth = 1; ctx.stroke();
      }
    }

    // Connection lines
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 140) {
          const opacity = 0.04 * (1 - dist / 140);
          ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(99,102,241,${opacity})`; ctx.lineWidth = 0.5; ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// =============================================================
//  3. CURSOR GLOW — with smooth lerp tracking
// =============================================================
(function initGlow() {
  const glow = document.getElementById('cursorGlow');
  let mx = 0, my = 0, gx = 0, gy = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; glow.classList.add('visible'); });
  document.addEventListener('mouseleave', () => glow.classList.remove('visible'));
  function tick() {
    gx += (mx - gx) * 0.06; gy += (my - gy) * 0.06;
    glow.style.left = gx + 'px'; glow.style.top = gy + 'px';

    // Proximity interaction: cursor glow affects nearby cards
    const cards = document.querySelectorAll('.stat,.inv-c,.ws-card,.pb-card,.gal-card,.ship-card,.chart');
    for (const card of cards) {
      const r = card.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = gx - cx, dy = gy - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const maxDist = 300;
      if (dist < maxDist) {
        const intensity = 1 - dist / maxDist;
        // Specular highlight — bright spot where glow touches
        const relX = ((gx - r.left) / r.width) * 100;
        const relY = ((gy - r.top) / r.height) * 100;
        card.style.setProperty('--prox-x', relX + '%');
        card.style.setProperty('--prox-y', relY + '%');
        card.style.setProperty('--prox-intensity', intensity.toFixed(3));
        // Surface brightening — card glows proportional to proximity
        const glow_a = (intensity * 0.08).toFixed(4);
        const border_a = (0.06 + intensity * 0.12).toFixed(4);
        card.style.background = `radial-gradient(circle at ${relX}% ${relY}%, rgba(99,102,241,${glow_a}), var(--bg-surface) 60%)`;
        card.style.borderColor = `rgba(255,255,255,${border_a})`;
        // Subtle tilt toward cursor
        const tiltX = (dy / maxDist) * -2;
        const tiltY = (dx / maxDist) * 2;
        if (!card.matches(':hover')) {
          card.style.transform = `perspective(800px) rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(${1 + intensity * 0.005})`;
        }
      } else {
        card.style.background = '';
        card.style.borderColor = '';
        if (!card.matches(':hover')) {
          card.style.transform = '';
        }
      }
    }
    requestAnimationFrame(tick);
  }
  tick();
})();

// =============================================================
//  4. CURSOR TRAIL — luminous dot trail
// =============================================================
(function initCursorTrail() {
  const trailCount = 12;
  const trails = [];
  let mx = 0, my = 0;

  for (let i = 0; i < trailCount; i++) {
    const el = document.createElement('div');
    el.className = 'cursor-trail';
    const size = 6 - (i * 0.4);
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.opacity = (1 - i / trailCount) * 0.3;
    document.body.appendChild(el);
    trails.push({ el, x: 0, y: 0 });
  }

  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  function tick() {
    for (let i = 0; i < trails.length; i++) {
      const target = i === 0 ? { x: mx, y: my } : trails[i - 1];
      const lerp = 0.15 - i * 0.008;
      trails[i].x += (target.x - trails[i].x) * lerp;
      trails[i].y += (target.y - trails[i].y) * lerp;
      trails[i].el.style.transform = `translate(${trails[i].x - 3}px, ${trails[i].y - 3}px)`;
    }
    requestAnimationFrame(tick);
  }
  tick();
})();

// =============================================================
//  5. CLICK EXPLOSION — particle burst on click
// =============================================================
document.addEventListener('click', e => {
  const count = 12 + Math.floor(Math.random() * 8);
  const colors = ['99,102,241', '168,85,247', '59,130,246', '34,197,94', '236,72,153'];

  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'click-particle';
    const size = 2 + Math.random() * 4;
    const angle = (Math.PI * 2 * i / count) + Math.random() * 0.5;
    const velocity = 40 + Math.random() * 80;
    const color = colors[Math.floor(Math.random() * colors.length)];
    const duration = 400 + Math.random() * 400;

    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = e.clientX + 'px';
    p.style.top = e.clientY + 'px';
    p.style.background = `rgba(${color},0.6)`;
    p.style.boxShadow = `0 0 ${size * 2}px rgba(${color},0.3)`;
    document.body.appendChild(p);

    const tx = Math.cos(angle) * velocity;
    const ty = Math.sin(angle) * velocity;

    p.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 0.8 },
      { transform: `translate(${tx}px,${ty + 20}px) scale(0)`, opacity: 0 }
    ], { duration, easing: 'cubic-bezier(.34,1.56,.64,1)', fill: 'forwards' });

    setTimeout(() => p.remove(), duration);
  }

  // Play click sound
  playSound('click');
});

// =============================================================
//  6. WEB AUDIO — spatial sound tied to interactions
// =============================================================
function initAudio() {
  if (S.audioCtx) return;
  try {
    S.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    S.audioEnabled = true;
  } catch(e) {}
}

function playSound(type) {
  if (!S.audioEnabled || !S.audioCtx) return;
  const ctx = S.audioCtx;
  const now = ctx.currentTime;
  if (type === 'click') {
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
    gain.gain.setValueAtTime(0.03, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    osc.start(now); osc.stop(now + 0.1);
  } else if (type === 'nav') {
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sine';
    osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(659, now + 0.05);
    gain.gain.setValueAtTime(0.02, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    osc.start(now); osc.stop(now + 0.12);
  } else if (type === 'toast') {
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination); osc.type = 'sine';
    osc.frequency.setValueAtTime(440, now); osc.frequency.setValueAtTime(554, now + 0.06); osc.frequency.setValueAtTime(659, now + 0.12);
    gain.gain.setValueAtTime(0.02, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.start(now); osc.stop(now + 0.2);
  } else if (type === 'send') {
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination); osc.type = 'triangle';
    osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(900, now + 0.15);
    gain.gain.setValueAtTime(0.025, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.start(now); osc.stop(now + 0.2);
  } else if (type === 'hover') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(600 + Math.random()*200, now);
    gain.gain.setValueAtTime(0.008, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
    osc.start(now); osc.stop(now + 0.06);
  } else if (type === 'toggle') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(380, now);
    osc.frequency.setValueAtTime(520, now + 0.04);
    gain.gain.setValueAtTime(0.02, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    osc.start(now); osc.stop(now + 0.08);
  } else if (type === 'confetti') {
    // Rising sparkle chord
    [523, 659, 784].forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f, now + i*0.05);
      gain.gain.setValueAtTime(0.015, now + i*0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.start(now + i*0.05); osc.stop(now + 0.4);
    });
  } else if (type === 'whoosh') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    osc.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(2000, now);
    filter.frequency.exponentialRampToValueAtTime(200, now + 0.2);
    osc.frequency.setValueAtTime(150, now);
    gain.gain.setValueAtTime(0.015, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.start(now); osc.stop(now + 0.2);
  } else if (type === 'mascot') {
    // Cute two-note chirp
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, now);
    osc.frequency.setValueAtTime(1000, now + 0.08);
    osc.frequency.setValueAtTime(1200, now + 0.14);
    gain.gain.setValueAtTime(0.02, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.start(now); osc.stop(now + 0.2);
  }
}

// =============================================================
//  7. RIPPLE EFFECT — enhanced with glow
// =============================================================
document.addEventListener('mousedown', e => {
  const btn = e.target.closest('.btn,.sb-item,.qc,.cp-chip,.cmd-i,.pb-card,.ws-card,.gal-card,.inv-c,.email-row,.tab,.toggle,.ship-card');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const r = document.createElement('span');
  r.className = 'ripple';
  const size = Math.max(rect.width, rect.height) * 2.5;
  r.style.width = r.style.height = size + 'px';
  r.style.left = (e.clientX - rect.left - size / 2) + 'px';
  r.style.top = (e.clientY - rect.top - size / 2) + 'px';
  btn.style.position = 'relative'; btn.style.overflow = 'hidden';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 600);
});

// =============================================================
//  8. 3D TILT — with parallax depth + mouse glow
// =============================================================
function initTilt(el) {
  el.addEventListener('mousemove', e => {
    const r = el.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width - 0.5;
    const y = (e.clientY - r.top) / r.height - 0.5;
    el.style.transform = `perspective(800px) rotateX(${-y*6}deg) rotateY(${x*6}deg) translateY(-2px) scale(1.01)`;
    el.style.boxShadow = `${-x*10}px ${-y*10}px 30px rgba(0,0,0,.3), 0 0 20px rgba(99,102,241,${Math.abs(x*y)*0.15})`;

    // Internal glow following cursor
    const glow = el.querySelector('.card-glow');
    if (glow) {
      glow.style.background = `radial-gradient(circle at ${(x+0.5)*100}% ${(y+0.5)*100}%, rgba(99,102,241,.06), transparent 50%)`;
    }
  });
  el.addEventListener('mouseleave', () => {
    el.style.transform = '';
    el.style.boxShadow = '';
  });

  // Add internal glow div if not present
  if (!el.querySelector('.card-glow')) {
    const gd = document.createElement('div');
    gd.className = 'card-glow';
    el.insertBefore(gd, el.firstChild);
  }
}

// =============================================================
//  9. MAGNETIC ELEMENTS — attracted to cursor
// =============================================================
function initMagnetic(el, strength = 0.3) {
  el.addEventListener('mousemove', e => {
    const r = el.getBoundingClientRect();
    const cx = r.left + r.width / 2;
    const cy = r.top + r.height / 2;
    const dx = (e.clientX - cx) * strength;
    const dy = (e.clientY - cy) * strength;
    el.style.transform = `translate(${dx}px, ${dy}px)`;
  });
  el.addEventListener('mouseleave', () => {
    el.style.transform = '';
    el.style.transition = 'transform 0.4s cubic-bezier(.34,1.56,.64,1)';
    setTimeout(() => { el.style.transition = ''; }, 400);
  });
}

// =============================================================
//  10. ANIMATED COUNTER — with spring bounce
// =============================================================
function animNum(el, target, dur = 700) {
  const s = parseInt(el.textContent) || 0;
  const d = target - s; if (!d) return;
  const t0 = performance.now();
  (function tick(now) {
    const p = Math.min((now - t0) / dur, 1);
    // Elastic ease
    const c4 = (2 * Math.PI) / 3;
    const e = p === 0 ? 0 : p === 1 ? 1 : Math.pow(2, -10 * p) * Math.sin((p * 10 - 0.75) * c4) + 1;
    el.textContent = Math.round(s + d * e);
    if (p < 1) requestAnimationFrame(tick);
  })(t0);
}

// =============================================================
//  11. STAGGER — with cascade reveal
// =============================================================
function stagger(ct, sel, delay = 35) {
  ct.querySelectorAll(sel).forEach((el, i) => {
    el.classList.remove('in');
    setTimeout(() => el.classList.add('in'), i * delay);
  });
}

  const c = document.getElementById('toasts');

    error:'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--ink-danger)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'};

}

function nav(id, detail) {
  if (id === S.view && !detail) return;
  S.prev = S.view; S.view = id;
  if (detail) { if (id==='esc-detail') S.selEsc=detail; if (id==='email-detail') S.selEmail=detail; }
  render(); updNav(); updHdr();
  playSound('nav');
  if (S.sbMob) toggleMob();
}

    'Searching playbook for matching procedures...\n\n**Match found:** Playbook > Bank Feeds > Chase OAuth Troubleshooting (Article BF-007)\n\n**Step-by-step resolution:**\n1. Have customer clear browser cache and cookies\n2. Navigate to Banking > Bank Feeds > Reconnect\n3. Use the **new OAuth2 flow** (not legacy)\n4. If timeout persists, escalate with error code from dev console\n\n**Note:** Chase pushed an auth update on March 18. INV-148201 tracks this. 47 users affected so far.\n\nWant me to draft the agent message with these steps included?'
  ];
  const chosen = resps[Math.floor(Math.random()*resps.length)];
  setTimeout(()=>{
    const ty=document.getElementById('typ');if(ty)ty.remove();
    // Create message container with streaming cursor
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg bot';
    msgDiv.innerHTML = `<div class="mp">Claude Sonnet 4<div class="waveform-bars" id="streamWave"><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div><div class="wbar"></div></div></div><span class="stream-content"></span><span class="stream-cursor">|</span><div class="mt">${t}</div>`;
    ms.appendChild(msgDiv);
    ms.scrollTop = ms.scrollHeight;

    const content = msgDiv.querySelector('.stream-content');
    const cursor = msgDiv.querySelector('.stream-cursor');
    let idx = 0;
    let htmlBuf = '';
    let inBold = false;

    function streamTick() {
      if (idx >= chosen.length) {
        cursor.remove();
        const wave = document.getElementById('streamWave');
        if (wave) wave.style.display = 'none';
        return;
      }
      // Process 1-3 chars per tick for natural speed variation
      const chunkSize = Math.random() < 0.1 ? 1 : (Math.random() < 0.3 ? 2 : 3);
      for (let c = 0; c < chunkSize && idx < chosen.length; c++) {
        const ch = chosen[idx];
        if (ch === '*' && chosen[idx+1] === '*') {
          if (inBold) { htmlBuf += '</strong>'; inBold = false; }
          else { htmlBuf += '<strong>'; inBold = true; }
          idx += 2;
        } else if (ch === '\n') {
          htmlBuf += '<br>';
          idx++;
        } else {
          htmlBuf += ch === '<' ? '&lt;' : ch;
          idx++;
        }
      }
      content.innerHTML = htmlBuf;
      ms.scrollTop = ms.scrollHeight;
      // Variable speed: pause longer on punctuation, newlines
      const lastChar = chosen[idx-1] || '';
      const delay = lastChar === '\n' ? 80 + Math.random()*60
                  : (lastChar === '.' || lastChar === ':') ? 50 + Math.random()*40
                  : lastChar === ',' ? 30 + Math.random()*20
                  : 12 + Math.random()*18;
      setTimeout(streamTick, delay);
    }
    streamTick();
  }, 800 + Math.random()*500);
}

function makeSparkline(data, color, w, h) {
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v,i) => `${(i/(data.length-1))*w},${h - ((v-min)/range)*h}`).join(' ');
  const areaPts = pts + ` ${w},${h} 0,${h}`;
  return `<svg class="stat-sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polygon class="spark-area" points="${areaPts}" fill="${color}"/><polyline points="${pts}" stroke="${color}"/></svg>`;
}
function makeRing(pct, color, size) {
  const r = (size - 6) / 2;
  const c = Math.PI * 2 * r;
  const offset = c - (pct / 100) * c;
  return `<svg class="stat-ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle class="track" cx="${size/2}" cy="${size/2}" r="${r}"/>
    <circle class="value" cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}" stroke-dasharray="${c}" stroke-dashoffset="${c}" data-offset="${offset}"/>
    <circle class="pulse" cx="${size/2}" cy="${size/2}" r="${r}" stroke="${color}"/>
  </svg>`;
}

(function initMascotEyes() {
  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  function tick() {
    const mascot = document.getElementById('aiMascot');
    if (!mascot) { requestAnimationFrame(tick); return; }
    const rect = mascot.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = mx - cx, dy = my - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const maxMove = 2.5;
    const nx = (dx / (dist || 1)) * Math.min(dist / 80, 1) * maxMove;
    const ny = (dy / (dist || 1)) * Math.min(dist / 80, 1) * maxMove;
    const pl = document.getElementById('pupilL');
    const pr = document.getElementById('pupilR');
    if (pl) pl.style.transform = `translate(${nx}px, ${ny}px)`;
    if (pr) pr.style.transform = `translate(${nx}px, ${ny}px)`;
    requestAnimationFrame(tick);
  }
  tick();
})();

// =============================================================
function fireConfetti(x, y) {
  playSound('confetti');
  const cx = x || window.innerWidth / 2;
  const cy = y || window.innerHeight / 3;
  const colors = ['#6366f1','#a855f7','#3b82f6','#22c55e','#f59e0b','#ec4899','#06b6d4','#f97316'];
  const shapes = ['circle','rect','triangle'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const shape = shapes[Math.floor(Math.random() * shapes.length)];
    const size = 4 + Math.random() * 6;
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    el.style.width = size + 'px';
    el.style.height = shape === 'rect' ? size * 1.5 + 'px' : size + 'px';
    el.style.background = color;
    el.style.borderRadius = shape === 'circle' ? '50%' : shape === 'triangle' ? '0' : '1px';
    if (shape === 'triangle') {
      el.style.background = 'none';
      el.style.width = '0'; el.style.height = '0';
      el.style.borderLeft = size/2+'px solid transparent';
      el.style.borderRight = size/2+'px solid transparent';
      el.style.borderBottom = size+'px solid '+color;
    }
    document.body.appendChild(el);
    const angle = (Math.random() * Math.PI * 2);
    const velocity = 200 + Math.random() * 400;
    const tx = Math.cos(angle) * velocity;
    const ty = Math.sin(angle) * velocity - 200; // upward bias
    const rot = Math.random() * 720 - 360;
    const dur = 1200 + Math.random() * 800;
    el.animate([
      { transform: 'translate(0,0) rotate(0deg) scale(1)', opacity: 1 },
      { transform: `translate(${tx}px,${ty + 400}px) rotate(${rot}deg) scale(0.3)`, opacity: 0 }
    ], { duration: dur, easing: 'cubic-bezier(.25,.46,.45,.94)', fill: 'forwards' });
    setTimeout(() => el.remove(), dur);
  }
}

(function initMatrix() {
  const c = document.getElementById('matrixCanvas');
  if (!c) return;
  const ctx = c.getContext('2d');
  let w, h, columns, drops = [], active = false, rafId = null;
  const chars = 'QBOESCINVアイウエオカキクケコ01234567890ABCDEF$#@!%^&*';
  function resize() {
    w = c.width = window.innerWidth;
    h = c.height = window.innerHeight;
    columns = Math.floor(w / 14);
    drops = Array(columns).fill(1);
  }
  resize();
  window.addEventListener('resize', resize);
  function draw() {
    if (!active) return;
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#0f0';
    ctx.font = '12px monospace';
    for (let i = 0; i < drops.length; i++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      // Color variation
      ctx.fillStyle = Math.random() > 0.95 ? '#fff' : Math.random() > 0.5 ? '#0f0' : '#0a0';
      ctx.fillText(ch, i * 14, drops[i] * 14);
      if (drops[i] * 14 > h && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    rafId = requestAnimationFrame(draw);
  }
  window._toggleMatrix = function() {
    active = !active;
    c.classList.toggle('active', active);
    if (active) { resize(); draw(); playSound('whoosh'); }
    else { cancelAnimationFrame(rafId); ctx.clearRect(0,0,w,h); }
  };
})();

// =============================================================
//  21. NETWORK GRAPH — live animated node connections
// =============================================================
function initNetworkGraph(canvasEl) {
  if (!canvasEl) return;
  const ctx = canvasEl.getContext('2d');
  const w = canvasEl.width = canvasEl.offsetWidth;
  const h = canvasEl.height = canvasEl.offsetHeight;
  const nodes = [];
  const labels = ['Chat API','MongoDB','Claude CLI','Playbook','Gmail','Calendar','Triage','SSE Stream','Image Archive','Webhook'];
  for (let i = 0; i < labels.length; i++) {
    const angle = (i / labels.length) * Math.PI * 2;
    const rx = w * 0.35, ry = h * 0.35;
    nodes.push({
      x: w/2 + Math.cos(angle) * rx + (Math.random()-.5)*30,
      y: h/2 + Math.sin(angle) * ry + (Math.random()-.5)*20,
      vx: 0, vy: 0, r: 4 + Math.random()*3,
      label: labels[i],
      pulse: Math.random() * Math.PI * 2,
      active: Math.random() > 0.4
    });
  }
  // Edges
  const edges = [];
  for (let i = 0; i < nodes.length; i++) {
    const count = 1 + Math.floor(Math.random()*2);
    for (let c = 0; c < count; c++) {
      const j = (i + 1 + Math.floor(Math.random()*(nodes.length-2))) % nodes.length;
      edges.push([i, j, Math.random()]);
    }
  }
  let t = 0;
  function draw() {
    ctx.clearRect(0, 0, w, h);
    t++;
    // Edges with flowing data packets
    for (const [a, b, phase] of edges) {
      const na = nodes[a], nb = nodes[b];
      ctx.beginPath(); ctx.moveTo(na.x, na.y); ctx.lineTo(nb.x, nb.y);
      ctx.strokeStyle = 'rgba(99,102,241,0.08)'; ctx.lineWidth = 1; ctx.stroke();
      // Data packet flowing along edge
      const progress = ((t * 0.008 + phase) % 1);
      const px = na.x + (nb.x - na.x) * progress;
      const py = na.y + (nb.y - na.y) * progress;
      ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(99,102,241,${0.3 + Math.sin(t*0.05)*0.15})`; ctx.fill();
    }
    // Nodes
    for (const n of nodes) {
      n.pulse += 0.03;
      const glow = n.active ? 0.15 + Math.sin(n.pulse) * 0.08 : 0.05;
      // Glow ring
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r + 6, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(99,102,241,${glow * 0.3})`; ctx.fill();
      // Node
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = n.active ? `rgba(99,102,241,${0.6 + glow})` : 'rgba(99,102,241,0.2)'; ctx.fill();
      // Label
      ctx.fillStyle = `rgba(255,255,255,${n.active ? 0.5 : 0.25})`; ctx.font = '9px system-ui';
      ctx.textAlign = 'center'; ctx.fillText(n.label, n.x, n.y + n.r + 12);
      // Slight drift
      n.x += Math.sin(t * 0.01 + n.pulse) * 0.15;
      n.y += Math.cos(t * 0.012 + n.pulse) * 0.1;
    }
    requestAnimationFrame(draw);
  }
  draw();
}

// =============================================================
//  22. UNIFIED KEYBOARD HANDLER — 12+ shortcuts
// =============================================================
let kbdOverlayOpen = false;
document.addEventListener('keydown', e => {
  // Command palette
  if ((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); S.cmdOpen ? closeCmd() : openCmd(); return; }
  if (e.key==='Escape') {
    if (S.cmdOpen) closeCmd();
    if (kbdOverlayOpen) closeKbdOverlay();
    closeCtxMenu();
    return;
  }
  if (S.cmdOpen) {
    if (e.key==='Enter') { const s = document.querySelector('.cmd-i.sel'); if (s) execCmd(parseInt(s.dataset.i)); }
    // Arrow keys in command palette
    if (e.key==='ArrowDown'||e.key==='ArrowUp') {
      e.preventDefault();
      const items = [...document.querySelectorAll('.cmd-i')];
      const cur = items.findIndex(i=>i.classList.contains('sel'));
      items.forEach(i=>i.classList.remove('sel'));
      const next = e.key==='ArrowDown' ? Math.min(cur+1,items.length-1) : Math.max(cur-1,0);
      items[next]?.classList.add('sel');
      items[next]?.scrollIntoView({block:'nearest'});
    }
    return;
  }
  // Ctrl+Shift combos
  if (e.ctrlKey && e.shiftKey) {
    if (e.key==='M') { e.preventDefault(); window._toggleMatrix?.(); }
    if (e.key==='T') { e.preventDefault(); cycleTheme(); }
    if (e.key==='C') { e.preventDefault(); fireConfetti(); }
    if (e.key==='S') { e.preventDefault(); toggleSound(); }
    return;
  }
  // ? = keyboard shortcuts overlay
  if (e.key==='?' && !e.ctrlKey && !e.metaKey) { e.preventDefault(); toggleKbdOverlay(); return; }
  // Vim-style navigation: j/k to move, Enter to select
  if (e.key==='j'||e.key==='k') {
    const items = [...document.querySelectorAll('.v.active tr.si, .v.active .inv-c, .v.active .email-row, .v.active .sb-conv')];
    if (!items.length) return;
    const cur = items.findIndex(i=>i.classList.contains('vim-focus'));
    items.forEach(i=>i.classList.remove('vim-focus'));
    let next;
    if (cur===-1) next = 0;
    else next = e.key==='j' ? Math.min(cur+1,items.length-1) : Math.max(cur-1,0);
    items[next]?.classList.add('vim-focus');
    items[next]?.scrollIntoView({block:'nearest',behavior:'smooth'});
    playSound('hover');
  }
  if (e.key==='Enter') {
    const focused = document.querySelector('.vim-focus');
    if (focused) { focused.click(); focused.classList.remove('vim-focus'); }
  }
  // Number keys 1-9 to navigate sidebar
  if (e.key>='1' && e.key<='9' && !e.ctrlKey && !e.metaKey && !e.altKey) {
    const idx = parseInt(e.key) - 1;
    if (NI[idx]) { e.preventDefault(); nav(NI[idx].id); }
  }
  // g then d/c/i/a for quick nav (single press, no modifier)
  if (e.key==='g') { window._gPrefix = true; setTimeout(()=>{window._gPrefix=false},500); return; }
  if (window._gPrefix) {
    window._gPrefix = false;
    if (e.key==='c') nav('chat');
    if (e.key==='d') nav('dashboard');
    if (e.key==='i') nav('investigations');
    if (e.key==='a') nav('analytics');
    if (e.key==='s') nav('settings');
    if (e.key==='w') nav('workspace');
  }
});

      {icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>', label:'Share Link', action:'share'},
    ]);
    return;
  }
  // General context menu on cards
  const card = e.target.closest('.inv-c,.ws-card,.pb-card,.gal-card,.ship-card');
  if (card) {
    e.preventDefault();
    showCtxMenu(e.clientX, e.clientY, [
      {label:'Actions', isLabel:true},
      {icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>', label:'Open', action:'open'},
      {icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2"/></svg>', label:'AI Analyze', action:'analyze'},
      {icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/></svg>', label:'Copy to Clipboard', action:'copy'},
      {sep:true},
      {icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>', label:'Celebrate', action:'confetti'},
    ]);
    return;
  }
});

// Close context menu on click elsewhere
document.addEventListener('click', closeCtxMenu);

// =============================================================
//  25. TABLE SORT — clickable column headers
// =============================================================
let sortCol = null, sortDir = 'asc';
document.addEventListener('click', e => {
  const th = e.target.closest('.dt th.sortable');
  if (!th) return;
  const col = th.dataset.col;
  if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'asc'; }
  // Update header classes
  th.closest('thead').querySelectorAll('th').forEach(h=>h.classList.remove('asc','desc'));
  th.classList.add(sortDir);
  // Sort visible rows
  const tbody = th.closest('table').querySelector('tbody');
  const rows = [...tbody.querySelectorAll('tr')];
  rows.sort((a,b) => {
    const ai = a.querySelector(`td:nth-child(${th.cellIndex+1})`);
    const bi = b.querySelector(`td:nth-child(${th.cellIndex+1})`);
    if (!ai||!bi) return 0;
    const av = ai.textContent.trim(), bv = bi.textContent.trim();
    const cmp = av.localeCompare(bv, undefined, {numeric:true});
    return sortDir === 'asc' ? cmp : -cmp;
  });
  rows.forEach(r=>tbody.appendChild(r));
  playSound('click');
  // Re-stagger
  stagger(tbody, 'tr.si', 20);
});

// === INIT ===
function init() {
  renderSB();
  render();
  const hb = document.getElementById('hb');
  hb.style.display = 'flex';
  document.getElementById('hbTxt').textContent = 'All systems operational — Motion Design v2 loaded. ' + ESC.length + ' escalations, ' + INV.length + ' investigations tracked.';
  setTimeout(() => hb.style.display = 'none', 5000);
  const chk = () => document.getElementById('mobBtn').style.display = window.innerWidth <= 768 ? 'flex' : 'none';
  chk(); window.addEventListener('resize', chk);
  document.getElementById('gSearch').addEventListener('focus', e => { e.target.blur(); openCmd(); });

  // Make header buttons magnetic
  document.querySelectorAll('.hdr-btn').forEach(b => initMagnetic(b, 0.2));
  document.querySelectorAll('.sb-logo').forEach(b => initMagnetic(b, 0.3));

  // Cinematic entrance
  const overlay = document.getElementById('cinematicOverlay');
  if (overlay) {
    setTimeout(() => { overlay.classList.add('done'); playSound('whoosh'); }, 1800);
    setTimeout(() => overlay.remove(), 2600);
  }
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>

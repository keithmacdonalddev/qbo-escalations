<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QBO Escalation Assistant — Motion Design</title>
<style>
/* ============================================================
   ANIMATION & MOTION DESIGN PROTOTYPE — V2 OVERHAUL
   ============================================================
   PHILOSOPHY: Every pixel BREATHES. Every surface FLOWS. Every
   interaction triggers a CASCADE of choreographed responses.
   Nothing is static. Nothing is dead. This is a living interface
   that responds to you like a sentient organism.

   SYSTEMS:
   1. Aurora Canvas — generative fluid background
   2. Spring Physics — no linear easing ANYWHERE
   3. Magnetic Cursor — elements attracted to pointer
   4. 3D Parallax Cards — multi-layer depth
   5. Scroll-Driven Reveals — cinematic entrance choreography
   6. Click Explosions — particle bursts on interaction
   7. Web Audio — spatial sound tied to motion events
   8. Morphing Transitions — dimensional view changes
   9. Ambient Breathing — idle pulse on all surfaces
   10. Live Data Visualization — flowing, animated charts
   11. Cursor Trail — luminous path following mouse
   12. Liquid Glass Surfaces — frosted depth with refraction
   ============================================================ */

/* --- RESET & FOUNDATIONS ---------------------------------- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  /* ========= MOTION TOKEN SYSTEM (Level 1 — Duration) ========= */
  --dur-instant: 50ms;
  --dur-micro: 100ms;
  --dur-fast: 150ms;
  --dur-normal: 200ms;
  --dur-emphasis: 300ms;
  --dur-slow: 400ms;
  --dur-dramatic: 700ms;
  --dur-cinematic: 1s;
  --dur-ambient: 3s;
  --dur-glacial: 5s;
  --dur-eternal: 10s;
  --dur-none: 0ms;

  /* ========= MOTION TOKEN SYSTEM (Level 2 — Easing) ========= */
  --ease-standard: cubic-bezier(.4,0,.2,1);
  --ease-decel: cubic-bezier(0,0,.2,1);
  --ease-accel: cubic-bezier(.4,0,1,1);
  --ease-spring: cubic-bezier(.34,1.56,.64,1);
  --ease-apple: cubic-bezier(.25,.1,.25,1);
  --ease-out-expo: cubic-bezier(.16,1,.3,1);
  --ease-bounce: cubic-bezier(.34,1.8,.64,1);
  --ease-elastic: cubic-bezier(.68,-.55,.265,1.55);
  --ease-smooth: cubic-bezier(.45,.05,.55,.95);
  --ease-in-out-quart: cubic-bezier(.76,0,.24,1);
  --ease-out-back: cubic-bezier(.34,1.3,.64,1);
  --ease-in-expo: cubic-bezier(.7,0,.84,0);
  --ease-rubber: cubic-bezier(.25,1.5,.5,1);
  --ease-whip: cubic-bezier(.2,1.4,.4,1);

  /* ========= MOTION TOKEN SYSTEM (Level 3 — Spring) ========= */
  --spring-snappy: 400 30 1;
  --spring-gentle: 200 25 1;
  --spring-layout: 500 35 0.8;
  --spring-bouncy: 300 10 0.5;
  --spring-heavy: 150 30 2;
  --spring-instant: 700 40 0.5;

  /* ========= MOTION TOKEN SYSTEM (Level 4 — Stagger) ========= */
  --stagger-tight: 25ms;
  --stagger-normal: 35ms;
  --stagger-loose: 50ms;
  --stagger-dramatic: 80ms;
  --stagger-cap: 12;

  /* ========= MOTION TOKEN SYSTEM (Level 5 — Scale) ========= */
  --scale-press: 0.96;
  --scale-hover: 1.02;
  --scale-pop: 1.08;
  --scale-shrink: 0.92;
  --scale-enter: 0.95;
  --scale-exit: 0.98;

  /* ========= MOTION TOKEN SYSTEM (Level 6 — Translate) ========= */
  --shift-enter: 14px;
  --shift-exit: -8px;
  --shift-hover: -2px;
  --shift-subtle: 3px;
  --shift-bounce: 5px;
  --shift-msg-left: -18px;
  --shift-msg-right: 18px;

  /* ========= MOTION TOKEN SYSTEM (Level 7 — Rotation) ========= */
  --rot-tilt-max: 5deg;
  --rot-logo-hover: 5deg;
  --rot-icon-hover: -4deg;
  --rot-gear: 135deg;
  --rot-spin: 360deg;
  --rot-wiggle: 2deg;

  /* ========= MOTION TOKEN SYSTEM (Level 8 — Blur) ========= */
  --blur-backdrop: 20px;
  --blur-overlay: 6px;
  --blur-ambient: 100px;
  --blur-glow: 30px;
  --blur-subtle: 4px;
  --blur-toast: 8px;
  --blur-glass: 24px;

  /* ========= MOTION TOKEN SYSTEM (Level 9 — Opacity) ========= */
  --opacity-ghost: 0.02;
  --opacity-grain: 0.018;
  --opacity-hint: 0.04;
  --opacity-muted: 0.25;
  --opacity-faded: 0.35;
  --opacity-dimmed: 0.5;
  --opacity-soft: 0.65;
  --opacity-visible: 0.85;
  --opacity-full: 1;

  /* ========= COLOR SYSTEM — Base Palette ========= */
  --color-indigo-50: #eef2ff;
  --color-indigo-100: #e0e7ff;
  --color-indigo-200: #c7d2fe;
  --color-indigo-300: #a5b4fc;
  --color-indigo-400: #818cf8;
  --color-indigo-500: #6366f1;
  --color-indigo-600: #4f46e5;
  --color-indigo-700: #4338ca;
  --color-indigo-800: #3730a3;
  --color-indigo-900: #312e81;

  --color-purple-400: #c084fc;
  --color-purple-500: #a855f7;
  --color-purple-600: #9333ea;

  --color-blue-400: #60a5fa;
  --color-blue-500: #3b82f6;
  --color-blue-600: #2563eb;

  --color-green-400: #4ade80;
  --color-green-500: #22c55e;
  --color-green-600: #16a34a;

  --color-yellow-400: #fbbf24;
  --color-yellow-500: #f59e0b;
  --color-yellow-600: #d97706;

  --color-red-400: #f87171;
  --color-red-500: #ef4444;
  --color-red-600: #dc2626;

  --color-pink-400: #f472b6;
  --color-pink-500: #ec4899;
  --color-cyan-400: #22d3ee;
  --color-cyan-500: #06b6d4;
  --color-orange-400: #fb923c;
  --color-orange-500: #f97316;
  --color-teal-400: #2dd4bf;
  --color-teal-500: #14b8a6;

  /* ========= COLOR SYSTEM — Semantic Surfaces ========= */
  --bg-root: #08080d;
  --bg-surface: #0e0e16;
  --bg-elevated: #161620;
  --bg-hover: #1e1e2c;
  --bg-active: #282838;
  --bg-pressed: #323248;
  --bg-sunken: #060609;
  --bg-overlay: rgba(0,0,0,.55);
  --bg-frosted: rgba(14,14,22,.85);
  --bg-scrim: rgba(0,0,0,.35);

  /* ========= COLOR SYSTEM — Brand / Accent ========= */
  --bg-accent: var(--color-indigo-500);
  --bg-accent-hover: var(--color-indigo-400);
  --bg-accent-pressed: var(--color-indigo-600);
  --bg-accent-subtle: rgba(99,102,241,.1);
  --bg-accent-muted: rgba(99,102,241,.06);

  /* ========= COLOR SYSTEM — Semantic Status ========= */
  --bg-success: rgba(34,197,94,.1);
  --bg-success-solid: var(--color-green-500);
  --bg-warning: rgba(245,158,11,.1);
  --bg-warning-solid: var(--color-yellow-500);
  --bg-danger: rgba(239,68,68,.1);
  --bg-danger-solid: var(--color-red-500);
  --bg-info: rgba(59,130,246,.1);
  --bg-info-solid: var(--color-blue-500);

  /* ========= COLOR SYSTEM — Ink / Text ========= */
  --ink-primary: #eaeaf2;
  --ink-secondary: #8888a0;
  --ink-tertiary: #55556a;
  --ink-quaternary: #3a3a4e;
  --ink-disabled: #33334a;
  --ink-inverse: #08080d;
  --ink-accent: var(--color-indigo-300);
  --ink-accent-bright: var(--color-indigo-200);
  --ink-success: var(--color-green-500);
  --ink-warning: var(--color-yellow-500);
  --ink-danger: var(--color-red-500);
  --ink-info: var(--color-blue-400);
  --ink-link: var(--color-indigo-300);
  --ink-link-hover: var(--color-indigo-200);

  /* ========= COLOR SYSTEM — Borders ========= */
  --border: rgba(255,255,255,.06);
  --border-hover: rgba(255,255,255,.12);
  --border-focus: rgba(255,255,255,.18);
  --border-accent: rgba(99,102,241,.35);
  --border-accent-strong: rgba(99,102,241,.6);
  --border-success: rgba(34,197,94,.3);
  --border-warning: rgba(245,158,11,.3);
  --border-danger: rgba(239,68,68,.3);
  --border-subtle: rgba(255,255,255,.03);

  /* ========= COLOR SYSTEM — Shadows ========= */
  --shadow-xs: 0 1px 1px rgba(0,0,0,.2);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3);
  --shadow-md: 0 4px 16px rgba(0,0,0,.4);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.6);
  --shadow-xl: 0 24px 64px rgba(0,0,0,.7);
  --shadow-glow: 0 0 30px rgba(99,102,241,.12);
  --shadow-glow-lg: 0 0 60px rgba(99,102,241,.15);
  --shadow-accent: 0 4px 14px rgba(99,102,241,.25);
  --shadow-success: 0 4px 14px rgba(34,197,94,.2);
  --shadow-danger: 0 4px 14px rgba(239,68,68,.2);
  --shadow-inner: inset 0 1px 3px rgba(0,0,0,.3);
  --shadow-ring: 0 0 0 3px rgba(99,102,241,.08);

  /* ========= SPACING ========= */
  --space-0: 0;
  --space-1: 2px;
  --space-2: 4px;
  --space-3: 6px;
  --space-4: 8px;
  --space-5: 10px;
  --space-6: 12px;
  --space-7: 14px;
  --space-8: 16px;
  --space-9: 18px;
  --space-10: 20px;
  --space-12: 24px;
  --space-14: 28px;
  --space-16: 32px;
  --space-20: 40px;
  --space-24: 48px;
  --space-32: 64px;

  /* ========= RADIUS ========= */
  --radius-none: 0;
  --radius-xs: 3px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  --radius-2xl: 28px;
  --radius-full: 9999px;

  /* ========= TYPOGRAPHY ========= */
  --font-sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
  --font-serif: 'Georgia', 'Times New Roman', serif;

  --text-xs: 9px;
  --text-sm: 10.5px;
  --text-base: 12px;
  --text-md: 12.5px;
  --text-lg: 13px;
  --text-xl: 14px;
  --text-2xl: 16px;
  --text-3xl: 18px;
  --text-4xl: 20px;
  --text-5xl: 24px;
  --text-6xl: 30px;
  --text-hero: 48px;

  --leading-tight: 1.2;
  --leading-snug: 1.3;
  --leading-normal: 1.5;
  --leading-relaxed: 1.65;
  --leading-loose: 1.8;

  --weight-regular: 400;
  --weight-medium: 500;
  --weight-semibold: 600;
  --weight-bold: 700;
  --weight-extrabold: 800;

  --tracking-tight: -0.01em;
  --tracking-normal: 0;
  --tracking-wide: 0.06em;
  --tracking-wider: 0.1em;

  /* ========= LAYOUT ========= */
  --sidebar-w: 250px;
  --sidebar-cw: 52px;
  --header-h: 46px;
  --dock-h: 44px;
  --copilot-w: 320px;
  --detail-aside: 300px;
  --max-chat-w: 72%;
  --max-content-w: 1200px;
  --max-settings-w: 640px;

  /* ========= Z-INDEX ========= */
  --z-base: 1;
  --z-content: 2;
  --z-sticky: 5;
  --z-header: 50;
  --z-sidebar: 100;
  --z-dropdown: 500;
  --z-overlay: 9000;
  --z-modal: 9001;
  --z-toast: 9500;
  --z-cursor: 9999;
  --z-cmdpal: 10001;

  /* ========= COMPONENT TOKENS ========= */
  --card-padding: var(--space-7);
  --card-gap: var(--space-5);
  --card-radius: var(--radius-lg);
  --btn-height: 32px;
  --btn-height-sm: 26px;
  --btn-height-lg: 38px;
  --input-height: 34px;
  --toggle-w: 36px;
  --toggle-h: 20px;
  --toggle-knob: 14px;
  --avatar-sm: 26px;
  --avatar-md: 34px;
  --avatar-lg: 42px;
  --badge-height: 16px;
  --dot-size: 6px;
  --indicator-w: 3px;
  --indicator-h: 18px;
  --progress-h: 3px;
  --skeleton-speed: 1.4s;
  --toast-max-w: 360px;
  --modal-min-w: 380px;
  --modal-max-w: 560px;
  --cmd-w: 480px;
  --bar-chart-h: 110px;
  --donut-size: 110px;

  /* ========= PARTICLE SYSTEM ========= */
  --particle-count: 60;
  --particle-speed: 0.3;
  --particle-radius-min: 0.5;
  --particle-radius-max: 2.5;
  --particle-opacity-min: 0.03;
  --particle-opacity-max: 0.18;
  --particle-connect-dist: 140px;
  --particle-color: 99,102,241;

  /* ========= CURSOR GLOW ========= */
  --glow-size: 500px;
  --glow-color: rgba(99,102,241,.06);
  --glow-lerp: 0.08;

  /* ========= AMBIENT ========= */
  --ambient-orb-opacity: 0.04;
  --ambient-green-opacity: 0.025;
  --orb1-color: var(--color-indigo-500);
  --orb2-color: var(--color-purple-500);
  --orb3-color: var(--color-blue-500);
  --orb4-color: var(--color-green-500);
  --orb5-color: var(--color-pink-500);
  --orb6-color: var(--color-cyan-500);

  /* ========= GRADIENT ========= */
  --gradient-brand: linear-gradient(135deg, var(--color-indigo-500), var(--color-purple-500));
  --gradient-brand-subtle: linear-gradient(135deg, rgba(99,102,241,.02), transparent);
  --gradient-shimmer: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-hover) 37%, var(--bg-elevated) 63%);
  --gradient-bar-shine: linear-gradient(to top, transparent, rgba(255,255,255,.08));
  --gradient-logo-shine: linear-gradient(135deg, transparent 40%, rgba(255,255,255,.25));
  --gradient-progress-shim: linear-gradient(90deg, transparent, rgba(255,255,255,.25));
  --gradient-aurora: linear-gradient(135deg, rgba(99,102,241,.05), rgba(168,85,247,.03), rgba(59,130,246,.04), rgba(34,197,94,.02));
  --gradient-glass: linear-gradient(135deg, rgba(255,255,255,.03), rgba(255,255,255,.01));

  /* ========= SCROLLBAR ========= */
  --scrollbar-w: 5px;
  --scrollbar-track: transparent;
  --scrollbar-thumb: rgba(255,255,255,.08);
  --scrollbar-thumb-hover: rgba(255,255,255,.15);

  /* ========= BREAKPOINTS (documented, used in media queries) ========= */
  --bp-mobile: 768px;
  --bp-tablet: 1100px;
  --bp-desktop: 1400px;

  /* ========= BREATHING SYSTEM ========= */
  --breathe-scale: 1.003;
  --breathe-dur: 4s;
  --breathe-border-dur: 6s;
}

/* ========= LIGHT THEME OVERRIDES ========= */
[data-theme="light"] {
  --bg-root: #f5f5f7;
  --bg-surface: #ffffff;
  --bg-elevated: #f0f0f3;
  --bg-hover: #e8e8ed;
  --bg-active: #d8d8e0;
  --bg-frosted: rgba(255,255,255,.85);
  --bg-overlay: rgba(0,0,0,.3);
  --ink-primary: #1a1a2e;
  --ink-secondary: #666680;
  --ink-tertiary: #9999aa;
  --border: rgba(0,0,0,.08);
  --border-hover: rgba(0,0,0,.14);
  --shadow-sm: 0 1px 2px rgba(0,0,0,.1);
  --shadow-md: 0 4px 16px rgba(0,0,0,.12);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.15);
  --ambient-orb-opacity: 0.015;
  --opacity-grain: 0.008;
  --particle-opacity-min: 0.02;
  --particle-opacity-max: 0.08;
}

html{font-size:var(--text-xl)}
body{font-family:var(--font-sans);background:var(--bg-root);color:var(--ink-primary);overflow:hidden;height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}

::-webkit-scrollbar{width:var(--scrollbar-w);height:var(--scrollbar-w)}
::-webkit-scrollbar-track{background:var(--scrollbar-track)}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:var(--radius-xs)}
::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-thumb-hover)}
:focus-visible{outline:2px solid var(--bg-accent);outline-offset:2px}
::selection{background:rgba(99,102,241,.3);color:#fff}

/* === AURORA CANVAS === fluid generative background */
#auroraCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.7}

/* === CURSOR GLOW TRAIL === */
#cursorGlow{position:fixed;width:var(--glow-size);height:var(--glow-size);pointer-events:none;z-index:var(--z-cursor);
  background:radial-gradient(circle,var(--glow-color) 0%,rgba(99,102,241,.02) 40%,transparent 70%);
  transform:translate(-50%,-50%);transition:none;will-change:left,top;opacity:0;
  mix-blend-mode:screen}
#cursorGlow.visible{opacity:var(--opacity-full)}

/* === CURSOR TRAIL DOTS === luminous path */
.cursor-trail{position:fixed;pointer-events:none;z-index:9998;border-radius:50%;
  background:radial-gradient(circle,rgba(99,102,241,.4),transparent);
  will-change:transform,opacity}

/* === CLICK EXPLOSION PARTICLES === */
.click-particle{position:fixed;pointer-events:none;z-index:9997;border-radius:50%;will-change:transform,opacity}

/* === AMBIENT BACKGROUND === */
.ambient{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.ambient .orb{position:absolute;border-radius:50%;filter:blur(var(--blur-ambient));opacity:var(--ambient-orb-opacity);will-change:transform}
.ambient .orb:nth-child(1){width:700px;height:700px;top:-180px;left:-120px;background:var(--orb1-color);animation:orb-a 25s ease-in-out infinite alternate}
.ambient .orb:nth-child(2){width:600px;height:600px;bottom:-140px;right:-100px;background:var(--orb2-color);animation:orb-b 30s ease-in-out infinite alternate}
.ambient .orb:nth-child(3){width:500px;height:500px;top:40%;left:40%;background:var(--orb3-color);animation:orb-c 22s ease-in-out infinite alternate}
.ambient .orb:nth-child(4){width:350px;height:350px;top:20%;right:20%;background:var(--orb4-color);animation:orb-d 28s ease-in-out infinite alternate;opacity:var(--ambient-green-opacity)}
.ambient .orb:nth-child(5){width:400px;height:400px;bottom:30%;left:10%;background:var(--orb5-color);animation:orb-e 35s ease-in-out infinite alternate;opacity:0.02}
.ambient .orb:nth-child(6){width:300px;height:300px;top:60%;right:30%;background:var(--orb6-color);animation:orb-f 20s ease-in-out infinite alternate;opacity:0.018}

@keyframes orb-a{0%{transform:translate(0,0) scale(1) rotate(0deg)}33%{transform:translate(80px,-50px) scale(1.15) rotate(5deg)}66%{transform:translate(-40px,60px) scale(.9) rotate(-3deg)}100%{transform:translate(-30px,50px) scale(.95) rotate(2deg)}}
@keyframes orb-b{0%{transform:translate(0,0) scale(1) rotate(0deg)}33%{transform:translate(-60px,40px) scale(1.1) rotate(-4deg)}66%{transform:translate(50px,-30px) scale(.85) rotate(6deg)}100%{transform:translate(40px,-20px) scale(.9) rotate(-2deg)}}
@keyframes orb-c{0%{transform:translate(-50%,-50%) scale(1)}33%{transform:translate(calc(-50% + 50px),calc(-50% - 40px)) scale(1.12)}66%{transform:translate(calc(-50% - 30px),calc(-50% + 50px)) scale(.88)}100%{transform:translate(calc(-50% - 20px),calc(-50% + 40px)) scale(.92)}}
@keyframes orb-d{0%{transform:scale(1) rotate(0deg)}33%{transform:scale(1.2) rotate(10deg)}66%{transform:scale(.8) rotate(-5deg)}100%{transform:scale(.85) rotate(3deg)}}
@keyframes orb-e{0%{transform:translate(0,0) scale(1)}50%{transform:translate(70px,-60px) scale(1.15)}100%{transform:translate(-40px,30px) scale(.9)}}
@keyframes orb-f{0%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,40px) scale(1.1)}100%{transform:translate(30px,-20px) scale(.95)}}

.grain{position:fixed;inset:0;z-index:var(--z-base);pointer-events:none;opacity:var(--opacity-grain);
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;animation:grain-drift 8s linear infinite}
@keyframes grain-drift{0%{transform:translate(0,0)}100%{transform:translate(-200px,-200px)}}

/* === BREATHING ANIMATION === everything alive */
@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(var(--breathe-scale))}}
@keyframes breathe-border{0%,100%{border-color:var(--border)}50%{border-color:var(--border-hover)}}
@keyframes breathe-glow{0%,100%{box-shadow:var(--shadow-xs)}50%{box-shadow:var(--shadow-sm),0 0 8px rgba(99,102,241,.04)}}
@keyframes float-y{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes float-xy{0%,100%{transform:translate(0,0) rotate(0deg)}25%{transform:translate(2px,-3px) rotate(.5deg)}50%{transform:translate(-1px,-5px) rotate(-.3deg)}75%{transform:translate(-3px,-2px) rotate(.2deg)}}
@keyframes shimmer-edge{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse-soft{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes color-shift{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(15deg)}}

/* === APP SHELL === */
.app{display:flex;height:100vh;position:relative;z-index:var(--z-content)}

/* === SIDEBAR === */
.sidebar{width:var(--sidebar-w);height:100vh;background:var(--bg-surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;position:relative;z-index:var(--z-sidebar);overflow:hidden;flex-shrink:0;
  transition:width var(--dur-emphasis) var(--ease-out-expo);
  animation:breathe-border var(--breathe-border-dur) ease-in-out infinite}
.sidebar::before{content:'';position:absolute;inset:0;background:var(--gradient-glass);pointer-events:none;z-index:1}

.sb-head{padding:var(--space-5);display:flex;align-items:center;gap:var(--space-4);border-bottom:1px solid var(--border);min-height:48px;overflow:hidden}

.sb-logo::after{content:'';position:absolute;inset:0;background:var(--gradient-logo-shine);
  opacity:0;transition:opacity var(--dur-fast)}
.sb-logo::before{content:'';position:absolute;inset:-2px;border-radius:var(--radius-md);
  background:conic-gradient(from 0deg,transparent,rgba(99,102,241,.3),transparent,rgba(168,85,247,.3),transparent);
  animation:spin 4s linear infinite;opacity:0;transition:opacity var(--dur-normal)}

  transition:all var(--dur-fast)}

.sb-item{display:flex;align-items:center;gap:var(--space-4);padding:7px 9px;border-radius:var(--radius-md);cursor:pointer;color:var(--ink-secondary);font-size:var(--text-md);font-weight:var(--weight-medium);white-space:nowrap;position:relative;overflow:hidden;
  transition:color var(--dur-fast),background var(--dur-fast),transform var(--dur-fast) var(--ease-spring);user-select:none}
.sb-item::before{content:'';position:absolute;inset:0;border-radius:var(--radius-md);opacity:0;transition:opacity var(--dur-fast)}
.sb-item:hover{color:var(--ink-primary);background:var(--bg-hover);transform:translateX(3px)}
.sb-item:active{transform:scale(var(--scale-press)) translateX(1px)}
.sb-item.active{color:var(--ink-accent);background:var(--bg-accent-subtle)}
.sb-item.active::after{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:var(--indicator-w);height:var(--indicator-h);border-radius:var(--radius-full);background:var(--bg-accent);box-shadow:0 0 10px rgba(99,102,241,.5),0 0 20px rgba(99,102,241,.2);
  animation:indicator-in var(--dur-emphasis) var(--ease-spring)}

.sb-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform var(--dur-fast) var(--ease-spring)}

.sb-badge{margin-left:auto;background:var(--bg-accent);color:#fff;font-size:var(--text-xs);font-weight:var(--weight-bold);padding:1px 5px;border-radius:var(--radius-full);min-width:var(--badge-height);text-align:center;

  transition:all var(--dur-fast) var(--ease-spring)}

/* === MAIN AREA === */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

/* === HEADER === with liquid glass effect */
.header{height:var(--header-h);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 var(--space-7);gap:var(--space-5);
  background:var(--bg-frosted);backdrop-filter:blur(var(--blur-glass)) saturate(1.8);-webkit-backdrop-filter:blur(var(--blur-glass)) saturate(1.8);

  animation:breathe-border var(--breathe-border-dur) ease-in-out infinite}

  background:linear-gradient(90deg,transparent,rgba(99,102,241,.15),rgba(168,85,247,.1),rgba(59,130,246,.15),transparent);
  animation:shimmer-edge 4s linear infinite;background-size:200% 100%}

.hdr-crumb{display:flex;align-items:center;gap:5px;font-size:var(--text-base);font-weight:var(--weight-medium);color:var(--ink-secondary)}

.hdr-search{flex:1;max-width:380px;margin:0 auto;position:relative}
.hdr-search input{width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-full);
  padding:5px 12px 5px 30px;color:var(--ink-primary);font-size:var(--text-base);outline:none;
  transition:all var(--dur-normal) var(--ease-spring)}

.hdr-search input:focus{border-color:var(--border-accent);box-shadow:var(--shadow-ring),0 0 20px rgba(99,102,241,.08);background:var(--bg-hover);transform:scaleX(1.02)}
.hdr-search .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--ink-tertiary);pointer-events:none;transition:color var(--dur-fast),transform var(--dur-fast) var(--ease-spring)}
.hdr-search input:focus~.si{color:var(--ink-accent);transform:translateY(-50%) scale(1.1)}
.hdr-search .kbd{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:var(--text-xs);font-family:var(--font-mono);color:var(--ink-tertiary);border:1px solid var(--border);padding:1px 4px;border-radius:3px;background:var(--bg-surface)}

.hdr-actions{display:flex;align-items:center;gap:var(--space-1)}
.hdr-btn{background:none;border:none;color:var(--ink-secondary);cursor:pointer;padding:7px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;position:relative;
  transition:all var(--dur-fast) var(--ease-spring)}
.hdr-btn:hover{color:var(--ink-primary);background:var(--bg-hover);transform:scale(1.1)}
.hdr-btn:active{transform:scale(.85);transition:transform var(--dur-instant)}
.hdr-btn .ndot{position:absolute;top:5px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--ink-danger);animation:pulse-ring 2s ease-in-out infinite}
@keyframes pulse-ring{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{box-shadow:0 0 0 6px rgba(239,68,68,0)}}

/* === VIEW SYSTEM === with morphing transitions */
.content-wrap{flex:1;display:flex;min-height:0;position:relative;overflow:hidden}
.views{flex:1;position:relative;overflow:hidden;perspective:1200px}
.v{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:var(--space-9) 22px;
  opacity:0;transform:translateY(var(--shift-enter)) scale(var(--scale-enter));pointer-events:none;
  transition:opacity var(--dur-normal) var(--ease-decel),transform var(--dur-emphasis) var(--ease-out-expo)}
.v.active{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;position:relative}
.v.exit{opacity:0;transform:translateY(var(--shift-exit)) scale(var(--scale-exit)) rotateX(2deg)}

/* === STAGGER ITEMS === with spring entrance */
.si{opacity:0;transform:translateY(var(--shift-enter))}
.si.in{opacity:1;transform:translateY(0);transition:opacity var(--dur-emphasis) var(--ease-decel),transform var(--dur-emphasis) var(--ease-rubber)}

/* === CARDS === with ambient breathing + glass */
.card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:var(--card-padding);
  position:relative;overflow:hidden;
  transition:border-color var(--dur-normal),transform var(--dur-normal) var(--ease-spring),box-shadow var(--dur-normal);
  animation:breathe var(--breathe-dur) ease-in-out infinite,breathe-glow 6s ease-in-out infinite}
.card::before{content:'';position:absolute;inset:0;background:var(--gradient-brand-subtle);opacity:0;transition:opacity var(--dur-normal)}
.card::after{content:'';position:absolute;inset:0;background:var(--gradient-glass);pointer-events:none}
.card:hover{border-color:var(--border-hover)}
.card:hover::before{opacity:1}
.card.click{cursor:pointer}
.card.click:hover{transform:translateY(var(--shift-hover)) scale(1.005);box-shadow:var(--shadow-md),var(--shadow-glow)}
.card.click:active{transform:translateY(0) scale(.99);transition:transform var(--dur-instant)}

.tilt{transition:transform var(--dur-fast) var(--ease-standard),box-shadow var(--dur-fast);transform-style:preserve-3d}
.magnetic{transition:transform var(--dur-fast) var(--ease-standard)}

/* === STAT CARDS === with parallax layers */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:var(--space-5);margin-bottom:var(--space-9)}
.stat{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:var(--card-padding);position:relative;overflow:hidden;
  transition:all var(--dur-normal) var(--ease-spring);
  animation:breathe var(--breathe-dur) ease-in-out infinite}
.stat::before{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;
  background:radial-gradient(circle,rgba(99,102,241,.04),transparent 70%);
  transition:opacity var(--dur-normal);opacity:0}
.stat:hover::before{opacity:1}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-md),var(--shadow-glow)}
.stat .si-icon{width:var(--avatar-md);height:var(--avatar-md);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;margin-bottom:var(--space-5);
  transition:transform var(--dur-normal) var(--ease-spring)}
.stat:hover .si-icon{transform:scale(1.15) rotate(var(--rot-icon-hover))}
.stat .sv{font-size:26px;font-weight:var(--weight-bold);line-height:1;margin-bottom:var(--space-1);font-variant-numeric:tabular-nums;
  background:linear-gradient(135deg,var(--ink-primary),var(--ink-accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat .sl{font-size:11px;color:var(--ink-secondary);font-weight:var(--weight-medium)}
.stat .st{position:absolute;top:12px;right:12px;font-size:var(--text-sm);font-weight:var(--weight-semibold);display:flex;align-items:center;gap:2px;padding:2px 6px;border-radius:var(--radius-full)}
.st.up{color:var(--ink-success);background:var(--bg-success)}
.st.down{color:var(--ink-danger);background:var(--bg-danger)}

/* === BADGES === */
.bg{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:var(--radius-full);font-size:var(--text-sm);font-weight:var(--weight-semibold);white-space:nowrap;transition:all var(--dur-fast) var(--ease-spring)}

.bg-new{background:rgba(99,102,241,.1);color:var(--color-indigo-300)}

.sd{width:var(--dot-size);height:var(--dot-size);border-radius:50%;display:inline-block;flex-shrink:0;position:relative}
.sd::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:inherit;opacity:var(--opacity-muted);animation:sd-p 2s ease-in-out infinite}
.sd.open{background:var(--color-blue-500)}.sd.in-progress{background:var(--color-yellow-500)}.sd.resolved{background:var(--color-green-500)}.sd.escalated{background:var(--color-red-500)}.sd.new{background:var(--color-indigo-400)}
@keyframes sd-p{0%,100%{transform:scale(1);opacity:var(--opacity-muted)}50%{transform:scale(2);opacity:0}}

.pri{display:flex;gap:2px}
.pri b{width:3px;height:12px;border-radius:1.5px;background:var(--ink-tertiary);display:block;transition:transform var(--dur-fast) var(--ease-spring)}
.pri.p-high b{background:var(--ink-danger)}
.pri.p-high b:nth-child(1){animation:pw .5s ease-out .05s both}
.pri.p-high b:nth-child(2){animation:pw .5s ease-out .1s both}
.pri.p-high b:nth-child(3){animation:pw .5s ease-out .15s both}

@keyframes pw{0%{transform:scaleY(.4)}50%{transform:scaleY(1.4)}100%{transform:scaleY(1)}}

/* === BUTTONS === with spring physics */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--radius-md);font-size:var(--text-base);font-weight:var(--weight-medium);cursor:pointer;border:1px solid var(--border);background:var(--bg-elevated);color:var(--ink-primary);
  transition:all var(--dur-fast) var(--ease-spring);user-select:none;position:relative;overflow:hidden;height:var(--btn-height)}
.btn:hover{border-color:var(--border-hover);background:var(--bg-hover);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.btn:active{transform:scale(var(--scale-press)) translateY(0);transition:transform var(--dur-instant)}
.btn-p{background:var(--bg-accent);border-color:var(--bg-accent);color:#fff;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.btn-p:hover{background:var(--bg-accent-hover);border-color:var(--bg-accent-hover);box-shadow:0 4px 16px rgba(99,102,241,.4);transform:translateY(-2px)}
.btn-d{background:var(--bg-danger-solid);border-color:var(--bg-danger-solid);color:#fff}
.btn-d:hover{background:var(--color-red-600)}
.btn-ghost{background:transparent;border-color:transparent}
.btn-ghost:hover{background:var(--bg-hover)}
.btn-sm{padding:4px 8px;font-size:11px;height:var(--btn-height-sm)}
.btn-icon{padding:5px;width:28px;height:28px;display:flex;align-items:center;justify-content:center}

.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.15);transform:scale(0);animation:ripple-out .6s var(--ease-out-expo) forwards;pointer-events:none}
@keyframes ripple-out{to{transform:scale(4);opacity:0}}

/* === TABLE === with row hover glow */
.dt{width:100%;border-collapse:separate;border-spacing:0}
.dt th{text-align:left;font-size:var(--text-sm);font-weight:var(--weight-bold);text-transform:uppercase;letter-spacing:var(--tracking-wide);color:var(--ink-tertiary);padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border);background:var(--bg-surface);position:sticky;top:0;z-index:var(--z-sticky)}
.dt td{padding:var(--space-5);border-bottom:1px solid var(--border);font-size:var(--text-md);vertical-align:middle}
.dt tbody tr{transition:background var(--dur-fast),transform var(--dur-fast) var(--ease-spring),box-shadow var(--dur-fast);cursor:pointer}
.dt tbody tr:hover{background:var(--bg-hover);transform:scale(1.002);box-shadow:0 0 20px rgba(99,102,241,.03)}
.dt tbody tr:active{background:var(--bg-active);transform:scale(.998)}
.tid{color:var(--ink-accent);font-weight:var(--weight-semibold);font-family:var(--font-mono);font-size:11px}

/* === INPUT === with glow focus */
.inp,.sel{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);padding:6px 10px;color:var(--ink-primary);font-size:var(--text-base);outline:none;width:100%;font-family:var(--font-sans);height:var(--input-height);
  transition:all var(--dur-normal) var(--ease-spring)}
.inp:focus,.sel:focus{border-color:var(--border-accent);box-shadow:var(--shadow-ring),0 0 16px rgba(99,102,241,.06)}
.sel{cursor:pointer;appearance:none}
.ta{resize:vertical;min-height:70px;height:auto}

/* === TABS === with sliding indicator */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:var(--space-7);position:relative}
.tab{padding:8px 14px;font-size:var(--text-base);font-weight:var(--weight-medium);color:var(--ink-secondary);cursor:pointer;border:none;background:none;position:relative;
  transition:color var(--dur-fast),transform var(--dur-fast) var(--ease-spring)}
.tab:hover{color:var(--ink-primary);transform:translateY(-1px)}
.tab.active{color:var(--ink-accent)}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--bg-accent);border-radius:2px 2px 0 0;
  box-shadow:0 0 8px rgba(99,102,241,.4);
  animation:tab-grow var(--dur-emphasis) var(--ease-out-expo)}
@keyframes tab-grow{from{transform:scaleX(0)}to{transform:scaleX(1)}}

/* === FILTER BAR === */
.filters{display:flex;gap:var(--space-3);margin-bottom:var(--space-7);flex-wrap:wrap;align-items:center}
.filters .sel{width:auto;min-width:120px}
.filters .inp{max-width:220px}

/* === TOAST === with spring entrance */
.toast-c{position:fixed;bottom:var(--space-9);right:var(--space-9);z-index:var(--z-toast);display:flex;flex-direction:column-reverse;gap:var(--space-3);pointer-events:none}
.toast{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);padding:8px 14px;font-size:var(--text-base);color:var(--ink-primary);display:flex;align-items:center;gap:7px;box-shadow:var(--shadow-lg),var(--shadow-glow);pointer-events:auto;
  animation:t-in var(--dur-emphasis) var(--ease-rubber) both;max-width:var(--toast-max-w);
  backdrop-filter:blur(var(--blur-toast))}
.toast.out{animation:t-out var(--dur-normal) var(--ease-accel) forwards}
@keyframes t-in{from{opacity:0;transform:translateY(20px) scale(var(--scale-enter)) translateX(10px) rotate(-1deg)}60%{transform:translateY(-4px) scale(1.02) rotate(.5deg)}to{opacity:1;transform:none}}
@keyframes t-out{to{opacity:0;transform:translateX(100px) scale(.9) rotate(2deg)}}

/* === MODAL === with dimensional entrance */
.modal-bg{position:fixed;inset:0;z-index:var(--z-overlay);background:var(--bg-overlay);backdrop-filter:blur(var(--blur-overlay));
  display:flex;align-items:center;justify-content:center;animation:fade-in var(--dur-fast)}
.modal-bg.out{animation:fade-out var(--dur-fast) forwards}
.mdl{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--card-radius);padding:22px;min-width:var(--modal-min-w);max-width:var(--modal-max-w);
  box-shadow:var(--shadow-lg),var(--shadow-glow);animation:mdl-in var(--dur-emphasis) var(--ease-rubber);max-height:80vh;overflow-y:auto}
.modal-bg.out .mdl{animation:mdl-out var(--dur-normal) var(--ease-accel) forwards}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes fade-out{to{opacity:0}}
@keyframes mdl-in{from{opacity:0;transform:scale(.88) translateY(20px) rotateX(5deg)}60%{transform:scale(1.02) translateY(-3px)}to{opacity:1;transform:none}}
@keyframes mdl-out{to{opacity:0;transform:scale(.95) translateY(8px) rotateX(-3deg)}}

/* === CHAT === with spring messages */
.chat-wrap{display:flex;flex-direction:column;height:100%;padding:0}
.chat-msgs{flex:1;overflow-y:auto;padding:var(--space-9) 22px;display:flex;flex-direction:column;gap:var(--space-7)}
.msg{max-width:var(--max-chat-w);padding:10px 14px;border-radius:var(--card-radius);font-size:var(--text-md);line-height:var(--leading-relaxed);position:relative;
  transition:transform var(--dur-fast) var(--ease-spring)}
.msg:hover{transform:scale(1.005)}
.msg.user{align-self:flex-end;background:var(--bg-accent);color:#fff;border-bottom-right-radius:var(--radius-sm);
  animation:msg-r var(--dur-emphasis) var(--ease-rubber);box-shadow:0 2px 12px rgba(99,102,241,.2)}
.msg.bot{align-self:flex-start;background:var(--bg-elevated);border:1px solid var(--border);border-bottom-left-radius:var(--radius-sm);
  animation:msg-l var(--dur-emphasis) var(--ease-rubber)}
@keyframes msg-l{from{opacity:0;transform:translateX(var(--shift-msg-left)) scale(.94) rotate(-1deg)}60%{transform:translateX(2px) scale(1.01) rotate(.3deg)}to{opacity:1;transform:none}}
@keyframes msg-r{from{opacity:0;transform:translateX(var(--shift-msg-right)) scale(.94) rotate(1deg)}60%{transform:translateX(-2px) scale(1.01) rotate(-.3deg)}to{opacity:1;transform:none}}
.msg .mt{font-size:9.5px;margin-top:3px;opacity:var(--opacity-dimmed)}
.msg .mp{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--ink-accent);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.msg .mp::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--bg-accent);display:inline-block;animation:pulse-soft 1.5s ease-in-out infinite}

.typing{display:flex;gap:4px;padding:10px 14px;align-self:flex-start;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--card-radius);border-bottom-left-radius:var(--radius-sm);
  animation:msg-l var(--dur-emphasis) var(--ease-rubber)}
.td{width:5px;height:5px;border-radius:50%;background:var(--ink-tertiary);animation:td-b 1.2s ease-in-out infinite}
.td:nth-child(2){animation-delay:.15s}.td:nth-child(3){animation-delay:.3s}
@keyframes td-b{0%,60%,100%{transform:translateY(0) scale(1)}30%{transform:translateY(-6px) scale(1.2)}}

.chat-bar{padding:10px var(--space-9) 14px;border-top:1px solid var(--border);background:var(--bg-surface);display:flex;gap:var(--space-3);align-items:flex-end;position:relative}
.chat-bar::before{content:'';position:absolute;top:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(99,102,241,.1),transparent);
  animation:shimmer-edge 3s linear infinite;background-size:200% 100%}
.chat-input-w{flex:1;position:relative}
.chat-inp{width:100%;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--card-radius);padding:9px 40px 9px 12px;color:var(--ink-primary);font-size:var(--text-md);outline:none;resize:none;min-height:38px;max-height:110px;font-family:var(--font-sans);
  transition:all var(--dur-normal) var(--ease-spring)}
.chat-inp:focus{border-color:var(--border-accent);box-shadow:var(--shadow-ring),0 0 20px rgba(99,102,241,.06)}
.chat-send{position:absolute;right:5px;bottom:5px;width:26px;height:26px;border-radius:var(--radius-md);background:var(--bg-accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all var(--dur-fast) var(--ease-spring);opacity:.4}
.chat-send.ready{opacity:var(--opacity-full);animation:float-y 2s ease-in-out infinite}
.chat-send:hover{background:var(--bg-accent-hover);transform:scale(var(--scale-pop));box-shadow:0 0 12px rgba(99,102,241,.4)}
.chat-send:active{transform:scale(.85);transition:transform var(--dur-instant)}

.qp{display:flex;gap:5px;padding:0 var(--space-9) var(--space-3);overflow-x:auto}
.qc{padding:4px 10px;border-radius:var(--radius-full);background:var(--bg-elevated);border:1px solid var(--border);color:var(--ink-secondary);font-size:11px;cursor:pointer;white-space:nowrap;
  transition:all var(--dur-fast) var(--ease-spring)}
.qc:hover{border-color:var(--border-accent);color:var(--ink-accent);background:var(--bg-accent-subtle);transform:translateY(-2px) scale(1.02);box-shadow:0 4px 8px rgba(99,102,241,.1)}
.qc:active{transform:translateY(0) scale(.97)}

/* === EMAIL === */
.email-row{display:grid;grid-template-columns:28px 160px 1fr auto;gap:var(--space-5);align-items:center;padding:9px 10px;border-bottom:1px solid var(--border);cursor:pointer;
  transition:all var(--dur-fast) var(--ease-spring)}
.email-row:hover{background:var(--bg-hover);transform:translateX(3px)}
.email-row:active{background:var(--bg-active);transform:translateX(1px) scale(.998)}
.av{width:var(--avatar-sm);height:var(--avatar-sm);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:var(--text-sm);font-weight:var(--weight-bold);color:#fff;flex-shrink:0;
  transition:transform var(--dur-fast) var(--ease-spring)}
.email-row:hover .av{transform:scale(1.1)}
.email-row .sender{font-size:var(--text-base);font-weight:var(--weight-medium);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.email-row.unread .sender{font-weight:var(--weight-bold);color:var(--ink-primary)}
.email-row .sp{font-size:var(--text-base);color:var(--ink-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.email-row.unread .sp{color:var(--ink-primary)}
.email-row .et{font-size:var(--text-sm);color:var(--ink-tertiary);white-space:nowrap}

/* === CALENDAR === */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:var(--card-radius);overflow:hidden}
.cal-dh{background:var(--bg-elevated);padding:var(--space-3);text-align:center;font-size:var(--text-sm);font-weight:var(--weight-bold);color:var(--ink-tertiary);text-transform:uppercase}
.cal-day{background:var(--bg-surface);padding:var(--space-3);min-height:80px;transition:background var(--dur-fast),transform var(--dur-fast) var(--ease-spring)}
.cal-day:hover{background:var(--bg-hover);transform:scale(1.02);z-index:2}
.cal-day.today{background:var(--bg-accent-subtle)}
.cal-day.other{opacity:var(--opacity-faded)}
.cal-day .dn{font-size:11px;font-weight:var(--weight-semibold);margin-bottom:3px}
.cal-day.today .dn{background:var(--bg-accent);color:#fff;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;font-size:var(--text-sm);box-shadow:0 0 8px rgba(99,102,241,.4)}
.cal-ev{font-size:var(--text-sm);padding:1px 5px;border-radius:var(--radius-sm);margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:transform var(--dur-fast) var(--ease-spring)}
.cal-ev:hover{transform:scale(1.05) translateX(2px)}

/* === ANALYTICS === with live animated charts */
.a-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:var(--space-7)}
.chart{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:var(--card-padding);overflow:hidden;
  animation:breathe var(--breathe-dur) ease-in-out infinite}
.chart h3{font-size:var(--text-lg);font-weight:var(--weight-semibold);margin-bottom:var(--space-5)}
.bars{display:flex;align-items:flex-end;gap:5px;height:var(--bar-chart-h);padding-top:var(--space-3)}
.bar-c{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end}
.bar{width:100%;border-radius:3px 3px 0 0;transition:height var(--dur-dramatic) var(--ease-rubber);position:relative;overflow:hidden}
.bar::after{content:'';position:absolute;inset:0;background:var(--gradient-bar-shine)}
.bar:hover{filter:brightness(1.2);transform:scaleX(1.1)}
.bar-l{font-size:var(--text-xs);color:var(--ink-tertiary);white-space:nowrap}
.bar-v{font-size:var(--text-xs);font-weight:var(--weight-semibold);color:var(--ink-secondary)}

.donut-w{display:flex;align-items:center;gap:var(--space-8)}
.donut-svg{width:var(--donut-size);height:var(--donut-size)}
.donut-leg{display:flex;flex-direction:column;gap:5px}
.donut-li{display:flex;align-items:center;gap:5px;font-size:11px}
.donut-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

.prog{height:var(--progress-h);background:var(--bg-active);border-radius:var(--radius-full);overflow:hidden;margin:6px 0}
.prog-fill{height:100%;background:var(--bg-accent);border-radius:var(--radius-full);transition:width var(--dur-slow) var(--ease-rubber);position:relative}
.prog-fill::after{content:'';position:absolute;top:0;right:0;bottom:0;width:24px;background:var(--gradient-progress-shim);animation:prog-shim 1.5s ease-in-out infinite}
@keyframes prog-shim{0%{opacity:0;transform:translateX(-100%)}50%{opacity:1}100%{opacity:0;transform:translateX(100%)}}

/* === INVESTIGATIONS === */
.inv-g{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:var(--space-5)}
.inv-c{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:var(--space-6);cursor:pointer;
  transition:all var(--dur-normal) var(--ease-spring);animation:breathe var(--breathe-dur) ease-in-out infinite}
.inv-c:hover{border-color:var(--border-hover);transform:translateY(var(--shift-hover)) scale(1.005);box-shadow:var(--shadow-md),var(--shadow-glow)}
.inv-c:active{transform:translateY(0) scale(.99)}
.inv-c .iid{font-family:var(--font-mono);font-size:11px;font-weight:var(--weight-semibold);color:var(--ink-accent)}
.inv-c .isub{font-size:var(--text-base);font-weight:var(--weight-medium);margin:4px 0;line-height:var(--leading-snug)}
.inv-c .imeta{display:flex;gap:var(--space-3);flex-wrap:wrap;font-size:var(--text-sm);color:var(--ink-secondary)}

/* === MODEL LAB === */
.lab-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-7)}
.lab-pnl{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:var(--card-padding);display:flex;flex-direction:column;
  animation:breathe var(--breathe-dur) ease-in-out infinite}
.lab-pnl h3{font-size:var(--text-lg);font-weight:var(--weight-semibold);margin-bottom:var(--space-5)}

/* === SHIPMENT TRACKER === */
.ship-list{display:flex;flex-direction:column;gap:var(--space-4)}
.ship-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:var(--space-6);display:flex;gap:var(--space-5);align-items:center;cursor:pointer;
  transition:all var(--dur-fast) var(--ease-spring)}
.ship-card:hover{background:var(--bg-hover);transform:translateX(var(--shift-subtle)) scale(1.002)}
.ship-tl{display:flex;align-items:center;gap:0;margin:var(--space-4) 0}
.ship-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
.ship-dot{width:10px;height:10px;border-radius:50%;background:var(--bg-active);border:2px solid var(--border);z-index:2;
  transition:all var(--dur-normal) var(--ease-spring)}
.ship-step.done .ship-dot{background:var(--ink-success);border-color:var(--ink-success);animation:s-done .4s var(--ease-spring);box-shadow:0 0 8px rgba(34,197,94,.3)}
.ship-step.now .ship-dot{background:var(--bg-accent);border-color:var(--bg-accent);box-shadow:0 0 12px rgba(99,102,241,.5);animation:pulse-ring 2s ease-in-out infinite}
.ship-line{position:absolute;top:4px;left:50%;right:-50%;height:2px;background:var(--border);z-index:1}
.ship-step.done .ship-line{background:var(--ink-success)}
.ship-step:last-child .ship-line{display:none}
.ship-sl{font-size:var(--text-xs);color:var(--ink-tertiary);margin-top:4px;text-align:center}
.ship-step.done .ship-sl,.ship-step.now .ship-sl{color:var(--ink-secondary)}
@keyframes s-done{0%{transform:scale(.4)}50%{transform:scale(1.4)}100%{transform:scale(1)}}

/* === SETTINGS === */
.set-layout{max-width:var(--max-settings-w);margin:0 auto}
.set-sec{margin-bottom:var(--space-12)}
.set-sec h3{font-size:var(--text-xl);font-weight:var(--weight-semibold);margin-bottom:var(--space-6);padding-bottom:var(--space-3);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px}
.set-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);transition:background var(--dur-fast)}
.set-row:hover{background:var(--bg-hover);border-radius:var(--radius-sm);padding:9px 6px;margin:0 -6px}
.set-row:last-child{border-bottom:none}
.set-info{flex:1}
.set-lbl{font-size:var(--text-base);font-weight:var(--weight-medium)}
.set-desc{font-size:11px;color:var(--ink-secondary);margin-top:1px}

.toggle{width:var(--toggle-w);height:var(--toggle-h);border-radius:var(--radius-full);background:var(--bg-active);border:none;cursor:pointer;position:relative;
  transition:background var(--dur-normal) var(--ease-spring),box-shadow var(--dur-normal);flex-shrink:0}
.toggle.on{background:var(--bg-accent);box-shadow:0 0 10px rgba(99,102,241,.3)}
.toggle .knob{width:var(--toggle-knob);height:var(--toggle-knob);border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;
  transition:transform var(--dur-normal) var(--ease-rubber);box-shadow:var(--shadow-sm)}
.toggle.on .knob{transform:translateX(16px)}

/* === AI RESPONSE BLOCK === with pulsing indicator */
.ai-resp{background:var(--bg-elevated);border:1px solid var(--border);border-left:3px solid var(--bg-accent);border-radius:var(--radius-md);padding:var(--card-padding);font-size:var(--text-base);line-height:var(--leading-loose);position:relative}
.ai-resp::before{content:'';position:absolute;left:-3px;top:0;bottom:0;width:3px;
  background:linear-gradient(to bottom,var(--color-indigo-500),var(--color-purple-500),var(--color-indigo-500));
  background-size:100% 200%;animation:gradient-scroll 3s ease-in-out infinite}
@keyframes gradient-scroll{0%{background-position:0 0}50%{background-position:0 100%}100%{background-position:0 0}}
.ai-resp .ai-lbl{font-size:var(--text-sm);font-weight:var(--weight-semibold);color:var(--ink-accent);margin-bottom:var(--space-3);display:flex;align-items:center;gap:5px}

/* === COPILOT PANEL === */
.copilot{width:var(--copilot-w);border-left:1px solid var(--border);background:var(--bg-surface);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
  transition:width var(--dur-emphasis) var(--ease-out-expo),opacity var(--dur-normal)}
.copilot.hide{width:0;opacity:0}
.cp-head{padding:var(--space-5) var(--space-7);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cp-head h3{font-size:var(--text-lg);font-weight:var(--weight-semibold);display:flex;align-items:center;gap:5px}
.cp-body{flex:1;overflow-y:auto;padding:var(--space-5)}
.cp-chip{padding:7px 10px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);font-size:11px;cursor:pointer;margin-bottom:5px;display:flex;align-items:center;gap:7px;
  transition:all var(--dur-fast) var(--ease-spring)}
.cp-chip:hover{border-color:var(--border-accent);background:var(--bg-accent-subtle);transform:translateX(4px) scale(1.01);box-shadow:0 2px 8px rgba(99,102,241,.08)}

/* === COMMAND PALETTE === with dramatic entrance */
.cmd-bg{position:fixed;inset:0;z-index:var(--z-cmdpal);background:var(--bg-overlay);backdrop-filter:blur(8px);display:flex;align-items:flex-start;justify-content:center;padding-top:18vh;
  animation:fade-in var(--dur-fast)}
.cmd-bg.out{animation:fade-out var(--dur-fast) forwards}
.cmd-box{width:var(--cmd-w);background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--card-radius);box-shadow:var(--shadow-lg),var(--shadow-glow-lg);overflow:hidden;
  animation:cmd-drop var(--dur-emphasis) var(--ease-rubber)}
.cmd-bg.out .cmd-box{animation:mdl-out var(--dur-normal) var(--ease-accel) forwards}
@keyframes cmd-drop{from{opacity:0;transform:scale(.9) translateY(-30px) rotateX(8deg)}60%{transform:scale(1.01) translateY(3px)}to{opacity:1;transform:none}}
.cmd-inp{width:100%;padding:12px 14px;background:none;border:none;border-bottom:1px solid var(--border);color:var(--ink-primary);font-size:var(--text-xl);outline:none;font-family:var(--font-sans)}
.cmd-inp::placeholder{color:var(--ink-tertiary)}
.cmd-list{max-height:280px;overflow-y:auto;padding:var(--space-3)}
.cmd-i{display:flex;align-items:center;gap:var(--space-4);padding:7px 9px;border-radius:var(--radius-md);cursor:pointer;font-size:var(--text-base);
  transition:background var(--dur-micro),transform var(--dur-fast) var(--ease-spring)}
.cmd-i:hover,.cmd-i.sel{background:var(--bg-hover);transform:translateX(2px)}
.cmd-i .ci{color:var(--ink-tertiary);width:16px;text-align:center}
.cmd-i .ck{margin-left:auto;font-size:var(--text-sm);font-family:var(--font-mono);color:var(--ink-tertiary)}

.skel{background:var(--gradient-shimmer);background-size:200% 100%;animation:skel-s var(--skeleton-speed) ease-in-out infinite;border-radius:var(--radius-sm)}
@keyframes skel-s{0%{background-position:200% 0}100%{background-position:-200% 0}}

.hb{padding:5px 14px;font-size:11px;display:flex;align-items:center;gap:var(--space-3);animation:hb-in var(--dur-emphasis) var(--ease-rubber)}
.hb.warn{background:var(--bg-warning);border-bottom:1px solid rgba(245,158,11,.15);color:var(--ink-warning)}
.hb.ok{background:rgba(34,197,94,.06);border-bottom:1px solid rgba(34,197,94,.1);color:var(--ink-success)}
@keyframes hb-in{from{transform:translateY(-100%) scaleY(.5);opacity:0}60%{transform:translateY(2px) scaleY(1.02)}to{transform:none;opacity:1}}

.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(var(--rot-spin))}}

/* Detail */
.det-grid{display:grid;grid-template-columns:1fr var(--detail-aside);gap:var(--space-9);height:100%}
.det-title{font-size:var(--text-3xl);font-weight:var(--weight-semibold);line-height:var(--leading-snug)}
.det-meta{display:flex;gap:var(--space-3);flex-wrap:wrap;margin-top:var(--space-3)}
.det-sec{margin-bottom:var(--space-9)}
.det-sec h3{font-size:var(--text-lg);font-weight:var(--weight-semibold);margin-bottom:var(--space-4);display:flex;align-items:center;gap:5px}
.det-f{display:flex;gap:var(--space-3);margin-bottom:var(--space-3);font-size:var(--text-base);transition:background var(--dur-fast);padding:2px 4px;border-radius:var(--radius-sm);margin:0 -4px 3px}
.det-f:hover{background:var(--bg-hover)}
.det-f .dl{color:var(--ink-secondary);min-width:90px}

/* === DEV MODE === */
.dev-wrap{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-7);height:100%}
.dev-pnl{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--card-radius);display:flex;flex-direction:column;overflow:hidden}
.dev-pnl-head{padding:var(--space-4) var(--space-5);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg-elevated)}
.dev-pnl-body{flex:1;overflow-y:auto;padding:var(--space-5);font-family:var(--font-mono);font-size:11px;line-height:var(--leading-relaxed);color:var(--ink-secondary)}
.dev-log{padding:3px 0;border-bottom:1px solid var(--border-subtle);transition:background var(--dur-fast)}
.dev-log:hover{background:var(--bg-hover)}
.dev-log .ts{color:var(--ink-tertiary);margin-right:var(--space-3)}
.dev-log.err{color:var(--ink-danger)}
.dev-log.warn{color:var(--ink-warning)}
.dev-log.ok{color:var(--ink-success)}

/* Token monitor */
.tkn-bar{display:flex;gap:var(--space-7);padding:var(--space-4) var(--space-5);background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);font-size:11px;margin-bottom:var(--space-5);animation:breathe var(--breathe-dur) ease-in-out infinite}
.tkn-item{display:flex;flex-direction:column;gap:1px}
.tkn-label{color:var(--ink-tertiary);font-size:var(--text-xs);text-transform:uppercase;letter-spacing:var(--tracking-wider)}
.tkn-val{font-weight:var(--weight-semibold);font-family:var(--font-mono);color:var(--ink-primary)}

/* === WORKSPACE === */
.ws-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:var(--space-5)}
.ws-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:var(--space-6);cursor:pointer;transition:all var(--dur-normal) var(--ease-spring);animation:breathe var(--breathe-dur) ease-in-out infinite}
.ws-card:hover{border-color:var(--border-hover);transform:translateY(var(--shift-hover)) scale(1.005);box-shadow:var(--shadow-md),var(--shadow-glow)}
.ws-card h4{font-size:var(--text-lg);font-weight:var(--weight-semibold);margin-bottom:var(--space-2)}
.ws-card p{font-size:11px;color:var(--ink-secondary);line-height:var(--leading-normal)}
.ws-alert{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-4) var(--space-5);background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);font-size:11px;margin-bottom:var(--space-2);transition:all var(--dur-fast) var(--ease-spring)}
.ws-alert:hover{background:var(--bg-hover);transform:translateX(2px)}
.ws-alert.crit{border-left:3px solid var(--ink-danger)}
.ws-alert.warn{border-left:3px solid var(--ink-warning)}
.ws-alert.info{border-left:3px solid var(--ink-info)}

/* === PLAYBOOK === */
.pb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:var(--space-5)}
.pb-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--card-radius);padding:var(--space-6);cursor:pointer;transition:all var(--dur-normal) var(--ease-spring)}
.pb-card:hover{border-color:var(--border-accent);transform:translateY(var(--shift-hover)) scale(1.008);box-shadow:var(--shadow-md),var(--shadow-glow)}
.pb-card h4{font-size:var(--text-lg);font-weight:var(--weight-semibold);margin-bottom:var(--space-2);display:flex;align-items:center;gap:var(--space-3)}
.pb-card .pb-desc{font-size:11px;color:var(--ink-secondary);line-height:var(--leading-normal);margin-bottom:var(--space-4)}
.pb-tag{display:inline-block;padding:1px 6px;border-radius:var(--radius-full);font-size:var(--text-xs);background:var(--bg-active);color:var(--ink-secondary);margin-right:var(--space-1);transition:transform var(--dur-fast) var(--ease-spring)}
.pb-tag:hover{transform:scale(1.1)}

/* === GALLERY === */
.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:var(--space-5)}
.gal-card{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--card-radius);overflow:hidden;cursor:pointer;transition:all var(--dur-normal) var(--ease-spring)}
.gal-card:hover{transform:translateY(var(--shift-hover)) scale(1.008);box-shadow:var(--shadow-md),var(--shadow-glow)}
.gal-thumb{height:140px;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:40px;color:var(--ink-tertiary);position:relative;overflow:hidden}
.gal-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(45deg,transparent 30%,rgba(255,255,255,.02) 50%,transparent 70%);
  animation:shimmer-edge 3s linear infinite;background-size:200% 100%}
.gal-info{padding:var(--space-5)}
.gal-info h4{font-size:var(--text-base);font-weight:var(--weight-semibold);margin-bottom:2px}
.gal-info p{font-size:var(--text-sm);color:var(--ink-secondary)}

/* === PARTICLE CANVAS === */
#particles{position:fixed;inset:0;z-index:var(--z-base);pointer-events:none}

/* === LIVE PULSE RING === on stat values */
@keyframes value-pulse{0%,100%{text-shadow:none}50%{text-shadow:0 0 8px rgba(99,102,241,.2)}}
.sv{animation:value-pulse 4s ease-in-out infinite}

/* === RESPONSIVE === */
@media(max-width:1100px){.det-grid,.lab-grid,.dev-wrap{grid-template-columns:1fr}}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;z-index:200;transform:translateX(-100%);transition:transform var(--dur-emphasis) var(--ease-out-expo)}
  .sidebar.mob-open{transform:translateX(0)}
  .stats{grid-template-columns:1fr 1fr}
  .a-grid,.inv-g,.pb-grid,.gal-grid,.ws-grid{grid-template-columns:1fr}
  .email-row{grid-template-columns:26px 1fr auto}
  .email-row .sender{display:none}
}

/* === REDUCED MOTION === */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
}

/* === MAGNETIC HOVER GLOW === on cards */
.card-glow{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity var(--dur-normal);z-index:0;border-radius:inherit}
.card:hover .card-glow{opacity:1}

/* === FLOW LINE === animated connection lines in data */
@keyframes flow-dash{to{stroke-dashoffset:-20}}
.flow-line{stroke-dasharray:5 5;animation:flow-dash 1s linear infinite}

/* === NEURAL NETWORK VIS === animated node connections */
.neural-canvas{position:absolute;inset:0;pointer-events:none;z-index:0}

/* === LIVE STATUS INDICATOR === */
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--color-green-500);position:relative;display:inline-block}
.live-dot::after{content:'';position:absolute;inset:-3px;border-radius:50%;background:var(--color-green-500);opacity:.3;animation:sd-p 2s ease-in-out infinite}

/* === GLASS MORPHISM CARD === */
.glass{background:rgba(14,14,22,.6);backdrop-filter:blur(var(--blur-glass)) saturate(1.5);-webkit-backdrop-filter:blur(var(--blur-glass)) saturate(1.5);
  border:1px solid rgba(255,255,255,.08)}

/* === GRADIENT TEXT === */
.gradient-text{background:linear-gradient(135deg,var(--color-indigo-300),var(--color-purple-400),var(--color-blue-400));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:200% auto;animation:gradient-flow 4s linear infinite}
@keyframes gradient-flow{0%{background-position:0% center}100%{background-position:200% center}}

/* === MORPHING BORDER === for active elements */
/* === STREAMING CURSOR === */
.stream-cursor{display:inline;color:var(--ink-accent);font-weight:300;animation:blink-cursor .6s ease-in-out infinite;margin-left:1px}
@keyframes blink-cursor{0%,100%{opacity:1}50%{opacity:0}}

/* === STAT SPARKLINE === */
.stat-sparkline{display:block;margin-top:6px;overflow:visible}
.stat-sparkline polyline{fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 3px currentColor)}
.stat-sparkline .spark-area{opacity:.08}

/* === STAT RING === animated SVG ring around icon */
.stat-ring{position:absolute;inset:-4px;pointer-events:none}
.stat-ring circle.track{fill:none;stroke:var(--border);stroke-width:2}
.stat-ring circle.value{fill:none;stroke-width:2.5;stroke-linecap:round;
  transform:rotate(-90deg);transform-origin:center;
  transition:stroke-dashoffset 1.2s cubic-bezier(.34,1.56,.64,1)}
.stat-ring circle.pulse{fill:none;stroke-width:1;opacity:0;animation:ring-pulse 2.5s ease-in-out infinite}
@keyframes ring-pulse{0%,100%{opacity:0;r:20}50%{opacity:.15;r:22}}

/* === CRITICAL GLOW === pulsing accent on high-priority values */
.stat-critical .sv{animation:critical-pulse 2s ease-in-out infinite}
@keyframes critical-pulse{0%,100%{text-shadow:0 0 4px rgba(239,68,68,.2)}50%{text-shadow:0 0 16px rgba(239,68,68,.5),0 0 30px rgba(239,68,68,.2)}}

@keyframes morph-border{
  0%{border-radius:14px 14px 14px 14px}
  25%{border-radius:14px 20px 14px 20px}
  50%{border-radius:20px 14px 20px 14px}
  75%{border-radius:14px 20px 14px 20px}
  100%{border-radius:14px 14px 14px 14px}
}

/* === AI MASCOT — cursor-tracking eyes === */
#aiMascot{position:fixed;bottom:16px;left:16px;z-index:9000;width:52px;height:52px;cursor:pointer;
  filter:drop-shadow(0 4px 12px rgba(99,102,241,.3));transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
#aiMascot:hover{transform:scale(1.15) rotate(-5deg)}
#aiMascot .mascot-body{width:52px;height:52px;border-radius:16px;background:var(--gradient-brand);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  animation:mascot-float 3s ease-in-out infinite}
#aiMascot .mascot-body::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:conic-gradient(from 0deg,transparent,rgba(255,255,255,.1),transparent,rgba(255,255,255,.05),transparent);
  animation:spin 6s linear infinite}
@keyframes mascot-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.mascot-face{display:flex;gap:8px;align-items:center;position:relative;z-index:2}
.mascot-eye{width:10px;height:12px;background:white;border-radius:50%;position:relative;overflow:hidden}
.mascot-pupil{width:5px;height:5px;background:#1a1a2e;border-radius:50%;position:absolute;top:3px;left:2.5px;
  transition:transform .08s ease-out}
.mascot-eye::after{content:'';position:absolute;top:2px;left:3px;width:2px;height:2px;background:white;border-radius:50%;opacity:.8}
.mascot-mouth{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);width:12px;height:5px;border:2px solid white;border-top:none;border-radius:0 0 8px 8px}
.mascot-blush-l,.mascot-blush-r{position:absolute;width:6px;height:3px;background:rgba(236,72,153,.3);border-radius:50%;top:50%;animation:blush-pulse 3s ease-in-out infinite}
.mascot-blush-l{left:-2px}.mascot-blush-r{right:-2px}
@keyframes blush-pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.5;transform:scale(1.2)}}
.mascot-status{position:absolute;top:-2px;right:-2px;width:10px;height:10px;border-radius:50%;background:var(--color-green-500);border:2px solid var(--bg-root);
  animation:sd-p 2s ease-in-out infinite}
.mascot-tooltip{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) scale(0);
  background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--radius-md);padding:6px 10px;
  font-size:10px;color:var(--ink-secondary);white-space:nowrap;pointer-events:none;
  box-shadow:var(--shadow-lg);transition:transform .3s cubic-bezier(.34,1.56,.64,1);transform-origin:bottom center}
#aiMascot:hover .mascot-tooltip{transform:translateX(-50%) scale(1)}
.mascot-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--border)}

/* === WAVEFORM VISUALIZER === */
.waveform-bars{display:flex;gap:1px;align-items:flex-end;height:16px;margin-left:auto;opacity:.6}
.waveform-bars .wbar{width:2px;background:var(--ink-accent);border-radius:1px;animation:wbar-dance 1.2s ease-in-out infinite}
.waveform-bars .wbar:nth-child(1){animation-delay:0s;height:4px}
.waveform-bars .wbar:nth-child(2){animation-delay:.1s;height:8px}
.waveform-bars .wbar:nth-child(3){animation-delay:.2s;height:12px}
.waveform-bars .wbar:nth-child(4){animation-delay:.15s;height:6px}
.waveform-bars .wbar:nth-child(5){animation-delay:.25s;height:10px}
.waveform-bars .wbar:nth-child(6){animation-delay:.05s;height:14px}
.waveform-bars .wbar:nth-child(7){animation-delay:.3s;height:8px}
.waveform-bars .wbar:nth-child(8){animation-delay:.12s;height:5px}
@keyframes wbar-dance{0%,100%{transform:scaleY(1)}25%{transform:scaleY(1.8)}50%{transform:scaleY(.6)}75%{transform:scaleY(1.4)}}

/* === CONFETTI === */
.confetti-piece{position:fixed;pointer-events:none;z-index:10000;will-change:transform,opacity}

/* === CINEMATIC ENTRANCE OVERLAY === */
#cinematicOverlay{position:fixed;inset:0;z-index:99999;background:var(--bg-root);display:flex;align-items:center;justify-content:center;
  pointer-events:none;transition:opacity .8s ease-out}
#cinematicOverlay.done{opacity:0}
.cinema-logo{width:80px;height:80px;border-radius:24px;background:var(--gradient-brand);
  display:flex;align-items:center;justify-content:center;color:white;font-size:32px;font-weight:800;
  animation:cinema-entrance 1.5s cubic-bezier(.34,1.56,.64,1) forwards;
  box-shadow:0 0 60px rgba(99,102,241,.4)}
@keyframes cinema-entrance{
  0%{transform:scale(0) rotate(-180deg);opacity:0}
  50%{transform:scale(1.2) rotate(10deg);opacity:1}
  70%{transform:scale(.95) rotate(-3deg)}
  100%{transform:scale(1) rotate(0deg)}
}
.cinema-text{position:absolute;font-size:14px;font-weight:600;color:var(--ink-accent);opacity:0;
  animation:cinema-text-in .6s ease-out 1s forwards}
@keyframes cinema-text-in{to{opacity:1;transform:translateY(0)}}

/* === SOUND TOGGLE PILL === */
#soundToggle{position:fixed;bottom:16px;right:16px;z-index:9000;padding:4px 10px;border-radius:var(--radius-full);
  background:var(--bg-elevated);border:1px solid var(--border);color:var(--ink-secondary);font-size:10px;
  cursor:pointer;display:flex;align-items:center;gap:4px;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);backdrop-filter:blur(12px)}
#soundToggle:hover{background:var(--bg-hover);color:var(--ink-primary);transform:scale(1.05)}
#soundToggle.on{border-color:var(--border-accent);color:var(--ink-accent)}

/* === HOVER SOUND INDICATOR === subtle ring on interactive hover */
@keyframes hover-ring{0%{box-shadow:0 0 0 0 rgba(99,102,241,.15)}100%{box-shadow:0 0 0 6px rgba(99,102,241,0)}}
.sb-item:hover,.qc:hover,.cp-chip:hover{animation:hover-ring .4s ease-out}

/* === THEME SYSTEM — 5 themes with animated transitions === */
[data-theme="warm-dark"]{--bg-root:#0d0a08;--bg-surface:#140f0b;--bg-elevated:#1c1510;--bg-hover:#261e16;--bg-frosted:rgba(20,15,11,.85);
  --ink-primary:#f0e6d8;--ink-secondary:#9a8878;--ink-tertiary:#6a5a4a;--border:rgba(255,220,180,.06);--border-hover:rgba(255,220,180,.12);
  --bg-accent:#d97706;--bg-accent-hover:#f59e0b;--bg-accent-subtle:rgba(217,119,6,.1);--ink-accent:#fbbf24;--ink-accent-bright:#fcd34d;
  --border-accent:rgba(217,119,6,.35);--particle-color:217,119,6;--glow-color:rgba(217,119,6,.06);
  --orb1-color:#d97706;--orb2-color:#ea580c;--orb3-color:#ca8a04;--orb4-color:#65a30d}
[data-theme="midnight"]{--bg-root:#020617;--bg-surface:#0f172a;--bg-elevated:#1e293b;--bg-hover:#334155;--bg-frosted:rgba(15,23,42,.85);
  --ink-primary:#e2e8f0;--ink-secondary:#64748b;--ink-tertiary:#475569;--border:rgba(148,163,184,.06);--border-hover:rgba(148,163,184,.12);
  --bg-accent:#3b82f6;--bg-accent-hover:#60a5fa;--bg-accent-subtle:rgba(59,130,246,.1);--ink-accent:#93c5fd;--ink-accent-bright:#bfdbfe;
  --border-accent:rgba(59,130,246,.35);--particle-color:59,130,246;--glow-color:rgba(59,130,246,.06);
  --orb1-color:#3b82f6;--orb2-color:#8b5cf6;--orb3-color:#06b6d4;--orb4-color:#10b981}
[data-theme="nord"]{--bg-root:#2e3440;--bg-surface:#3b4252;--bg-elevated:#434c5e;--bg-hover:#4c566a;--bg-frosted:rgba(59,66,82,.85);
  --ink-primary:#eceff4;--ink-secondary:#d8dee9;--ink-tertiary:#81a1c1;--border:rgba(216,222,233,.08);--border-hover:rgba(216,222,233,.14);
  --bg-accent:#88c0d0;--bg-accent-hover:#8fbcbb;--bg-accent-subtle:rgba(136,192,208,.1);--ink-accent:#88c0d0;--ink-accent-bright:#8fbcbb;
  --border-accent:rgba(136,192,208,.35);--particle-color:136,192,208;--glow-color:rgba(136,192,208,.06);
  --orb1-color:#88c0d0;--orb2-color:#b48ead;--orb3-color:#a3be8c;--orb4-color:#ebcb8b}
[data-theme="cyberpunk"]{--bg-root:#0a0012;--bg-surface:#120020;--bg-elevated:#1a0030;--bg-hover:#250045;--bg-frosted:rgba(18,0,32,.85);
  --ink-primary:#f0e0ff;--ink-secondary:#b080d0;--ink-tertiary:#7040a0;--border:rgba(200,100,255,.08);--border-hover:rgba(200,100,255,.15);
  --bg-accent:#e040fb;--bg-accent-hover:#f06fff;--bg-accent-subtle:rgba(224,64,251,.1);--ink-accent:#f48fff;--ink-accent-bright:#ffb8ff;
  --border-accent:rgba(224,64,251,.4);--particle-color:224,64,251;--glow-color:rgba(224,64,251,.08);
  --orb1-color:#e040fb;--orb2-color:#00e5ff;--orb3-color:#ff1744;--orb4-color:#76ff03;
  --gradient-brand:linear-gradient(135deg,#e040fb,#00e5ff)}

/* === THEME TRANSITION FLASH === */
.theme-flash{position:fixed;inset:0;z-index:99999;pointer-events:none;background:white;opacity:0;
  animation:flash-pop .4s ease-out forwards}
@keyframes flash-pop{0%{opacity:.3}100%{opacity:0}}

/* === LIVE NETWORK GRAPH === pulsing node connections in workspace */
.network-graph{position:relative;width:100%;height:200px;margin-bottom:var(--space-7)}
.network-graph canvas{width:100%;height:100%;border-radius:var(--card-radius);background:var(--bg-surface);border:1px solid var(--border)}

/* === MATRIX RAIN === easter egg */
#matrixCanvas{position:fixed;inset:0;z-index:99998;pointer-events:none;opacity:0;transition:opacity .5s}
#matrixCanvas.active{opacity:.15}

/* === PARALLAX DEPTH LAYERS on detail pages === */
.parallax-container{perspective:1000px;transform-style:preserve-3d}
.parallax-layer-1{transform:translateZ(0px)}
.parallax-layer-2{transform:translateZ(20px) scale(.98)}
.parallax-layer-3{transform:translateZ(40px) scale(.96)}

/* === LIQUID MORPHING BUTTON === primary CTA */
.btn-liquid{position:relative;overflow:visible}
.btn-liquid::before{content:'';position:absolute;inset:-2px;border-radius:inherit;
  background:conic-gradient(from var(--liquid-angle,0deg),var(--bg-accent),var(--color-purple-500),var(--color-blue-500),var(--bg-accent));
  opacity:0;transition:opacity .3s;z-index:-1;filter:blur(4px)}
.btn-liquid:hover::before{opacity:.6;animation:liquid-rotate 2s linear infinite}
@keyframes liquid-rotate{to{--liquid-angle:360deg}}
@property --liquid-angle{syntax:"<angle>";initial-value:0deg;inherits:false}

/* === CONTEXT MENU === */
.ctx-menu{position:fixed;z-index:var(--z-cmdpal);background:var(--bg-elevated);border:1px solid var(--border);
  border-radius:var(--radius-md);padding:var(--space-2);min-width:180px;box-shadow:var(--shadow-lg),var(--shadow-glow);
  animation:ctx-in .15s var(--ease-rubber);backdrop-filter:blur(16px)}
@keyframes ctx-in{from{opacity:0;transform:scale(.92) translateY(-4px)}to{opacity:1;transform:none}}
.ctx-item{display:flex;align-items:center;gap:var(--space-4);padding:6px 10px;border-radius:var(--radius-sm);
  font-size:var(--text-base);color:var(--ink-primary);cursor:pointer;transition:all var(--dur-fast) var(--ease-spring)}
.ctx-item:hover{background:var(--bg-accent-subtle);color:var(--ink-accent);transform:translateX(2px)}
.ctx-item .ctx-key{margin-left:auto;font-size:9px;font-family:var(--font-mono);color:var(--ink-tertiary);
  background:var(--bg-active);padding:1px 4px;border-radius:2px}
.ctx-item svg{width:12px;height:12px;color:var(--ink-tertiary);flex-shrink:0}
.ctx-sep{height:1px;background:var(--border);margin:var(--space-2) var(--space-3)}
.ctx-label{font-size:9px;color:var(--ink-tertiary);padding:4px 10px;text-transform:uppercase;letter-spacing:var(--tracking-wider);font-weight:var(--weight-bold)}

/* === KEYBOARD SHORTCUTS OVERLAY === */
.kbd-overlay{position:fixed;inset:0;z-index:var(--z-cmdpal);background:var(--bg-overlay);backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;animation:fade-in .2s}
.kbd-panel{background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--card-radius);
  padding:24px;max-width:560px;width:90%;box-shadow:var(--shadow-lg),var(--shadow-glow);
  animation:mdl-in .3s var(--ease-rubber)}
.kbd-panel h2{font-size:var(--text-3xl);font-weight:var(--weight-semibold);margin-bottom:var(--space-7);display:flex;align-items:center;gap:8px}
.kbd-grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--space-3)}
.kbd-row{display:flex;align-items:center;gap:var(--space-4);padding:5px 0;font-size:var(--text-base)}
.kbd-row kbd{background:var(--bg-active);border:1px solid var(--border);padding:2px 6px;border-radius:3px;
  font-family:var(--font-mono);font-size:10px;color:var(--ink-accent);min-width:28px;text-align:center}
.kbd-row span{color:var(--ink-secondary)}

/* === VIM NAVIGATION HIGHLIGHT === */
.vim-focus{outline:2px solid var(--bg-accent)!important;outline-offset:1px;
  box-shadow:0 0 12px rgba(99,102,241,.15)!important}

/* === SVG DRAW-IN === */
.svg-draw path,.svg-draw polyline,.svg-draw line,.svg-draw circle,.svg-draw rect{
  stroke-dasharray:100;stroke-dashoffset:100;animation:svg-draw-in .8s var(--ease-out-expo) forwards}
@keyframes svg-draw-in{to{stroke-dashoffset:0}}

/* === TABLE SORT HEADERS === */
.dt th.sortable{cursor:pointer;user-select:none;transition:color var(--dur-fast)}
.dt th.sortable:hover{color:var(--ink-accent)}
.dt th.sortable::after{content:'';display:inline-block;width:0;height:0;margin-left:4px;vertical-align:middle;
  border-left:3px solid transparent;border-right:3px solid transparent;border-top:4px solid currentColor;opacity:.3;
  transition:transform var(--dur-fast) var(--ease-spring),opacity var(--dur-fast)}
.dt th.sortable.asc::after{opacity:.8;transform:rotate(180deg)}
.dt th.sortable.desc::after{opacity:.8}

/* === PAGINATION === */
.pagination{display:flex;align-items:center;gap:var(--space-2);margin-top:var(--space-5);justify-content:center}
.page-btn{padding:4px 8px;border-radius:var(--radius-sm);background:var(--bg-elevated);border:1px solid var(--border);
  color:var(--ink-secondary);font-size:11px;cursor:pointer;transition:all var(--dur-fast) var(--ease-spring)}
.page-btn:hover{background:var(--bg-hover);color:var(--ink-primary);transform:translateY(-1px)}
.page-btn.active{background:var(--bg-accent);color:#fff;border-color:var(--bg-accent)}
</style>
</head>
<body>

<!-- Aurora Canvas — generative fluid background -->
<canvas id="auroraCanvas"></canvas>
<!-- Matrix Rain Easter Egg -->
<canvas id="matrixCanvas"></canvas>

<!-- Ambient Orbs -->
<div class="ambient"><div class="orb"></div><div class="orb"></div><div class="orb"></div><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="grain"></div>
<canvas id="particles"></canvas>
<div id="cursorGlow"></div>

<!-- Cinematic Entrance -->
<div id="cinematicOverlay">
  <div class="cinema-logo">Q</div>
  <div class="cinema-text" style="margin-top:120px;transform:translateY(10px)">QBO Escalation Assistant</div>
</div>

<!-- AI Mascot -->
<div id="aiMascot" onclick="mascotClick()">
  <div class="mascot-body">
    <div class="mascot-face">

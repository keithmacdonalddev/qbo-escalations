function openCmd(){ document.getElementById('cmdOverlay').classList.add('open'); document.getElementById('cmdInput').value=''; filterCmd(); setTimeout(()=>document.getElementById('cmdInput').focus(),100); }
function closeCmd(e){ if(!e||e.target===document.getElementById('cmdOverlay')) document.getElementById('cmdOverlay').classList.remove('open'); }
function filterCmd(){
  const q=document.getElementById('cmdInput').value.toLowerCase(), r=document.getElementById('cmdResults');
  let h='';
  CMD_ITEMS.forEach(sec=>{
    const items=sec.items.filter(i=>!q||i.l.toLowerCase().includes(q));
    if(items.length){
      h+=`<div class="cmd-section">${sec.sec}</div>`;
      items.forEach(i=>h+=`<div class="cmd-item" onclick="execCmd('${i.v}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>${i.l}</div>`);
    }
  });
  r.innerHTML=h||'<div style="padding:20px;text-align:center;color:var(--text-muted)">No results</div>';
}
function execCmd(v){
  closeCmd({target:document.getElementById('cmdOverlay')});
  if(v==='_theme') toggleTheme();
  else if(v==='_celebrate') triggerCelebration();
  else if(v==='_new') toast('New escalation created','success');
  else if(v.startsWith('_esc:')){openDetail(parseInt(v.split(':')[1]));}
  else nav(v);
}

    let stepIdx=0;

      if(stepIdx>=BOOT_STEPS.length){
        // Boot complete — fade out
        progBar.style.width='100%';
        status.style.color='#5DA283';
        status.textContent='&#10004; Boot complete';

            bootOverlay.remove();
            bootOverlay=null;
            resolve();
          },800);
        },500);
        return;
      }
      const step=BOOT_STEPS[stepIdx];
      elapsed+=step.dur;
      const pct=Math.min(100,Math.round(elapsed/totalDur*100));
      progBar.style.width=pct+'%';
      status.textContent=step.text;

      const logLine=document.createElement('div');

      logArea.scrollTop=logArea.scrollHeight;

      // Sound click
      playBootTick();

      stepIdx++;
      setTimeout(nextStep,step.dur);
    }

    // Add log animation
    const logStyle=document.createElement('style');
    logStyle.textContent='@keyframes bootLogIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}';
    document.head.appendChild(logStyle);

    setTimeout(nextStep,300);
  });
}

let audioCtx=null;

function playBootTick(){
  try{
    const ctx=getAudioCtx();
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type='sine';
    osc.frequency.setValueAtTime(800+Math.random()*400,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(400,ctx.currentTime+0.05);
    gain.gain.setValueAtTime(0.03,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.05);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime+0.05);
  }catch(e){}
}

    const ctx=getAudioCtx();

    const notes=[523.25,659.25,783.99,1046.50,1318.51]; // C5 E5 G5 C6 E6

    setTimeout(()=>{
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.3,ctx.sampleRate);

      for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*0.015*Math.exp(-i/(ctx.sampleRate*0.1));

      src.connect(filt);

// CANVAS PARTICLE TRAIL SYSTEM — GPU-accelerated trails behind creatures
// ═══════════════════════════════════════════════════════════════════════════
let trailCanvas=null, trailCtx=null;
let trailParticles=[];

function initTrailCanvas(){
  trailCanvas=document.createElement('canvas');
  trailCanvas.id='trailCanvas';
  trailCanvas.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:199;width:100%;height:100%;';
  trailCanvas.width=window.innerWidth;
  trailCanvas.height=window.innerHeight;
  document.body.appendChild(trailCanvas);
  trailCtx=trailCanvas.getContext('2d');

  window.addEventListener('resize',()=>{
    trailCanvas.width=window.innerWidth;
    trailCanvas.height=window.innerHeight;
  });

  animateTrails();
}

class TrailParticle {
  constructor(x,y,color,size){
    this.x=x; this.y=y;
    this.ox=x; this.oy=y;
    this.vx=(Math.random()-0.5)*2;
    this.vy=(Math.random()-0.5)*2;
    this.color=color;
    this.size=size||3+Math.random()*4;
    this.life=1.0;
    this.decay=0.015+Math.random()*0.02;
    this.glow=Math.random()>0.5;
  }
  update(){
    this.x+=this.vx;
    this.y+=this.vy;
    this.vx*=0.98;
    this.vy*=0.98;
    this.vy+=0.02; // slight gravity
    this.life-=this.decay;
    return this.life>0;
  }
  draw(ctx){
    ctx.globalAlpha=this.life*0.8;
    if(this.glow){
      ctx.shadowBlur=this.size*2;
      ctx.shadowColor=this.color;
    }
    ctx.fillStyle=this.color;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size*this.life,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur=0;
  }
}

function emitTrailParticles(x,y,color){
  const colors=['#F06A6A','#FF8A80','#F1BD6C','#5DA283','#4186E0','#AA62E3','#F5487F','#FFBF1A'];
  const c=color||colors[~~(Math.random()*colors.length)];
  for(let i=0;i<3;i++){
    trailParticles.push(new TrailParticle(x+Math.random()*10-5,y+Math.random()*10-5,c));
  }
}

function animateTrails(){
  if(!trailCtx) return;
  trailCtx.clearRect(0,0,trailCanvas.width,trailCanvas.height);

  // Draw connections between nearby particles
  for(let i=0;i<trailParticles.length;i++){
    for(let j=i+1;j<trailParticles.length&&j<i+5;j++){
      const a=trailParticles[i], b=trailParticles[j];
      const dx=a.x-b.x, dy=a.y-b.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<60){
        trailCtx.globalAlpha=Math.min(a.life,b.life)*0.15*(1-dist/60);
        trailCtx.strokeStyle=a.color;
        trailCtx.lineWidth=1;
        trailCtx.beginPath();
        trailCtx.moveTo(a.x,a.y);
        trailCtx.lineTo(b.x,b.y);
        trailCtx.stroke();
      }
    }
  }
  trailCtx.globalAlpha=1;

  trailParticles=trailParticles.filter(p=>{
    const alive=p.update();
    if(alive) p.draw(trailCtx);
    return alive;
  });
  requestAnimationFrame(animateTrails);
}

// 3D CREATURE RENDERING — CSS 3D transforms with shadow, rotation, bounce
// ═══════════════════════════════════════════════════════════════════════════
const CREATURE_NAMES={
  '&#x1F984;':'Unicorn',
  '&#x1F433;':'Narwhal',
  '&#x1F985;':'Phoenix',
  '&#x1F9CA;':'Yeti',
  '&#x1F9A6;':'Otter'
};

// Enhanced creature class with 3D transforms and particle trails
class Creature3D extends PhysicsCreature {
  constructor(emoji){
    super(emoji);
    this.wobblePhase=Math.random()*Math.PI*2;
    this.wobbleSpeed=2+Math.random()*3;
    this.shadowEl=document.createElement('div');
    this.shadowEl.style.cssText='position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);width:40px;height:10px;background:radial-gradient(ellipse,rgba(0,0,0,0.25),transparent);border-radius:50%;pointer-events:none;';
    this.el.appendChild(this.shadowEl);
    this.el.style.perspective='800px';
    this.el.style.transformStyle='preserve-3d';
    this.trailColor=CONFETTI_COLORS[~~(Math.random()*CONFETTI_COLORS.length)];
    this.trailTimer=0;
    this.name=CREATURE_NAMES[emoji]||'Creature';
    // Name label
    this.labelEl=document.createElement('div');
    this.labelEl.style.cssText='position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:white;background:rgba(0,0,0,0.6);padding:1px 6px;border-radius:10px;white-space:nowrap;pointer-events:none;letter-spacing:0.5px;';
    this.labelEl.textContent=this.name;
    this.el.appendChild(this.labelEl);
    // 3D depth layers
    this.el.style.filter='drop-shadow(0 8px 24px rgba(0,0,0,0.3))';
    this.life=8000; // Longer life for more interaction
  }

  update(mx,my,dt){
    const alive=super.update(mx,my,dt);
    if(!alive) return false;

    // 3D wobble
    this.wobblePhase+=0.016*this.wobbleSpeed;
    const wobX=Math.sin(this.wobblePhase)*15;
    const wobY=Math.cos(this.wobblePhase*0.7)*10;
    const tiltX=this.vy*3; // Tilt based on velocity
    const tiltY=-this.vx*3;

    // Apply 3D transform
    this.el.style.transform=`translate(-50%,-50%) rotate(${this.rotation}deg) scale(${this.scale}) perspective(800px) rotateX(${tiltX+wobY}deg) rotateY(${tiltY+wobX}deg)`;

    // Update shadow based on height illusion
    const shadowScale=0.5+Math.abs(Math.sin(this.wobblePhase))*0.5;
    this.shadowEl.style.transform=`translateX(-50%) scale(${shadowScale})`;
    this.shadowEl.style.opacity=0.3*shadowScale;

    // Emit trail particles every few frames
    this.trailTimer++;
    if(this.trailTimer%3===0 && trailParticles.length<500){
      emitTrailParticles(this.x,this.y,this.trailColor);
    }

    return true;
  }
}

function spawnShockwave(x,y){
  for(let i=0;i<4;i++){
    const ring=document.createElement('div');
    ring.style.cssText=`position:fixed;left:${x}px;top:${y}px;width:0;height:0;border-radius:50%;border:2px solid;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);`;
    ring.style.borderColor=CONFETTI_COLORS[i%CONFETTI_COLORS.length];
    document.body.appendChild(ring);
    ring.animate([
      {width:'0px',height:'0px',opacity:0.8,borderWidth:'3px'},
      {width:'400px',height:'400px',opacity:0,borderWidth:'1px'}
    ],{duration:800+i*200,delay:i*100,fill:'forwards',easing:'cubic-bezier(0.22,1,0.36,1)'});
    setTimeout(()=>ring.remove(),1500);
  }
}

// SPARKLINE MICRO-CHARTS — Inline SVG sparklines for stats
// ═══════════════════════════════════════════════════════════════════════════
function sparkline(data,color,w,h){
  const max=Math.max(...data), min=Math.min(...data);
  const range=max-min||1;
  const step=w/(data.length-1);
  let path='M';
  data.forEach((v,i)=>{
    const x=i*step;
    const y=h-(v-min)/range*h;
    path+=(i===0?'':' L ')+x.toFixed(1)+' '+y.toFixed(1);
  });
  // Fill area
  const fillPath=path+` L ${w} ${h} L 0 ${h} Z`;
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible;display:block"><defs><linearGradient id="sg_${color.replace(/[^a-z0-9]/gi,'')}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.3"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs><path d="${fillPath}" fill="url(#sg_${color.replace(/[^a-z0-9]/gi,'')})" /><path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${w}" cy="${h-(data[data.length-1]-min)/range*h}" r="2.5" fill="${color}" stroke="white" stroke-width="1"/></svg>`;
}

// AMBIENT BACKGROUND PARTICLES — Subtle floating particles in the background
// ═══════════════════════════════════════════════════════════════════════════
let ambientCanvas=null, ambientCtx=null, ambientParticles=[];

class AmbientParticle {
  constructor(w,h){
    this.x=Math.random()*w;
    this.y=Math.random()*h;
    this.vx=(Math.random()-0.5)*0.3;
    this.vy=(Math.random()-0.5)*0.3;
    this.size=1+Math.random()*2;
    this.alpha=0.1+Math.random()*0.15;
    this.pulse=Math.random()*Math.PI*2;
    this.pulseSpeed=0.5+Math.random()*1.5;
    this.color=isDark?'rgba(240,106,106,':'rgba(200,180,180,';
  }
  update(w,h){
    this.x+=this.vx; this.y+=this.vy;
    this.pulse+=0.016*this.pulseSpeed;
    if(this.x<0)this.x=w; if(this.x>w)this.x=0;
    if(this.y<0)this.y=h; if(this.y>h)this.y=0;
  }
  draw(ctx){
    const a=this.alpha*(0.5+Math.sin(this.pulse)*0.5);
    ctx.fillStyle=this.color+a+')';
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

function initAmbient(){
  ambientCanvas=document.createElement('canvas');
  ambientCanvas.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.6;';
  ambientCanvas.width=window.innerWidth;
  ambientCanvas.height=window.innerHeight;
  document.body.insertBefore(ambientCanvas,document.body.firstChild);
  ambientCtx=ambientCanvas.getContext('2d');

  for(let i=0;i<40;i++){
    ambientParticles.push(new AmbientParticle(ambientCanvas.width,ambientCanvas.height));
  }

  window.addEventListener('resize',()=>{
    ambientCanvas.width=window.innerWidth;
    ambientCanvas.height=window.innerHeight;
  });

  animateAmbient();
}

function animateAmbient(){
  if(!ambientCtx) return;
  ambientCtx.clearRect(0,0,ambientCanvas.width,ambientCanvas.height);

  // Draw connections
  for(let i=0;i<ambientParticles.length;i++){
    for(let j=i+1;j<ambientParticles.length;j++){
      const a=ambientParticles[i], b=ambientParticles[j];
      const dx=a.x-b.x, dy=a.y-b.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){
        ambientCtx.strokeStyle=isDark?`rgba(240,106,106,${0.03*(1-dist/120)})`:`rgba(180,160,160,${0.04*(1-dist/120)})`;
        ambientCtx.lineWidth=0.5;
        ambientCtx.beginPath();
        ambientCtx.moveTo(a.x,a.y);
        ambientCtx.lineTo(b.x,b.y);
        ambientCtx.stroke();
      }
    }
  }

  ambientParticles.forEach(p=>{
    p.update(ambientCanvas.width,ambientCanvas.height);
    p.draw(ambientCtx);
  });
  requestAnimationFrame(animateAmbient);
}

// PLAYBOOK BROWSER VIEW
// ═══════════════════════════════════════════════════════════════════════════
function renderPlaybookContent(){
  let h='<div style="padding:20px 28px"><h2 style="font-size:20px;font-weight:700;margin-bottom:4px">Playbook</h2><p style="font-size:12px;color:var(--text-muted);margin-bottom:16px">QBO escalation knowledge base — 8 articles</p>';
  h+='<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">';
  ['All','bank-feeds','payroll','reconciliation','permissions','billing','tax','invoicing','reporting'].forEach(cat=>{
    h+=`<div class="chip${cat==='All'?' active':''}">${cat==='All'?'All':cat.charAt(0).toUpperCase()+cat.slice(1).replace('-',' ')}</div>`;
  });
  h+='</div>';
  PLAYBOOK_ARTICLES.forEach(a=>{
    const catColors={'bank-feeds':'var(--blue)','payroll':'var(--coral)','reconciliation':'var(--green)','permissions':'var(--purple)','billing':'var(--gold)','tax':'var(--amber)','invoicing':'var(--teal)','reporting':'var(--blue-600)'};
    h+=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;cursor:pointer;transition:all 0.15s ease;border-left:4px solid ${catColors[a.category]||'var(--neutral-400)'}" onmouseover="this.style.boxShadow='var(--shadow-card-hover)';this.style.transform='translateY(-2px)'" onmouseout="this.style.boxShadow='none';this.style.transform='none'" onclick="toast('Opening ${a.id}: ${a.title}','info')">`;
    h+=`<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px"><div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-family:var(--font-mono);font-size:11px;font-weight:600;color:${catColors[a.category]}">${a.id}</span><span class="cat-badge">${a.category}</span></div><div style="font-size:15px;font-weight:700">${a.title}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:18px;font-weight:800;color:${catColors[a.category]}">${a.views}</div><div style="font-size:10px;color:var(--text-muted)">views</div></div></div>`;
    h+=`<p style="font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:10px">${a.summary}</p>`;
    h+=`<div style="display:flex;gap:6px;flex-wrap:wrap">${a.steps.slice(0,3).map((s,i)=>`<span style="font-size:10px;padding:2px 8px;background:var(--bg-alt);border-radius:4px;color:var(--text-muted)">${i+1}. ${s.slice(0,50)}...</span>`).join('')}${a.steps.length>3?`<span style="font-size:10px;padding:2px 8px;background:var(--bg-alt);border-radius:4px;color:var(--text-muted)">+${a.steps.length-3} more steps</span>`:''}</div>`;
    if(a.relatedINV.length){
      h+=`<div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap">${a.relatedINV.map(inv=>`<span style="font-size:10px;padding:2px 6px;background:var(--coral-100);color:var(--coral-700);border-radius:3px;font-weight:600">${inv}</span>`).join('')}${a.relatedESC.map(esc=>`<span style="font-size:10px;padding:2px 6px;background:var(--blue-100);color:var(--blue-600);border-radius:3px;font-weight:600">${esc}</span>`).join('')}</div>`;
    }
    h+=`<div style="font-size:10px;color:var(--text-muted);margin-top:8px">Last updated: ${a.lastUpdated}</div>`;
    h+=`</div>`;
  });
  h+='</div>';
  return h;
}

function renderTeamRoster(){
  let h='<div style="padding:20px 28px"><h2 style="font-size:20px;font-weight:700;margin-bottom:16px">Team Roster</h2>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px">';
  AGENT_PROFILES.forEach(a=>{
    const statusColor=a.status==='online'?'var(--green)':a.status==='busy'?'var(--coral)':'var(--neutral-300)';
    const statusLabel=a.status.charAt(0).toUpperCase()+a.status.slice(1);
    h+=`<div style="background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all 0.15s ease;cursor:pointer" onmouseover="this.style.boxShadow='var(--shadow-card-hover)';this.style.transform='translateY(-2px)'" onmouseout="this.style.boxShadow='none';this.style.transform='none'">`;
    h+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px"><div style="position:relative"><span style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--coral),var(--purple));display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:700">${a.initials}</span><span style="position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;background:${statusColor};border:2px solid var(--bg)"></span></div><div><div style="font-size:15px;font-weight:700">${a.name}</div><div style="font-size:11px;color:var(--text-muted)">${a.role}</div></div><span style="margin-left:auto;font-size:11px;padding:3px 8px;border-radius:20px;background:${statusColor}20;color:${statusColor};font-weight:600">${statusLabel}</span></div>`;
    h+=`<div style="display:flex;gap:16px;margin-bottom:12px;font-size:12px"><div style="text-align:center"><div style="font-size:20px;font-weight:800;color:var(--coral)">${a.resolved}</div><div style="color:var(--text-muted)">Resolved</div></div><div style="text-align:center"><div style="font-size:20px;font-weight:800;color:var(--blue)">${a.avgTime}</div><div style="color:var(--text-muted)">Avg Time</div></div><div style="text-align:center"><div style="font-size:20px;font-weight:800;color:var(--green)">${a.satisfaction}</div><div style="color:var(--text-muted)">Satisfaction</div></div><div style="text-align:center"><div style="font-size:20px;font-weight:800;color:var(--gold)">${a.streak}d</div><div style="color:var(--text-muted)">Streak</div></div></div>`;
    h+=`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">${a.specialties.map(s=>`<span class="cat-badge">${s}</span>`).join('')}</div>`;
    h+=`<div style="font-size:11px;color:var(--text-secondary);line-height:1.5">${a.notes}</div>`;
    if(a.currentCase) h+=`<div style="margin-top:10px;padding:8px 12px;background:var(--bg-alt);border-radius:6px;font-size:11px;display:flex;align-items:center;gap:6px"><span style="color:var(--coral);font-weight:700">Working on:</span>${a.currentCase}</div>`;
    h+=`</div>`;
  });
  h+='</div></div>';
  return h;
}

// CURSOR TRAIL EFFECT — Subtle coral trail following cursor in celebration
// ═══════════════════════════════════════════════════════════════════════════
let cursorTrailActive=false;
function enableCursorTrail(duration){
  cursorTrailActive=true;
  const handler=e=>{
    if(!cursorTrailActive) return;
    const dot=document.createElement('div');
    dot.style.cssText=`position:fixed;left:${e.clientX}px;top:${e.clientY}px;width:6px;height:6px;border-radius:50%;background:${CONFETTI_COLORS[~~(Math.random()*8)]};pointer-events:none;z-index:9999;transform:translate(-50%,-50%);`;
    document.body.appendChild(dot);
    dot.animate([{opacity:1,transform:'translate(-50%,-50%) scale(1)'},{opacity:0,transform:'translate(-50%,-50%) scale(0)'}],{duration:600,fill:'forwards'});
    setTimeout(()=>dot.remove(),700);
  };
  document.addEventListener('mousemove',handler);
  setTimeout(()=>{cursorTrailActive=false;document.removeEventListener('mousemove',handler);},duration||5000);
}

// AMBIENT MUSIC SYSTEM — Generates gentle background tones
// ═══════════════════════════════════════════════════════════════════════════
let ambientMusicOn=false;
let ambientOscillators=[];
function toggleAmbientMusic(){
  if(ambientMusicOn){
    ambientOscillators.forEach(o=>{try{o.gain.gain.exponentialRampToValueAtTime(0.001,o.ctx.currentTime+1);setTimeout(()=>{try{o.osc.stop();}catch(e){}},1100);}catch(e){}});
    ambientOscillators=[];
    ambientMusicOn=false;
    toast('Ambient sounds OFF','info');
    return;
  }
  try{
    const ctx=getAudioCtx();
    // Drone pad — very quiet C major chord
    const freqs=[130.81,164.81,196.00]; // C3 E3 G3
    freqs.forEach(freq=>{
      const osc=ctx.createOscillator();
      const gain=ctx.createGain();
      const filter=ctx.createBiquadFilter();
      osc.type='sine';
      osc.frequency.value=freq;
      filter.type='lowpass';
      filter.frequency.value=400;
      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);
      gain.gain.value=0;
      gain.gain.linearRampToValueAtTime(0.008,ctx.currentTime+2);
      // Gentle LFO on frequency
      const lfo=ctx.createOscillator();
      const lfoGain=ctx.createGain();
      lfo.frequency.value=0.1+Math.random()*0.2;
      lfoGain.gain.value=2;
      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
      lfo.start();
      osc.start();
      ambientOscillators.push({osc,gain,ctx,lfo});
    });
    ambientMusicOn=true;
    toast('Ambient sounds ON — gentle background drone','info');
  }catch(e){toast('Audio not available','error');}
}

// GLOBAL SEARCH ENGINE — Deep search across all data
// ═══════════════════════════════════════════════════════════════════════════
function deepSearch(query){
  const q=query.toLowerCase();
  const results=[];
  // Search escalations
  E.forEach((e,i)=>{
    if(e.title.toLowerCase().includes(q)||e.id.toLowerCase().includes(q)||e.category.includes(q)){
      results.push({type:'Escalation',title:e.id+': '+e.title,action:()=>openDetail(i),cat:e.category});
    }
  });
  // Search investigations
  INV.forEach(inv=>{
    if(inv.title.toLowerCase().includes(q)||inv.id.toLowerCase().includes(q)){
      results.push({type:'Investigation',title:inv.id+': '+inv.title,action:()=>toast('Opening '+inv.id,'info'),cat:inv.cat});
    }
  });
  // Search playbook
  PLAYBOOK_ARTICLES.forEach(a=>{
    if(a.title.toLowerCase().includes(q)||a.summary.toLowerCase().includes(q)){
      results.push({type:'Playbook',title:a.id+': '+a.title,action:()=>toast('Opening '+a.id,'info'),cat:a.category});
    }
  });
  // Search emails
  EMAILS.forEach((e,i)=>{
    if(e.subject.toLowerCase().includes(q)||e.from.toLowerCase().includes(q)){
      results.push({type:'Email',title:e.subject,action:()=>{nav('inbox');selEmail(i);},cat:'email'});
    }
  });
  // Search agents
  AGENT_PROFILES.forEach(a=>{
    if(a.name.toLowerCase().includes(q)){
      results.push({type:'Agent',title:a.name+' — '+a.role,action:()=>toast('Opening profile for '+a.name,'info'),cat:'team'});
    }
  });
  // Search templates
  RESOLUTION_TEMPLATES.forEach(t=>{
    if(t.name.toLowerCase().includes(q)){
      results.push({type:'Template',title:t.id+': '+t.name,action:()=>toast('Template '+t.id+' copied','success'),cat:t.category});
    }
  });
  return results;
}

  });
  m.style.left=Math.min(x,window.innerWidth-220)+'px';
  m.style.top=Math.min(y,window.innerHeight-m.children.length*32-20)+'px';
  document.body.appendChild(m);
  activeCtx=m;
  // Bind actions
  m.querySelectorAll('.ctx-item').forEach((el,i)=>{
    const it=items.filter(x=>x!=='-')[i];
    if(it&&it.fn) el.onclick=e=>{e.stopPropagation();closeCtx();it.fn();};
  });
  playClickSound();
}

// SORTABLE TABLE — Click headers to sort escalation list
// ═══════════════════════════════════════════════════════════════════════════
let sortCol=null, sortDir='asc';
function sortEscalations(col){
  if(sortCol===col) sortDir=sortDir==='asc'?'desc':'asc';
  else { sortCol=col; sortDir='asc'; }
  const cmp=(a,b)=>{
    let va,vb;
    switch(col){
      case 'id': va=a.id;vb=b.id;break;
      case 'status': va=a.status;vb=b.status;break;
      case 'category': va=a.category;vb=b.category;break;
      case 'priority': va={high:0,medium:1,low:2}[a.priority];vb={high:0,medium:1,low:2}[b.priority];break;
      case 'agent': va=a.agent;vb=b.agent;break;
      case 'created': va=a.created.getTime();vb=b.created.getTime();break;
      case 'age': va=new Date(2026,2,20)-a.created;vb=new Date(2026,2,20)-b.created;break;
      default: va=a.id;vb=b.id;
    }
    if(va<vb) return sortDir==='asc'?-1:1;
    if(va>vb) return sortDir==='asc'?1:-1;
    return 0;
  };
  E.sort(cmp);
  playClickSound();
  renderDash();
}

let currentPage=1;
const PAGE_SIZE=10;
function getPagedEscalations(){
  const start=(currentPage-1)*PAGE_SIZE;
  return {items:E.slice(start,start+PAGE_SIZE),total:E.length,pages:Math.ceil(E.length/PAGE_SIZE)};
}

// Override renderDash to use sortable headers + pagination + context menus
const __origRenderDash=renderDash;
renderDash=function(){
  __origRenderDash();
  if(dashSub!=='list') return;
  const view=document.getElementById('v-dashboard');
  if(!view) return;
  // Inject sortable headers and context menus into existing table
  view.querySelectorAll('.list-table th').forEach(th=>{
    const text=th.textContent.trim().toLowerCase();
    const colMap={'escalation':'id','status':'status','category':'category','priority':'priority','agent':'agent','created':'created','age':'age'};
    const col=colMap[text];
    if(col){
      th.classList.add('sortable');
      if(sortCol===col) th.classList.add(sortDir);
      th.onclick=()=>sortEscalations(col);
    }
  });
  // Add context menu to rows
  view.querySelectorAll('.list-table tbody tr').forEach((tr,i)=>{
    tr.addEventListener('contextmenu',e=>escCtxMenu(e,i));
  });
  // Add pagination
  const paged=getPagedEscalations();
  const table=view.querySelector('.list-table')?.parentElement;
  if(table&&!table.querySelector('.pagination')){
    const pagDiv=document.createElement('div');
    pagDiv.className='pagination';
    let ph=`<button class="page-btn" onclick="currentPage=Math.max(1,currentPage-1);renderDash()" ${currentPage===1?'disabled':''}>&#8249;</button>`;
    for(let p=1;p<=paged.pages;p++){
      ph+=`<button class="page-btn${p===currentPage?' active':''}" onclick="currentPage=${p};renderDash()">${p}</button>`;
    }
    ph+=`<button class="page-btn" onclick="currentPage=Math.min(${paged.pages},currentPage+1);renderDash()" ${currentPage===paged.pages?'disabled':''}>&#8250;</button>`;
    ph+=`<span class="page-info">Showing ${(currentPage-1)*PAGE_SIZE+1}-${Math.min(currentPage*PAGE_SIZE,paged.total)} of ${paged.total}</span>`;
    pagDiv.innerHTML=ph;
    table.appendChild(pagDiv);
  }
  // Add context menu to board cards
  view.querySelectorAll('.bcard').forEach((card,i)=>{
    const idx=parseInt(card.getAttribute('onclick')?.match(/\d+/)?.[0]);
    if(!isNaN(idx)) card.addEventListener('contextmenu',e=>escCtxMenu(e,idx));
  });
};

// ═══════════════════════════════════════════════════════════════════════════
// FUZZY SEARCH — Fuzzy matching in command palette
// ═══════════════════════════════════════════════════════════════════════════
function fuzzyMatch(query,str){
  const q=query.toLowerCase(),s=str.toLowerCase();
  let qi=0,score=0,consecutive=0,lastIdx=-1;
  for(let si=0;si<s.length&&qi<q.length;si++){
    if(s[si]===q[qi]){
      score+=1+(consecutive*3); // bonus for consecutive matches
      if(si===lastIdx+1) consecutive++; else consecutive=0;
      if(si===0||s[si-1]===' '||s[si-1]==='-') score+=5; // word boundary bonus
      lastIdx=si; qi++;
    }
  }
  return qi===q.length?score:0;
}

// Upgrade deep search to use fuzzy matching
const _origDeepSearch=deepSearch;
deepSearch=function(query){
  if(query.length<1)return[];
  const results=_origDeepSearch(query);
  // Also fuzzy match anything that exact match missed
  if(results.length<5){
    E.forEach((e,i)=>{
      if(results.find(r=>r.title.includes(e.id)))return;
      const score=fuzzyMatch(query,e.id+' '+e.title+' '+e.category);
      if(score>5) results.push({type:'Escalation',title:e.id+': '+e.title,action:()=>openDetail(i),cat:e.category,score});
    });
    INV.forEach(inv=>{
      if(results.find(r=>r.title.includes(inv.id)))return;
      const score=fuzzyMatch(query,inv.id+' '+inv.title);
      if(score>5) results.push({type:'Investigation',title:inv.id+': '+inv.title,action:()=>toast('Opening '+inv.id,'info'),cat:inv.cat,score});
    });
    results.sort((a,b)=>(b.score||0)-(a.score||0));
  }
  return results;
};

// ═══════════════════════════════════════════════════════════════════════════
// VIM-STYLE j/k NAVIGATION — Navigate lists with keyboard
// ═══════════════════════════════════════════════════════════════════════════
let vimIdx=-1, vimItems=[];
function updateVimItems(){
  vimItems=[];
  if(curView==='dashboard'&&dashSub==='list'){
    vimItems=Array.from(document.querySelectorAll('.list-table tbody tr'));
  } else if(curView==='investigations'){
    vimItems=Array.from(document.querySelectorAll('.inv-card'));
  } else if(curView==='my-tasks'){
    vimItems=Array.from(document.querySelectorAll('.mt-item'));
  } else if(curView==='inbox'){
    vimItems=Array.from(document.querySelectorAll('.inbox-msg'));
  }
}
function vimHighlight(){
  document.querySelectorAll('.vim-hl').forEach(el=>el.classList.remove('vim-hl'));
  if(vimIdx>=0&&vimIdx<vimItems.length){
    vimItems[vimIdx].classList.add('vim-hl');
    vimItems[vimIdx].scrollIntoView({block:'nearest',behavior:'smooth'});
  }
}
document.addEventListener('keydown',e=>{
  if(document.activeElement.matches('input,textarea'))return;
  if(document.getElementById('cmdOverlay').classList.contains('open'))return;
  if(e.key==='j'||e.key==='k'){
    e.preventDefault();
    updateVimItems();
    if(!vimItems.length)return;
    if(e.key==='j') vimIdx=Math.min(vimIdx+1,vimItems.length-1);
    if(e.key==='k') vimIdx=Math.max(vimIdx-1,0);
    vimHighlight();
    playClickSound();
  }
  if(e.key==='Enter'&&vimIdx>=0&&vimItems[vimIdx]){
    e.preventDefault();
    vimItems[vimIdx].click();
  }
  // Quick keys without modifier
  if(e.key==='d'&&!e.ctrlKey&&!e.metaKey) toggleTheme();
  if(e.key==='n'&&!e.ctrlKey&&!e.metaKey) toast('New escalation created','success');
});

// ═══════════════════════════════════════════════════════════════════════════
// ANIMATED COUNTERS — Numbers count up on view entry
// ═══════════════════════════════════════════════════════════════════════════
function animateCounters(){
  document.querySelectorAll('.stat-val').forEach(el=>{
    if(el.dataset.animated)return;
    el.dataset.animated='1';
    const text=el.textContent;
    const num=parseFloat(text.replace(/[^0-9.]/g,''));
    if(isNaN(num)||num===0)return;
    const suffix=text.replace(/[0-9.,]/g,'');
    const hasComma=text.includes(',');
    const duration=600;
    const start=Date.now();
    const fmt=v=>{
      const n=hasComma?Math.round(v).toLocaleString():Number.isInteger(num)?Math.round(v):v.toFixed(1);
      return n+suffix;
    };
    function tick(){
      const elapsed=Date.now()-start;
      const pct=Math.min(1,elapsed/duration);
      const eased=1-Math.pow(1-pct,3); // ease-out cubic
      el.textContent=fmt(num*eased);
      if(pct<1)requestAnimationFrame(tick);
      else el.textContent=text; // restore exact original
    }
    el.textContent=fmt(0);
    requestAnimationFrame(tick);
  });
}

// Run counters after each render
const __origNav=nav;
nav=function(v){
  __origNav(v);
  setTimeout(animateCounters,100);
};

// ═══════════════════════════════════════════════════════════════════════════
// CHARACTER STREAMING — AI responses stream in character by character
// ═══════════════════════════════════════════════════════════════════════════
function streamText(element,html,speed){
  speed=speed||15;
  // Strip HTML for streaming, then apply full HTML at end
  const plain=html.replace(/<[^>]+>/g,'');
  let idx=0;
  element.textContent='';
  const cursor=document.createElement('span');
  cursor.className='streaming-cursor';
  element.appendChild(cursor);
  function next(){
    if(idx<plain.length){
      cursor.before(document.createTextNode(plain[idx]));
      idx++;
      setTimeout(next,speed+Math.random()*speed);
    } else {
      cursor.remove();
      element.innerHTML=html; // apply full formatted HTML
    }
  }
  next();
}

// Upgrade chat to stream AI responses
const __origSendChat=sendChat;
sendChat=function(){
  const inp=document.getElementById('chatIn'),t=inp?.value.trim();

  CHAT_MSGS.push({r:'user',t,tm:new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})});

  const msgsEl=document.getElementById('chatMsgs');

    msgsEl.appendChild(typingEl);
    msgsEl.scrollTop=msgsEl.scrollHeight;
  }
  const response=genAI(t);
  setTimeout(()=>{
    document.getElementById('typingIndicator')?.remove();
    const tm=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    // Add message shell
    CHAT_MSGS.push({r:'assistant',t:response,tm});
    renderChat();
    // Stream into the last bubble
    const bubbles=document.querySelectorAll('.chat-msg.assistant .chat-bubble');
    const lastBubble=bubbles[bubbles.length-1];
    if(lastBubble){
      const textDiv=lastBubble.querySelector('div:nth-child(2)');
      if(textDiv) streamText(textDiv,response,12);
    }
    playResolveSound();
  },1000+Math.random()*600);
};

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Graph — Insights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.79.1"></script>
  <style>
    /* ================================================================
       DESIGN TOKENS — Deep Space Sci-Fi
       ================================================================ */
    :root {
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;

      --bg-deep: #06060f;
      --bg-card: rgba(12, 12, 25, 0.8);
      --bg-card-hover: rgba(18, 18, 35, 0.9);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-hover: rgba(255, 255, 255, 0.12);

      --text-primary: #e8e0d6;
      --text-secondary: rgba(255, 255, 255, 0.5);
      --text-tertiary: rgba(255, 255, 255, 0.3);

      --accent-red: #ff4961;
      --accent-amber: #ffd866;
      --accent-blue: #3dc2ff;
      --accent-purple: #b366ff;
      --accent-green: #00d68f;

      --node-escalation: #ff6b35;
      --node-conversation: #3dc2ff;
      --node-investigation: #ff4961;
      --node-playbook: #00d68f;
      --node-email: #b366ff;
      --node-template: #2dd4a8;
      --node-knowledge: #ffd866;

      --r-sm: 4px;
      --r-md: 8px;
      --r-lg: 12px;
      --r-xl: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow-x: hidden; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-deep);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
    }

    /* Subtle grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(61, 194, 255, 0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(179, 102, 255, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ================================================================
       LAYOUT
       ================================================================ */
    .page-wrapper {
      position: relative;
      z-index: 1;
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px 28px 40px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--text-primary);
    }
    .header h1 span {
      color: var(--text-tertiary);
      font-weight: 400;
      margin-left: 6px;
    }
    .theme-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font-sans);
      transition: all 0.2s ease;
      backdrop-filter: blur(12px);
    }
    .theme-btn:hover {
      border-color: var(--border-hover);
      color: var(--text-primary);
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      padding: 16px 18px;
      backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s ease;
    }
    .stat-card:hover {
      border-color: var(--border-hover);
    }
    .stat-card::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 60px;
      height: 100%;
      opacity: 0.4;
    }
    .stat-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-tertiary);
      margin-bottom: 6px;
    }
    .stat-value-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .stat-value {
      font-family: var(--font-mono);
      font-size: 28px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1;
    }
    .stat-delta {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 999px;
      line-height: 1.4;
    }
    .stat-delta.positive {
      background: rgba(0, 214, 143, 0.12);
      color: #00d68f;
      box-shadow: 0 0 8px rgba(0, 214, 143, 0.15);
    }
    .stat-delta.negative {
      background: rgba(255, 73, 97, 0.12);
      color: #ff4961;
      box-shadow: 0 0 8px rgba(255, 73, 97, 0.15);
    }
    .stat-sparkline {
      position: absolute;
      bottom: 12px;
      right: 14px;
      opacity: 0.5;
    }

    /* Main Layout — Two Columns */
    .main-grid {
      display: grid;
      grid-template-columns: 45% 55%;
      gap: 20px;
      margin-bottom: 24px;
    }

    /* Left Column — Pattern Cards */
    .patterns-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .pattern-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      padding: 18px 20px;
      backdrop-filter: blur(16px);
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
      border-left: 4px solid transparent;
    }
    .pattern-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--r-lg);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .pattern-card:hover {
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }
    .pattern-card:hover::before {
      opacity: 1;
    }
    .pattern-card.type-cluster { border-left-color: var(--accent-red); }
    .pattern-card.type-cluster::before { background: radial-gradient(ellipse at left center, rgba(255,73,97,0.06), transparent 70%); }
    .pattern-card.type-trending { border-left-color: var(--accent-amber); }
    .pattern-card.type-trending::before { background: radial-gradient(ellipse at left center, rgba(255,216,102,0.06), transparent 70%); }
    .pattern-card.type-hub { border-left-color: var(--accent-blue); }
    .pattern-card.type-hub::before { background: radial-gradient(ellipse at left center, rgba(61,194,255,0.06), transparent 70%); }
    .pattern-card.type-ai { border-left-color: var(--accent-purple); }
    .pattern-card.type-ai::before { background: radial-gradient(ellipse at left center, rgba(179,102,255,0.06), transparent 70%); }
    .pattern-card.type-gap { border-left-color: var(--accent-green); }
    .pattern-card.type-gap::before { background: radial-gradient(ellipse at left center, rgba(0,214,143,0.06), transparent 70%); }

    .pattern-card:hover.type-cluster { box-shadow: 0 4px 24px rgba(255,73,97,0.12), inset 0 0 0 1px rgba(255,73,97,0.1); }
    .pattern-card:hover.type-trending { box-shadow: 0 4px 24px rgba(255,216,102,0.12), inset 0 0 0 1px rgba(255,216,102,0.1); }
    .pattern-card:hover.type-hub { box-shadow: 0 4px 24px rgba(61,194,255,0.12), inset 0 0 0 1px rgba(61,194,255,0.1); }
    .pattern-card:hover.type-ai { box-shadow: 0 4px 24px rgba(179,102,255,0.12), inset 0 0 0 1px rgba(179,102,255,0.1); }
    .pattern-card:hover.type-gap { box-shadow: 0 4px 24px rgba(0,214,143,0.12), inset 0 0 0 1px rgba(0,214,143,0.1); }

    .pattern-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .pattern-icon {
      font-size: 16px;
      flex-shrink: 0;
    }
    .pattern-type {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .type-cluster .pattern-type { color: var(--accent-red); }
    .type-trending .pattern-type { color: var(--accent-amber); }
    .type-hub .pattern-type { color: var(--accent-blue); }
    .type-ai .pattern-type { color: var(--accent-purple); }
    .type-gap .pattern-type { color: var(--accent-green); }

    .pattern-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-primary);
    }
    .pattern-desc {
      font-size: 12.5px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .pattern-action {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-tertiary);
      transition: color 0.2s ease;
    }
    .pattern-card:hover .pattern-action {
      color: var(--text-secondary);
    }

    /* Right Column — Graph Container */
    .graph-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .graph-container {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      overflow: hidden;
      position: relative;
      height: 480px;
      backdrop-filter: blur(16px);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .graph-container:hover {
      border-color: rgba(61, 194, 255, 0.15);
      box-shadow: 0 0 40px rgba(61, 194, 255, 0.05);
    }
    .graph-container canvas {
      border-radius: var(--r-lg);
    }

    /* Node tooltip */
    .node-tooltip {
      position: fixed;
      background: rgba(8, 8, 18, 0.95);
      border: 1px solid var(--border-hover);
      border-radius: var(--r-md);
      padding: 10px 14px;
      pointer-events: none;
      z-index: 1000;
      backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.15s ease;
      max-width: 260px;
    }
    .node-tooltip.visible { opacity: 1; }
    .node-tooltip .tt-type {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 4px;
    }
    .node-tooltip .tt-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .node-tooltip .tt-detail {
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* Legend */
    .graph-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      padding: 0 4px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      color: var(--text-secondary);
    }
    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .expand-btn {
      align-self: flex-end;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 8px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      font-family: var(--font-sans);
      transition: all 0.2s ease;
      backdrop-filter: blur(12px);
    }
    .expand-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      box-shadow: 0 0 16px rgba(61, 194, 255, 0.1);
    }

    /* Timeline */
    .timeline-section {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      padding: 20px 24px;
      backdrop-filter: blur(16px);
    }
    .timeline-header {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-tertiary);
      margin-bottom: 16px;
    }
    .timeline-list {
      position: relative;
      padding-left: 24px;
    }
    /* Glowing vertical line */
    .timeline-list::before {
      content: '';
      position: absolute;
      left: 5px;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: linear-gradient(to bottom, var(--accent-blue), var(--accent-purple), var(--accent-blue));
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(61, 194, 255, 0.3);
    }
    .timeline-entry {
      position: relative;
      display: grid;
      grid-template-columns: 50px 1fr auto auto;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
      cursor: pointer;
      transition: background 0.15s ease;
      border-radius: var(--r-sm);
      margin: 0 -8px;
      padding-left: 8px;
      padding-right: 8px;
    }
    .timeline-entry:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    /* Dot on the line */
    .timeline-entry::before {
      content: '';
      position: absolute;
      left: -23px;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-blue);
      border: 2px solid var(--bg-deep);
      box-shadow: 0 0 6px rgba(61, 194, 255, 0.4);
    }
    .tl-time {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      text-align: right;
    }
    .tl-connection {
      font-size: 12.5px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .tl-node-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tl-arrow {
      color: var(--text-tertiary);
      flex-shrink: 0;
    }
    .tl-edge-type {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-tertiary);
      flex-shrink: 0;
    }
    .tl-weight {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-tertiary);
      flex-shrink: 0;
    }

    /* ================================================================
       RESPONSIVE — 2-col → 1-col below 1100px
       ================================================================ */
    @media (max-width: 1100px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
      .stats-row {
        grid-template-columns: repeat(3, 1fr);
      }
      .graph-container {
        height: 400px;
      }
    }
    @media (max-width: 640px) {
      .stats-row {
        grid-template-columns: repeat(2, 1fr);
      }
      .page-wrapper {
        padding: 16px;
      }
      .timeline-entry {
        grid-template-columns: 40px 1fr auto;
      }
      .tl-weight { display: none; }
    }

    /* ================================================================
       ANIMATIONS
       ================================================================ */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .stat-card, .pattern-card, .timeline-section {
      animation: fadeInUp 0.5s ease both;
    }
    .stat-card:nth-child(1) { animation-delay: 0.05s; }
    .stat-card:nth-child(2) { animation-delay: 0.1s; }
    .stat-card:nth-child(3) { animation-delay: 0.15s; }
    .stat-card:nth-child(4) { animation-delay: 0.2s; }
    .stat-card:nth-child(5) { animation-delay: 0.25s; }
    .pattern-card:nth-child(1) { animation-delay: 0.15s; }
    .pattern-card:nth-child(2) { animation-delay: 0.22s; }
    .pattern-card:nth-child(3) { animation-delay: 0.29s; }
    .pattern-card:nth-child(4) { animation-delay: 0.36s; }
    .pattern-card:nth-child(5) { animation-delay: 0.43s; }
    .timeline-section { animation-delay: 0.3s; }
  </style>
</head>
<body>

<div class="page-wrapper">
  <!-- Header -->
  <header class="header">
    <h1>Knowledge Graph<span>Insights</span></h1>
    <button class="theme-btn" id="themeToggle">&#9790; Theme</button>
  </header>

  <!-- Stats Row -->
  <div class="stats-row" id="statsRow"></div>

  <!-- Main Grid -->
  <div class="main-grid">
    <!-- Left: Pattern Cards -->
    <div class="patterns-col" id="patternsCol"></div>

    <!-- Right: Graph + Legend -->
    <div class="graph-col">
      <div class="graph-container" id="graphContainer"></div>
      <div class="graph-legend" id="graphLegend"></div>
      <button class="expand-btn" id="expandBtn">Expand to Full Graph &rarr;</button>
    </div>
  </div>

  <!-- Recent Connections Timeline -->
  <div class="timeline-section">
    <div class="timeline-header">Recent Connections</div>
    <div class="timeline-list" id="timelineList"></div>
  </div>
</div>

<!-- Node Tooltip -->
<div class="node-tooltip" id="nodeTooltip">
  <div class="tt-type"></div>
  <div class="tt-name"></div>
  <div class="tt-detail"></div>
</div>

// ================================================================
// SPARKLINE SVG GENERATOR
// ================================================================
function generateSparkline(data, color) {
  const w = 44, h = 22;
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const points = data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return `${x},${y}`;
  }).join(' ');
  return `<svg class="stat-sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// ================================================================
// ANIMATED COUNT-UP
// ================================================================
function animateValue(el, start, end, duration, suffix = '') {
  const range = end - start;
  const startTime = performance.now();
  function update(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.floor(start + range * eased) + suffix;
    if (progress < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

// ================================================================
// 3D FORCE GRAPH SETUP
// ================================================================
let graph;
const graphEl = document.getElementById('graphContainer');
const tooltip = document.getElementById('nodeTooltip');

// Node size by type
const NODE_SIZES = {
  escalation: 4,
  conversation: 3.5,
  investigation: 5,
  playbook: 4.5,
  email: 3,
  template: 3,
  knowledge: 3.5
};

function initGraph() {
  const graphData = {
    nodes: nodes.map(n => ({ ...n })),
    links: edges.map(e => ({ source: e.source, target: e.target, edgeType: e.type, weight: e.weight }))
  };

  graph = ForceGraph3D()(graphEl)
    .graphData(graphData)
    .backgroundColor('rgba(0,0,0,0)')
    .width(graphEl.clientWidth)
    .height(graphEl.clientHeight)
    .showNavInfo(false)

    // Node rendering — glowing sprites
    .nodeThreeObject(node => {
      const size = (NODE_SIZES[node.type] || 3) * 6;
      const color = NODE_COLORS[node.type] || '#ffffff';

      const canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');

      // Outer glow
      const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
      gradient.addColorStop(0, color);
      gradient.addColorStop(0.3, color + 'cc');
      gradient.addColorStop(0.6, color + '44');
      gradient.addColorStop(1, color + '00');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 64, 64);

      // Core
      ctx.beginPath();
      ctx.arc(32, 32, 8, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(size, size, 1);
      sprite.userData = { baseScale: size, nodeId: node.id };
      return sprite;
    })
    .nodeThreeObjectExtend(false)

    // Link rendering
    .linkColor(link => {
      const colors = {
        error_code: '#ff496140',
        customer: '#3dc2ff40',
        discussed: '#ffffff20',
        reference: '#00d68f30',
        symptom: '#ffd86640',
        used: '#2dd4a830',
        generated: '#b366ff40',
        ai_discovered: '#b366ff60'
      };
      return colors[link.edgeType] || '#ffffff15';
    })
    .linkWidth(link => Math.max(0.3, link.weight * 1.2))
    .linkOpacity(0.6);

  // Forces — must be set separately since d3Force() returns the force object, not the graph
  setTimeout(() => {
    const chargeForce = graph.d3Force('charge');
    if (chargeForce) chargeForce.strength(-80);
    const linkForce = graph.d3Force('link');
    if (linkForce) linkForce.distance(link => 40 + (1 - link.weight) * 60);
  }, 200);

  // Auto-orbit
  graph.controls().autoRotate = true;
  graph.controls().autoRotateSpeed = 0.3;
  graph.controls().enableDamping = true;
  graph.controls().dampingFactor = 0.1;

  // Bloom postprocessing
  setTimeout(() => {
    const renderer = graph.renderer();
    const scene = graph.scene();
    const camera = graph.camera();
    if (renderer && scene && camera) {
      const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(graphEl.clientWidth, graphEl.clientHeight),
        2.0,    // strength
        0.8,    // radius
        0.15    // threshold
      );
      const composer = graph.postProcessingComposer();
      composer.addPass(bloomPass);
    }
  }, 500);

  // Hover tooltip
  graph.onNodeHover(node => {
    graphEl.style.cursor = node ? 'pointer' : 'default';
    if (node) {
      const ttType = tooltip.querySelector('.tt-type');
      const ttName = tooltip.querySelector('.tt-name');
      const ttDetail = tooltip.querySelector('.tt-detail');
      ttType.textContent = node.type.toUpperCase();
      ttType.style.color = NODE_COLORS[node.type];
      ttName.textContent = node.label;
      ttDetail.textContent = node.detail || '';
      tooltip.classList.add('visible');
    } else {
      tooltip.classList.remove('visible');
    }
  });

  // Track mouse for tooltip positioning
  graphEl.addEventListener('mousemove', e => {
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
  });

  // Click node
  graph.onNodeClick(node => {
    if (!node) return;
    const distance = 120;
    const distRatio = 1 + distance / Math.hypot(node.x, node.y, node.z);
    graph.cameraPosition(
      { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
      node,
      1200
    );
  });

  // Add particles on edges
  graph
    .linkDirectionalParticles(link => link.weight > 0.7 ? 2 : 1)
    .linkDirectionalParticleWidth(1.2)
    .linkDirectionalParticleSpeed(0.004)
    .linkDirectionalParticleColor(link => {
      const colors = {
        error_code: '#ff4961',
        customer: '#3dc2ff',
        discussed: '#ffffff',
        reference: '#00d68f',
        symptom: '#ffd866',
        used: '#2dd4a8',
        generated: '#b366ff',
        ai_discovered: '#b366ff'
      };
      return colors[link.edgeType] || '#ffffff';
    });

  // Resize handler
  const resizeObserver = new ResizeObserver(() => {
    graph.width(graphEl.clientWidth);
    graph.height(graphEl.clientHeight);
  });
  resizeObserver.observe(graphEl);
}

// ================================================================
// GRAPH HIGHLIGHTING
// ================================================================
function highlightGraphNodes(pattern) {
  if (!graph || typeof graph.nodeThreeObject !== 'function') return;
  activePatternId = pattern.id;
  const targetIds = new Set(pattern.nodeIds);

  graph.nodeThreeObject(node => {
    const isHighlighted = targetIds.has(node.id);
    const baseSize = (NODE_SIZES[node.type] || 3) * 6;
    const size = isHighlighted ? baseSize * 1.5 : baseSize * 0.5;
    const color = NODE_COLORS[node.type] || '#ffffff';
    const alpha = isHighlighted ? 1.0 : 0.15;

    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');

    const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
    if (isHighlighted) {
      gradient.addColorStop(0, '#ffffff');
      gradient.addColorStop(0.15, color);
      gradient.addColorStop(0.4, color + 'cc');
      gradient.addColorStop(0.7, color + '44');
      gradient.addColorStop(1, color + '00');
    } else {
      gradient.addColorStop(0, color + '40');
      gradient.addColorStop(0.5, color + '15');
      gradient.addColorStop(1, color + '00');
    }
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 64, 64);

    if (isHighlighted) {
      ctx.beginPath();
      ctx.arc(32, 32, 10, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
    }

    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.SpriteMaterial({
      map: texture,
      transparent: true,
      opacity: alpha,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
    const sprite = new THREE.Sprite(material);
    sprite.scale.set(size, size, 1);
    return sprite;
  });

  // Dim non-relevant links
  graph.linkOpacity(link => {
    const srcId = typeof link.source === 'object' ? link.source.id : link.source;
    const tgtId = typeof link.target === 'object' ? link.target.id : link.target;
    return (targetIds.has(srcId) && targetIds.has(tgtId)) ? 0.8 : 0.05;
  });
}

function clearHighlight() {
  if (!graph || typeof graph.nodeThreeObject !== 'function') return;
  activePatternId = null;

  graph.nodeThreeObject(node => {
    const size = (NODE_SIZES[node.type] || 3) * 6;
    const color = NODE_COLORS[node.type] || '#ffffff';

    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');

    const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
    gradient.addColorStop(0, color);
    gradient.addColorStop(0.3, color + 'cc');
    gradient.addColorStop(0.6, color + '44');
    gradient.addColorStop(1, color + '00');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 64, 64);

    ctx.beginPath();
    ctx.arc(32, 32, 8, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    const texture = new THREE.CanvasTexture(canvas);
    const material = new THREE.SpriteMaterial({
      map: texture,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });
    const sprite = new THREE.Sprite(material);
    sprite.scale.set(size, size, 1);
    return sprite;
  });

  graph.linkOpacity(0.6);
}

function zoomToPattern(pattern) {
  if (!graph || typeof graph.graphData !== 'function') return;
  const targetIds = new Set(pattern.nodeIds);
  const gd = graph.graphData();
  const targetNodes = gd.nodes.filter(n => targetIds.has(n.id));

  if (targetNodes.length === 0) return;

  // Calculate centroid
  const cx = targetNodes.reduce((s, n) => s + (n.x || 0), 0) / targetNodes.length;
  const cy = targetNodes.reduce((s, n) => s + (n.y || 0), 0) / targetNodes.length;
  const cz = targetNodes.reduce((s, n) => s + (n.z || 0), 0) / targetNodes.length;

  // Calculate spread for distance
  const maxDist = Math.max(...targetNodes.map(n =>
    Math.hypot((n.x || 0) - cx, (n.y || 0) - cy, (n.z || 0) - cz)
  )) || 50;

  const distance = maxDist * 2.5 + 80;
  const distRatio = 1 + distance / (Math.hypot(cx, cy, cz) || 1);

  graph.cameraPosition(
    { x: cx * distRatio || distance, y: cy * distRatio || distance * 0.3, z: cz * distRatio || distance },
    { x: cx, y: cy, z: cz },
    1500
  );

  // Also highlight
  highlightGraphNodes(pattern);
  // Clear after 4 seconds
  setTimeout(() => clearHighlight(), 4000);
}

function highlightTimelineNodes(sourceId, targetId) {
  if (!graph || typeof graph.graphData !== 'function') return;
  const targetIds = new Set([sourceId, targetId]);
  const fakePattern = { id: 'timeline', nodeIds: [sourceId, targetId], accent: '#3dc2ff' };
  highlightGraphNodes(fakePattern);

  // Zoom to midpoint
  const gd = graph.graphData();
  const src = gd.nodes.find(n => n.id === sourceId);
  const tgt = gd.nodes.find(n => n.id === targetId);
  if (src && tgt) {
    const mx = ((src.x || 0) + (tgt.x || 0)) / 2;
    const my = ((src.y || 0) + (tgt.y || 0)) / 2;
    const mz = ((src.z || 0) + (tgt.z || 0)) / 2;
    const dist = Math.hypot((src.x||0)-(tgt.x||0), (src.y||0)-(tgt.y||0), (src.z||0)-(tgt.z||0));
    const camDist = Math.max(dist * 2, 120);
    graph.cameraPosition(
      { x: mx + camDist * 0.5, y: my + camDist * 0.3, z: mz + camDist },
      { x: mx, y: my, z: mz },
      1200
    );
  }

  setTimeout(() => clearHighlight(), 3000);
}

// ================================================================
// INIT
// ================================================================
renderStats();
renderPatterns();
renderTimeline();
renderLegend();

// Delay graph init slightly so DOM is fully painted
setTimeout(() => initGraph(), 100);

// Theme toggle (visual only)
document.getElementById('themeToggle').addEventListener('click', () => {
  // Just a flash effect since this is always dark
  const btn = document.getElementById('themeToggle');
  btn.textContent = btn.textContent.includes('\u263E') ? '\u2600 Theme' : '\u263E Theme';
});

// Expand button
document.getElementById('expandBtn').addEventListener('click', () => {
  const container = document.querySelector('.graph-container');
  if (container.style.height === '90vh') {
    container.style.height = '480px';
    document.getElementById('expandBtn').innerHTML = 'Expand to Full Graph &rarr;';
  } else {
    container.style.height = '90vh';
    document.getElementById('expandBtn').innerHTML = 'Collapse Graph &larr;';
    graph.width(graphEl.clientWidth);
    graph.height(graphEl.clientHeight);
  }
  setTimeout(() => {
    graph.width(graphEl.clientWidth);
    graph.height(graphEl.clientHeight);
  }, 50);
});

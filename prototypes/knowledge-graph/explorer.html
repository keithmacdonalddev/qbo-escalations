<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Graph — QBO Assist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/3d-force-graph@1.79.1"></script>
<script src="https://cdn.jsdelivr.net/npm/three-spritetext"></script>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --bg: #06060f;
  --glass: rgba(6, 6, 15, 0.82);
  --glass-border: rgba(255, 255, 255, 0.06);
  --text-primary: rgba(255, 255, 255, 0.92);
  --text-secondary: rgba(255, 255, 255, 0.55);
  --text-tertiary: rgba(255, 255, 255, 0.32);
  --accent: #3dc2ff;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

#graph-container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; }

.glass {
  background: var(--glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border);
}

/* ---- Top Bar ---- */
.top-bar {
  position: fixed; top: 0; left: 0; right: 0; height: 52px; z-index: 100;
  display: flex; align-items: center; gap: 16px; padding: 0 20px;
  border-bottom: 1px solid var(--glass-border);
}
.top-bar .logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.top-bar .logo-icon {
  width: 26px; height: 26px; border-radius: 6px;
  background: linear-gradient(135deg, #3dc2ff, #0090cc);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff;
}
.top-bar .logo-text { font-size: 13px; font-weight: 600; letter-spacing: -0.3px; }
.top-bar .divider { width: 1px; height: 24px; background: var(--glass-border); flex-shrink: 0; }
.search-wrap { position: relative; flex: 0 1 280px; }
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; color: var(--text-tertiary); pointer-events: none;
}
.search-input {
  width: 100%; height: 32px; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
  padding: 0 10px 0 30px; font: 13px var(--font-sans); color: var(--text-primary); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input::placeholder { color: var(--text-tertiary); }
.search-input:focus {
  border-color: rgba(61,194,255,0.3);
  box-shadow: 0 0 0 3px rgba(61,194,255,0.08), 0 0 20px rgba(61,194,255,0.05);
}
.type-filters { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.type-filters .label { font-size: 11px; color: var(--text-tertiary); margin-right: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
.type-dot {
  width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
  transition: transform 0.15s, opacity 0.15s, box-shadow 0.15s; border: 2px solid transparent;
}
.type-dot:hover { transform: scale(1.25); }
.type-dot.active { box-shadow: 0 0 8px currentColor; }
.type-dot.inactive { opacity: 0.2; }
.weight-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.weight-wrap .label { font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; }
.weight-slider {
  width: 100px; height: 3px; -webkit-appearance: none; appearance: none;
  background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; cursor: pointer;
}
.weight-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 8px var(--accent); cursor: pointer;
}
.weight-slider::-moz-range-thumb {
  width: 12px; height: 12px; border-radius: 50%; background: var(--accent);
  box-shadow: 0 0 8px var(--accent); cursor: pointer; border: none;
}
.weight-value { font-size: 11px; font-family: var(--font-mono); color: var(--text-secondary); min-width: 28px; }
.spacer { flex: 1; }
.kbd {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 20px; height: 20px; padding: 0 5px; border-radius: 4px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
  font-size: 10px; font-family: var(--font-mono); color: var(--text-tertiary);
}

/* ---- Bottom Bar ---- */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0; height: 40px; z-index: 100;
  display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
  border-top: 1px solid var(--glass-border); font-size: 12px;
}
.stats { display: flex; align-items: center; gap: 16px; }
.stat { display: flex; align-items: center; gap: 5px; color: var(--text-secondary); }
.stat .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
.stat .val { font-family: var(--font-mono); color: var(--text-primary); font-weight: 500; }
.legend { display: flex; align-items: center; gap: 12px; }
.legend-item { display: flex; align-items: center; gap: 5px; color: var(--text-secondary); font-size: 11px; }
.legend-item .dot { width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 6px currentColor; }

/* ---- Detail Panel ---- */
.detail-panel {
  position: fixed; top: 52px; right: 0; bottom: 40px; width: 380px; z-index: 90;
  border-left: 1px solid var(--glass-border);
  transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
  overflow-y: auto; overflow-x: hidden; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.detail-panel.open { transform: translateX(0); }
.detail-panel::-webkit-scrollbar { width: 4px; }
.detail-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.detail-content { padding: 24px 20px; }
.detail-close {
  position: absolute; top: 16px; right: 16px; width: 28px; height: 28px; border-radius: 6px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: background 0.15s, color 0.15s;
}
.detail-close:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
.detail-title { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 12px; padding-right: 36px; line-height: 1.35; }
.detail-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.badge { display: inline-flex; align-items: center; gap: 4px; height: 22px; padding: 0 8px; border-radius: 999px; font-size: 11px; font-weight: 500; letter-spacing: 0.2px; }
.badge-type { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.badge-type .bdot { width: 6px; height: 6px; border-radius: 50%; }
.badge-category { background: rgba(255,255,255,0.06); color: var(--text-secondary); }
.badge-status { font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; font-size: 10px; }
.badge-status.open { background: rgba(255,190,60,0.15); color: #ffbe3c; }
.badge-status.in-progress { background: rgba(61,194,255,0.15); color: #3dc2ff; }
.badge-status.resolved { background: rgba(0,214,143,0.15); color: #00d68f; }
.badge-status.escalated { background: rgba(255,73,97,0.15); color: #ff4961; }
.detail-section { margin-bottom: 20px; }
.detail-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-tertiary); margin-bottom: 8px; font-weight: 600; }
.detail-summary { font-size: 13px; line-height: 1.65; color: var(--text-secondary); }
.detail-entities { display: flex; flex-wrap: wrap; gap: 4px; }
.entity-tag {
  height: 24px; padding: 0 8px; border-radius: 4px; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.06); font-size: 11px; font-family: var(--font-mono);
  color: var(--text-secondary); display: flex; align-items: center;
}
.connection-list { display: flex; flex-direction: column; gap: 6px; }
.connection-item {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.04);
  cursor: pointer; transition: background 0.15s, border-color 0.15s;
}
.connection-item:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.08); }
.connection-item .cdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.connection-item .cinfo { flex: 1; min-width: 0; }
.connection-item .clabel { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.connection-item .creason { font-size: 11px; color: var(--text-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.connection-item .cweight { flex-shrink: 0; width: 40px; height: 3px; border-radius: 2px; background: rgba(255,255,255,0.08); overflow: hidden; }
.connection-item .cweight-fill { height: 100%; border-radius: 2px; }
.detail-actions { display: flex; gap: 8px; margin-top: 20px; }
.detail-btn {
  flex: 1; height: 34px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04); color: var(--text-secondary);
  font: 12px/1 var(--font-sans); font-weight: 500; cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.detail-btn:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); border-color: rgba(255,255,255,0.12); }
.detail-btn.primary { background: rgba(61,194,255,0.12); border-color: rgba(61,194,255,0.2); color: #3dc2ff; }
.detail-btn.primary:hover { background: rgba(61,194,255,0.2); }

/* ---- Tooltip ---- */
.tooltip {
  position: fixed; z-index: 200; pointer-events: none; padding: 10px 14px; border-radius: 10px;
  max-width: 280px; opacity: 0; transform: translateY(4px); transition: opacity 0.15s, transform 0.15s;
}
.tooltip.visible { opacity: 1; transform: translateY(0); }
.tooltip-label { font-size: 13px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tooltip-meta { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-secondary); }
.tooltip-meta .tdot { width: 6px; height: 6px; border-radius: 50%; }

/* ---- Empty / Loading ---- */
.empty-state { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 80; text-align: center; display: none; }
.empty-state.visible { display: block; }
.empty-state h3 { font-size: 16px; font-weight: 500; color: var(--text-secondary); text-shadow: 0 0 30px rgba(61,194,255,0.3); }
.empty-state p { font-size: 13px; color: var(--text-tertiary); margin-top: 6px; }
.loading-overlay {
  position: fixed; inset: 0; z-index: 300; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  transition: opacity 0.6s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-ring {
  width: 40px; height: 40px; border: 2px solid rgba(61,194,255,0.15); border-top-color: #3dc2ff;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--text-secondary); letter-spacing: 0.3px; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-ring"></div>
  <div class="loading-text">Initializing knowledge graph...</div>
</div>

<div id="graph-container"></div>

<!-- Top Bar -->
<div class="top-bar glass">
  <div class="logo">
    <div class="logo-icon">KG</div>
    <span class="logo-text">Knowledge Graph</span>
  </div>
  <div class="divider"></div>
  <div class="search-wrap">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="5"/><path d="M10.5 10.5L15 15"/></svg>
    <input type="text" class="search-input" id="searchInput" placeholder="Search nodes... ( / )">
  </div>
  <div class="divider"></div>
  <div class="type-filters" id="typeFilters"><span class="label">Types</span></div>
  <div class="divider"></div>
  <div class="weight-wrap">
    <span class="label">Weight</span>
    <input type="range" class="weight-slider" id="weightSlider" min="0" max="1" step="0.05" value="0">
    <span class="weight-value" id="weightValue">0.00</span>
  </div>
  <div class="spacer"></div>
  <span class="kbd">Esc</span>
</div>

<!-- Bottom Bar -->
<div class="bottom-bar glass">
  <div class="stats">
    <div class="stat"><span class="dot"></span><span class="val" id="statNodes">0</span> nodes</div>
    <div class="stat"><span class="dot" style="background:#00d68f"></span><span class="val" id="statEdges">0</span> edges</div>
    <div class="stat"><span class="dot" style="background:#b366ff"></span><span class="val" id="statClusters">0</span> clusters</div>
  </div>
  <div class="legend" id="legend"></div>
</div>

<!-- Detail Panel -->
<div class="detail-panel glass" id="detailPanel">
  <button class="detail-close" id="detailClose">&times;</button>
  <div class="detail-content" id="detailContent"></div>
</div>

<!-- Tooltip -->
<div class="tooltip glass" id="tooltip">
  <div class="tooltip-label" id="tooltipLabel"></div>
  <div class="tooltip-meta" id="tooltipMeta"></div>
</div>

<!-- Empty State -->
<div class="empty-state" id="emptyState">
  <h3>No nodes match current filters</h3>
  <p>Try adjusting your search or type filters</p>
</div>

<script type="module">
import { UnrealBloomPass } from 'https://esm.sh/three@0.160.0/examples/jsm/postprocessing/UnrealBloomPass.js';

// ============================================================
// Constants
// ============================================================
const NODE_COLORS = {
  escalation:    '#ff6b35',
  conversation:  '#3dc2ff',
  investigation: '#ff4961',
  playbook:      '#00d68f',
  email:         '#b366ff',
  template:      '#2dd4a8',
  knowledge:     '#ffd866'
};

const NODE_LABELS = {
  escalation:    'Escalation',
  conversation:  'Conversation',
  investigation: 'Investigation',
  playbook:      'Playbook',
  email:         'Email',
  template:      'Template',
  knowledge:     'Knowledge'
};

// ============================================================
// Mock Data
// ============================================================
function generateMockData() {
  const nodes = [];
  const edges = [];
  let id = 0;
  function nid() { return 'n' + (id++); }

  const escalations = [
    { id: nid(), type: 'escalation', label: 'OL-301 Bank Feed Disconnect', category: 'bank-feeds', status: 'open', summary: 'Chase bank feed returning OL-301 after OAuth migration. Customer reports feeds stopped syncing 3 days ago. Multiple reconnection attempts failed with token refresh error.', entities: ['OL-301', 'COID:4829371', 'Chase'], date: '2026-03-12' },
    { id: nid(), type: 'escalation', label: 'OLSU-1024 Multi-User Sync', category: 'bank-feeds', status: 'in-progress', summary: 'Wells Fargo multi-user company shows OLSU-1024 on secondary user login. Primary accountant can sync fine. Firewall rule change suspected after office network migration.', entities: ['OLSU-1024', 'COID:8827165', 'Wells Fargo'], date: '2026-03-11' },
    { id: nid(), type: 'escalation', label: 'Payroll Tax Table Mismatch', category: 'payroll', status: 'escalated', summary: 'State tax withholding using 2025 tables instead of 2026 for California employees. Affects W-2 prep and quarterly filings. 12 employees impacted, corrections needed before April 15 deadline.', entities: ['COID:3301284', 'CA-SIT', 'Q1-2026'], date: '2026-03-13' },
    { id: nid(), type: 'escalation', label: 'Error 324 Duplicate Transactions', category: 'reconciliation', status: 'open', summary: 'Downloaded transactions appearing twice in register after bank feed refresh. Error 324 on attempted delete. Affects 47 transactions from Feb statement.', entities: ['Error 324', 'COID:5519023', 'BoA'], date: '2026-03-10' },
    { id: nid(), type: 'escalation', label: 'Permission Denied — Accountant Invite', category: 'billing', status: 'resolved', summary: 'Primary admin cannot invite accountant as firm user. Gets "Permission denied: subscription tier does not support this action." Company on Plus subscription, which should support 5 accountant seats.', entities: ['COID:9912847', 'Plus Plan'], date: '2026-03-08' },
    { id: nid(), type: 'escalation', label: 'Sales Tax Calculation Wrong', category: 'tax', status: 'open', summary: 'Nexus not calculating correctly for multi-state e-commerce company. Colorado sales showing 0% tax on physical goods shipped to Denver. Tax code mapping verified correct in settings.', entities: ['COID:6671039', 'CO-Sales Tax', 'Avalara'], date: '2026-03-13' },
    { id: nid(), type: 'escalation', label: 'Bank Rule Auto-Match Broken', category: 'bank-feeds', status: 'in-progress', summary: 'Auto-match rules stopped working after recent QBO update. Rules exist and are enabled, but downloaded transactions are not being matched. Manual categorization still works.', entities: ['COID:2248711', 'Citi Bank'], date: '2026-03-12' },
    { id: nid(), type: 'escalation', label: 'Payroll Direct Deposit Rejected', category: 'payroll', status: 'escalated', summary: 'Two employees did not receive direct deposit. NACHA file shows reject code R03 (No Account/Unable to Locate). Verified routing and account numbers match employee bank confirmations.', entities: ['COID:7743920', 'R03', 'Payroll Run #2847'], date: '2026-03-14' },
    { id: nid(), type: 'escalation', label: 'Reconciliation Discrepancy $0.01', category: 'reconciliation', status: 'open', summary: 'Persistent one-cent discrepancy in January bank reconciliation that cannot be resolved. Likely a rounding issue in multi-currency transaction conversion from CAD to USD.', entities: ['COID:1158394', 'Multi-Currency', 'CAD/USD'], date: '2026-03-09' },
    { id: nid(), type: 'escalation', label: 'Cannot Print 1099-NEC', category: 'tax', status: 'resolved', summary: 'Tax form printing fails with generic error. PDF generation returns blank pages for 1099-NEC forms. 1099-MISC prints fine. Issue traced to contractor with special characters in legal name.', entities: ['COID:3387612', '1099-NEC'], date: '2026-03-07' },
    { id: nid(), type: 'escalation', label: 'Mobile App Crash on Receipt Upload', category: 'technical', status: 'open', summary: 'iOS app crashes immediately on camera activation for receipt capture. Started after iOS 19.3 update. Android version works. Tried reinstall, cleared cache, same behavior.', entities: ['COID:5501829', 'iOS 19.3', 'Receipt Capture'], date: '2026-03-13' },
    { id: nid(), type: 'escalation', label: 'OL-301 Chase OAuth Token Expired', category: 'bank-feeds', status: 'in-progress', summary: 'Second report of OL-301 with Chase connection this week. OAuth token failing to refresh after 90-day rotation. Likely related to Chase API policy change on March 1st.', entities: ['OL-301', 'COID:8291045', 'Chase OAuth'], date: '2026-03-13' },
    { id: nid(), type: 'escalation', label: 'Inventory Qty Mismatch After Transfer', category: 'reconciliation', status: 'open', summary: 'Inventory quantity on hand shows negative after warehouse transfer. Physical count confirms 45 units, QBO shows -3. Transfer order posted correctly but receiving warehouse did not increment.', entities: ['COID:4472918', 'Warehouse Transfer', 'SKU-A2847'], date: '2026-03-11' },
    { id: nid(), type: 'escalation', label: 'Payroll State Filing Deadline Alert', category: 'payroll', status: 'open', summary: 'Customer in New York receiving incorrect filing deadline notifications. System shows Feb 28 deadline for Q4 filing that was already submitted and accepted. Notification engine not clearing acknowledged filings.', entities: ['COID:6619382', 'NY-SUI', 'Q4-2025'], date: '2026-03-10' },
    { id: nid(), type: 'escalation', label: 'API Rate Limit — Third Party App', category: 'technical', status: 'in-progress', summary: 'Customer third-party integration hitting API rate limits during nightly sync. 500+ invoices failing to push. App developer contacted, confirmed they throttle to 10 req/s. QBO throttle appears to be at 5/s.', entities: ['COID:9938271', 'API Rate Limit', 'Invoice Sync'], date: '2026-03-12' },
  ];

  const conversations = [
    { id: nid(), type: 'conversation', label: 'Chat: OL-301 Troubleshooting', category: 'bank-feeds', status: 'resolved', summary: 'Agent walked through OAuth re-authentication steps. Customer cleared browser cache, removed and re-added Chase connection. Connection restored but monitoring for 48 hours.', entities: ['Agent: TM-4829', 'COID:4829371'], date: '2026-03-12' },
    { id: nid(), type: 'conversation', label: 'Chat: Payroll Tax Table Fix', category: 'payroll', status: 'in-progress', summary: 'Escalation specialist confirming which tax table version is loaded. Checking if manual override was applied. Need to verify SUI rate and state withholding table against 2026 published rates.', entities: ['Agent: KL-9201', 'COID:3301284'], date: '2026-03-13' },
    { id: nid(), type: 'conversation', label: 'Chat: Error 324 Investigation', category: 'reconciliation', status: 'open', summary: 'Gathered transaction IDs for duplicated entries. Agent requesting backend team check for duplicate import job. May need to manually void and re-import affected date range.', entities: ['Agent: RJ-3847', 'COID:5519023'], date: '2026-03-10' },
    { id: nid(), type: 'conversation', label: 'Chat: Permission Tier Clarification', category: 'billing', status: 'resolved', summary: 'Confirmed Plus plan includes 5 accountant seats. Issue was stale subscription cache on server side. Hard refresh of subscription status resolved the permission block.', entities: ['Agent: AS-7712', 'COID:9912847'], date: '2026-03-08' },
    { id: nid(), type: 'conversation', label: 'Chat: Sales Tax Nexus Config', category: 'tax', status: 'in-progress', summary: 'Reviewing Avalara integration settings. Nexus registration shows Colorado enabled. Checking if economic nexus threshold was exceeded and if tax code assignment for product categories is correct.', entities: ['Agent: DM-2219', 'COID:6671039'], date: '2026-03-13' },
    { id: nid(), type: 'conversation', label: 'Chat: Direct Deposit NACHA Debug', category: 'payroll', status: 'escalated', summary: 'Pulled NACHA trace number for rejected transactions. R03 code typically means wrong account number but customer insists numbers are correct. Requesting bank verification letter from employee bank.', entities: ['Agent: BW-5501', 'COID:7743920'], date: '2026-03-14' },

// ============================================================
// Star texture — radial gradient sprite per type
// ============================================================
function createStarTexture(color) {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(0.15, color);
  g.addColorStop(0.4, color + 'aa');
  g.addColorStop(0.7, color + '33');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(c);
}

const starTextures = {};
for (const [type, color] of Object.entries(NODE_COLORS)) {
  starTextures[type] = createStarTexture(color);
}

// Data
// ============================================================
const mockData = generateMockData();
const nodeById = new Map(mockData.nodes.map(n => [n.id, n]));

// ============================================================
// 3D Force Graph
// ============================================================
const container = document.getElementById('graph-container');

const graph = ForceGraph3D()(container)
  .backgroundColor('#000008')
  .width(window.innerWidth)
  .height(window.innerHeight)
  .showNavInfo(false)
  .nodeThreeObject(node => {
    const texture = starTextures[node.type] || starTextures.escalation;
    const mat = new THREE.SpriteMaterial({
      map: texture,
      blending: THREE.AdditiveBlending,
      transparent: true,
      depthWrite: false,
      opacity: 1
    });
    const sprite = new THREE.Sprite(mat);
    const sz = 6 + Math.min((node.connections || 0) * 2, 16);
    sprite.scale.set(sz, sz, 1);
    sprite.renderOrder = 1;
    return sprite;
  })
  .nodeThreeObjectExtend(false)
  .linkColor(() => 'rgba(255,255,255,0.08)')
  .linkWidth(0.4)
  .linkOpacity(0.15)
  .linkDirectionalParticles(link => 2 + Math.floor((link.weight || 0.5) * 2))
  .linkDirectionalParticleSpeed(0.005)
  .linkDirectionalParticleWidth(1.5)
  .linkDirectionalParticleColor(() => '#ffffff')
  .d3AlphaDecay(0.02)
  .d3VelocityDecay(0.35)
  .onNodeHover(handleNodeHover)
  .onNodeClick(handleNodeClick)
  .onBackgroundClick(handleBackgroundClick)
  .graphData({ nodes: [...mockData.nodes], links: [...mockData.edges] });

// Tune forces
graph.d3Force('charge').strength(n => -60 - (n.connections || 0) * 8);
graph.d3Force('link').distance(link => 100 - (link.weight || 0.5) * 30);

// ============================================================
// Bloom post-processing
// ============================================================
try {
  const bloom = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    2.5, 0.8, 0
  );
  graph.postProcessingComposer().addPass(bloom);
  state.bloomPass = bloom;
} catch (e) {
  console.warn('Bloom:', e);
}

// ============================================================
// Fog
// ============================================================
try { graph.scene().fog = new THREE.FogExp2(0x000008, 0.0012); } catch(e) {}

// ============================================================
// Animation — auto-rotation + pulsing
// ============================================================
let userInteracted = false;
let rotAngle = 0;

function tick() {
  requestAnimationFrame(tick);
  const t = Date.now() * 0.001;

  if (state.autoRotate && !userInteracted) {
    rotAngle += 0.0015;
    const cam = graph.camera();
    const d = cam.position.length();
    graph.cameraPosition({ x: d * Math.sin(rotAngle), y: cam.position.y, z: d * Math.cos(rotAngle) });
  }

  const gd = graph.graphData();
  if (!gd?.nodes) return;
  gd.nodes.forEach(node => {
    if (!node.__threeObj) return;
    const base = 6 + Math.min((node.connections || 0) * 2, 16);
    const idx = parseInt(node.id.replace('n','')) || 0;
    const p = base * (1 + 0.06 * Math.sin(t * 2 + idx * 0.7));

    if (state.selectedNode && state.neighborSet) {
      if (!state.neighborSet.has(node.id)) {
        node.__threeObj.material.opacity = 0.06;
        node.__threeObj.scale.set(p * 0.6, p * 0.6, 1);
      } else {
        node.__threeObj.material.opacity = 1;
        node.__threeObj.scale.set(p, p, 1);
      }
    } else {
      node.__threeObj.material.opacity = 1;
      node.__threeObj.scale.set(p, p, 1);
    }
  });
}
tick();

container.addEventListener('mousedown', () => { userInteracted = true; });
container.addEventListener('wheel', () => { userInteracted = true; });

    tooltipLabel.style.textShadow = `0 0 12px ${c}`;
    tooltipMeta.innerHTML = `<span class="tdot" style="background:${c}; box-shadow:0 0 6px ${c}"></span>
      <span>${NODE_LABELS[node.type]||node.type}</span>
      <span style="color:var(--text-tertiary)">${node.category||''}</span>
      <span style="color:var(--text-tertiary)">${node.connections||0} conn</span>`;
    tooltipEl.classList.add('visible');
  } else {
    tooltipEl.classList.remove('visible');
  }
}

document.addEventListener('mousemove', e => {
  if (tooltipEl.classList.contains('visible')) {
    tooltipEl.style.left = Math.min(e.clientX + 16, innerWidth - 300) + 'px';
    tooltipEl.style.top = Math.min(e.clientY - 10, innerHeight - 80) + 'px';
  }
});

// ============================================================
// Node Click
// ============================================================
function handleNodeClick(node) {
  if (!node) return;
  state.selectedNode = node;
  state.autoRotate = false;
  userInteracted = true;

  const neighbors = new Set([node.id]);
  graph.graphData().links.forEach(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    if (s === node.id) neighbors.add(t);
    if (t === node.id) neighbors.add(s);
  });
  state.neighborSet = neighbors;

  graph
    .linkColor(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return (neighbors.has(s) && neighbors.has(t)) ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.015)';
    })
    .linkDirectionalParticleWidth(l => {
      const s = typeof l.source === 'object' ? l.source.id : l.source;
      const t = typeof l.target === 'object' ? l.target.id : l.target;
      return (neighbors.has(s) && neighbors.has(t)) ? 2.5 : 0;
    });

  graph.cameraPosition(
    { x: node.x + 120, y: node.y + 36, z: node.z + 120 },
    { x: node.x, y: node.y, z: node.z },
    1200
  );

  openDetailPanel(node);
}

function handleBackgroundClick() { deselectNode(); }

function deselectNode() {
  state.selectedNode = null;
  state.neighborSet = null;
  state.autoRotate = true;
  userInteracted = false;
  const cam = graph.camera();
  rotAngle = Math.atan2(cam.position.x, cam.position.z);
  graph.linkColor(() => 'rgba(255,255,255,0.08)').linkDirectionalParticleWidth(1.5);
  document.getElementById('detailPanel').classList.remove('open');
}

// ============================================================
// Detail Panel
// ============================================================
function openDetailPanel(node) {
  const panel = document.getElementById('detailPanel');
  const content = document.getElementById('detailContent');
  const color = NODE_COLORS[node.type] || '#888';

  const connections = [];
  graph.graphData().links.forEach(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    let cid = null;
    if (s === node.id) cid = t;
    else if (t === node.id) cid = s;
    if (cid) { const cn = nodeById.get(cid); if (cn) connections.push({ node: cn, link: l }); }
  });
  connections.sort((a, b) => (b.link.weight || 0) - (a.link.weight || 0));

  const statusBadge = node.status ? `<span class="badge badge-status ${node.status}">${node.status.replace('-',' ')}</span>` : '';
  const catBadge = node.category ? `<span class="badge badge-category">${node.category}</span>` : '';

  const connsHtml = connections.slice(0, 12).map(c => {
    const cc = NODE_COLORS[c.node.type] || '#888';
    const wp = Math.round((c.link.weight || 0.5) * 100);
    return `<div class="connection-item" data-nid="${c.node.id}">
      <span class="cdot" style="background:${cc}; box-shadow:0 0 6px ${cc}"></span>
      <div class="cinfo"><div class="clabel">${c.node.label}</div><div class="creason">${c.link.reason||c.link.type}</div></div>
      <div class="cweight"><div class="cweight-fill" style="width:${wp}%;background:${cc}"></div></div></div>`;
  }).join('');

  const entsHtml = (node.entities||[]).map(e => `<span class="entity-tag">${e}</span>`).join('');

  content.innerHTML = `
    <div class="detail-title" style="text-shadow:0 0 20px ${color}40">${node.label}</div>
    <div class="detail-badges">
      <span class="badge badge-type"><span class="bdot" style="background:${color};box-shadow:0 0 6px ${color}"></span>${NODE_LABELS[node.type]}</span>
      ${catBadge}${statusBadge}
    </div>
    <div class="detail-section"><div class="detail-section-title">Summary</div><div class="detail-summary">${node.summary||'No summary.'}</div></div>
    ${node.entities?.length ? `<div class="detail-section"><div class="detail-section-title">Entities</div><div class="detail-entities">${entsHtml}</div></div>` : ''}
    <div class="detail-section"><div class="detail-section-title">Connections (${connections.length})</div>
      <div class="connection-list">${connsHtml || '<div style="color:var(--text-tertiary);font-size:12px">No connections</div>'}</div></div>
    <div class="detail-actions">
      <button class="detail-btn" id="btnNbr">View Neighborhood</button>
      <button class="detail-btn primary" id="btnSrc">Open Source</button>
    </div>`;

  panel.classList.add('open');

  content.querySelectorAll('.connection-item').forEach(el => {
    el.addEventListener('click', () => {
      const tn = graph.graphData().nodes.find(n => n.id === el.dataset.nid);
      if (tn) handleNodeClick(tn);
    });
  });

  document.getElementById('btnNbr')?.addEventListener('click', () => {
    graph.cameraPosition(
      { x: node.x + 200, y: node.y + 100, z: node.z + 200 },
      { x: node.x, y: node.y, z: node.z }, 1500
    );
  });
}

document.getElementById('detailClose').addEventListener('click', deselectNode);

// ============================================================
// Filtering
// ============================================================
function applyFilters() {
  const q = state.searchText.toLowerCase();
  const vis = new Set();

  const fNodes = mockData.nodes.filter(n => {
    if (!state.activeTypes.has(n.type)) return false;
    if (q) {
      const hit = n.label.toLowerCase().includes(q)
        || (n.summary?.toLowerCase().includes(q))
        || (n.entities?.some(e => e.toLowerCase().includes(q)));
      if (!hit) return false;
    }
    vis.add(n.id);
    return true;
  });

  const fLinks = mockData.edges.filter(e => {
    const s = typeof e.source === 'object' ? e.source.id : e.source;
    const t = typeof e.target === 'object' ? e.target.id : e.target;
    return vis.has(s) && vis.has(t) && (e.weight || 0) >= state.minWeight;
  });

  graph.graphData({ nodes: fNodes, links: fLinks });
  refreshStats(fNodes, fLinks);
  document.getElementById('emptyState').classList.toggle('visible', fNodes.length === 0);
}

function refreshStats(nodes, links) {
  document.getElementById('statNodes').textContent = nodes.length;
  document.getElementById('statEdges').textContent = links.length;

  const ids = new Set(nodes.map(n => n.id));
  const adj = new Map();
  links.forEach(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    if (ids.has(s) && ids.has(t)) {
      if (!adj.has(s)) adj.set(s, []);
      if (!adj.has(t)) adj.set(t, []);
      adj.get(s).push(t);
      adj.get(t).push(s);
    }
  });
  const visited = new Set();
  let clusters = 0;
  ids.forEach(nid => {
    if (visited.has(nid)) return;
    clusters++;
    const stack = [nid];
    while (stack.length) {
      const cur = stack.pop();
      if (visited.has(cur)) continue;
      visited.add(cur);
      (adj.get(cur)||[]).forEach(nb => { if (!visited.has(nb)) stack.push(nb); });
    }
  });
  document.getElementById('statClusters').textContent = clusters;
}

// ============================================================
// UI Setup
// ============================================================
const typeFiltersEl = document.getElementById('typeFilters');
for (const [type, color] of Object.entries(NODE_COLORS)) {
  const dot = document.createElement('div');
  dot.className = 'type-dot active';
  dot.style.background = color;
  dot.style.color = color;
  dot.style.boxShadow = `0 0 8px ${color}`;
  dot.title = NODE_LABELS[type];
  dot.addEventListener('click', () => {
    if (state.activeTypes.has(type)) {
      state.activeTypes.delete(type);
      dot.classList.replace('active', 'inactive');
      dot.style.boxShadow = 'none';
    } else {
      state.activeTypes.add(type);
      dot.classList.replace('inactive', 'active');
      dot.style.boxShadow = `0 0 8px ${color}`;
    }
    applyFilters();
  });
  typeFiltersEl.appendChild(dot);
}

const legendEl = document.getElementById('legend');
for (const [type, color] of Object.entries(NODE_COLORS)) {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `<span class="dot" style="background:${color};color:${color}"></span>${NODE_LABELS[type]}`;
  legendEl.appendChild(item);
}

const searchInput = document.getElementById('searchInput');
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { state.searchText = searchInput.value.trim(); applyFilters(); }, 200);
});

const weightSlider = document.getElementById('weightSlider');
const weightValue = document.getElementById('weightValue');
weightSlider.addEventListener('input', () => {
  state.minWeight = parseFloat(weightSlider.value);
  weightValue.textContent = state.minWeight.toFixed(2);
  applyFilters();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { deselectNode(); searchInput.blur(); }
  if (e.key === '/' && document.activeElement !== searchInput) { e.preventDefault(); searchInput.focus(); }
});

window.addEventListener('resize', () => {
  graph.width(innerWidth).height(innerHeight);
  if (state.bloomPass) state.bloomPass.resolution.set(innerWidth, innerHeight);
});

// ============================================================
// Boot
// ============================================================
refreshStats(mockData.nodes, mockData.edges);
setTimeout(() => document.getElementById('loadingOverlay').classList.add('hidden'), 2200);
</script>
